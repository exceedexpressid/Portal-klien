                                            <span className="text-white text-[9px] font-bold">{isLoadingSync ? 'Memuat...' : 'Refresh'}</span>
                                        </button>
                                    </div>
                                    <h2 className="text-2xl md:text-3xl lg:text-4xl font-black mb-2 md:mb-4 tracking-tight">{formatCurrency(keuangan.totalPencairan)}</h2>
                                    <div className="bg-[#993d00]/50 p-2.5 md:p-3 rounded-xl border border-white/10 space-y-1.5 text-[10px] md:text-xs mb-2 md:mb-3">
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-up text-green-400 mr-1.5"></i> Harga Barang (Hak Olshop)</span><span className="font-bold">+{formatCurrency(keuangan.saldoBelumCair)}</span></div>
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-down text-red-300 mr-1.5"></i> Beban Ongkir TF Olshop</span><span className="font-bold text-red-200">-{formatCurrency(keuangan.potonganBelumCair)}</span></div>
                                    </div>
                                    <div className="bg-green-600/90 border border-green-500 p-2 md:p-2.5 rounded-xl flex justify-between items-center shadow-inner">
                                       <span className="flex items-center text-[10px] md:text-xs font-bold text-green-50"><i className="fas fa-shield-alt text-green-200 mr-1.5"></i> Dana Telah Dicairkan</span>
                                       <span className="font-black text-xs md:text-sm text-white">{formatCurrency(keuangan.danaSudahCairBersih)}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center space-y-3 md:space-y-4">
                                <div className="relative">
                                    <i className="fas fa-search absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs md:text-sm"></i>
                                    <input type="text" placeholder="Cari Resi atau Nama Customer..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2.5 md:py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs md:text-sm outline-none focus:border-[#e65c00] focus:bg-white transition-colors" />
                                </div>
                                <div className="flex flex-col md:flex-row items-center gap-2 md:gap-3">
                                    <div className="relative w-full md:flex-1"><i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-[#e65c00] text-slate-600 font-medium" /></div>
                                    <span className="text-[10px] font-bold text-slate-400 uppercase">Hingga</span>
                                    <div className="relative w-full md:flex-1"><i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 text-[10px] md:text-xs"></i><input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs outline-none focus:border-[#e65c00] text-slate-600 font-medium" /></div>
                                    {(startDate || endDate) && (<button onClick={() => { setStartDate(''); setEndDate(''); }} className="w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-100"><i className="fas fa-times"></i></button>)}
                                </div>
                                <div className="flex space-x-2 overflow-x-auto pb-1 scrollbar-hide pt-1">
                                    {[{id:'semua', label:'Semua'}, {id:'proses', label:'Proses'}, {id:'sukses', label:'Sukses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Batal'}].map(s => (
                                        <button key={s.id} onClick={() => setFilterStatus(s.id)} className={`px-4 py-2 rounded-xl text-[10px] md:text-xs font-bold whitespace-nowrap transition-all border ${filterStatus === s.id ? 'bg-[#e65c00] text-white border-[#e65c00] shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>{s.label}</button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* REKAP GLOBAL DARK THEME */}
                        <div className="bg-[#1e2336] rounded-xl overflow-hidden shadow-lg border border-[#2a3147] text-white font-sans">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-y-4 gap-x-2 p-3 md:p-4 items-center text-center md:text-left divide-y md:divide-y-0 md:divide-x divide-[#2a3147]">
                                <div className="col-span-2 md:col-span-1 flex flex-col justify-center items-center pb-2 md:pb-0">
                                    <div className="text-[9px] md:text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest">TOTAL STATUS PKT</div>
                                    <div className="flex gap-1.5">
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#153a2b] text-[#34d399] px-2 py-0.5 rounded text-xs font-bold border border-[#1d4f3b]"><i className="fas fa-check-circle mr-1"></i>{ringkasan.s_sukses}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Sukses</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#1e3a8a] text-[#60a5fa] px-2 py-0.5 rounded text-xs font-bold border border-[#1e40af]"><i className="fas fa-truck mr-1"></i>{ringkasan.s_proses}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Proses</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#431407] text-[#fb923c] px-2 py-0.5 rounded text-xs font-bold border border-[#7c2d12]"><i className="fas fa-clock mr-1"></i>{ringkasan.s_pending}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Pending</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#450a0a] text-[#f87171] px-2 py-0.5 rounded text-xs font-bold border border-[#7f1d1d]"><i className="fas fa-times-circle mr-1"></i>{ringkasan.s_cancel}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Cancel</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col md:items-center pt-2 md:pt-0">
                                    <div className="text-[9px] md:text-[10px] text-[#34d399] font-bold mb-1 uppercase tracking-widest">BARANG (CASH/TF KTR)</div>
                                    <div className="text-sm md:text-base font-black text-[#34d399]">+{formatCurrency(ringkasan.uangBarang)}</div>
                                </div>
                                <div className="flex flex-col md:items-center pt-2 md:pt-0">
                                    <div className="text-[9px] md:text-[10px] text-[#f87171] font-bold mb-1 uppercase tracking-widest">BEBAN ONGKIR (TF OLSHOP)</div>
                                    <div className="text-sm md:text-base font-black text-[#f87171]">{ringkasan.totalBebanOngkirOlshop > 0 ? '-' : ''}{formatCurrency(ringkasan.totalBebanOngkirOlshop)}</div>
                                </div>
                                <div className="flex flex-col md:items-center pt-2 md:pt-0 bg-[#252b41] md:bg-transparent -mx-3 md:mx-0 px-3 md:px-0 pb-1 rounded">
                                    <div className="text-[9px] md:text-[10px] text-white font-bold mb-1 uppercase tracking-widest">TOTAL BERSIH</div>
                                    <div className="text-base md:text-lg font-black text-[#fb923c]">{formatCurrency(ringkasan.totalBersih)}</div>
                                </div>
                            </div>
                        </div>

                        {/* LIST CUSTOMER / PAKET */}
                        <div className="mt-6 flex flex-col">
                            <div className="px-1 md:px-2 pb-3 flex justify-between items-end border-b border-gray-300 mb-2">
                                <h3 className="font-black text-gray-700 text-sm md:text-lg"><i className="fas fa-users text-[#e65c00] mr-2"></i>Daftar Customer</h3>
                                <span className="text-[10px] font-bold bg-gray-200 text-gray-600 px-3 py-1 rounded-full">{groupedCustomers.length} Pelanggan</span>
                            </div>

                            {groupedCustomers.length === 0 ? (
                                <div className="text-center py-16 bg-white rounded-xl border border-gray-200 shadow-sm mt-2">
                                    <i className="fas fa-box-open text-gray-300 mb-3 text-5xl"></i>
                                    <p className="text-gray-500 font-medium text-sm">Tidak ada data paket untuk ditampilkan.</p>
                                </div>
                            ) : (
                                <div className="overflow-x-auto w-full bg-[#1e2336] rounded-xl border border-[#2a3147] shadow-lg pb-2 scrollbar-hide">
                                    <div className="min-w-[1250px] flex flex-col font-sans">
                                        
                                        <div className="grid grid-cols-[200px_280px_140px_1fr_1fr_1fr_1fr_120px] gap-3 px-4 py-3 text-[10px] text-gray-400 font-bold uppercase tracking-widest bg-[#151928] border-b border-[#2a3147] items-center">
                                            <div>NAMA TOKO / OLSHOP</div>
                                            <div className="px-2">FOTO & RESI</div>
                                            <div className="flex justify-center">STATUS</div>
                                            <div className="flex justify-center text-[#34d399]">CASH / COD</div>
                                            <div className="flex justify-center text-[#60a5fa]">TF OLSHOP</div>
                                            <div className="flex justify-center text-[#c084fc]">TF KANTOR</div>
                                            <div className="flex justify-center text-[#f87171] text-center px-1">BEBAN ONGKIR (MINUS)</div>
                                            <div className="flex justify-end pr-2 text-white">TOTAL BERSIH</div>
                                        </div>

                                        {groupedCustomers.map((group, idx) => {
                                            const isGroupExpanded = expandedCustomers.includes(group.customerName);
                                            
                                            return (
                                                <div key={idx} className="flex flex-col border-b border-[#2a3147] last:border-0 hover:bg-[#252b41] transition-colors">
                                                    
                                                    <div 
                                                        className="grid grid-cols-[200px_280px_140px_1fr_1fr_1fr_1fr_120px] gap-3 px-4 py-3.5 items-center cursor-pointer"
                                                        onClick={() => toggleCustomerExpand(group.customerName)}
                                                    >
                                                        <div className="flex flex-col gap-1 min-w-0 pr-2">
                                                            <div className="flex items-center gap-2.5">
                                                                <div className={`w-5 h-5 shrink-0 rounded bg-[#2a3147] flex items-center justify-center text-gray-400 transition-transform ${isGroupExpanded ? 'rotate-180' : ''}`}>
                                                                    <i className="fas fa-chevron-down text-[10px]"></i>
                                                                </div>
                                                                <span className="font-bold text-white text-[13px] uppercase tracking-wide truncate">{group.customerName}</span>
                                                                <span className="bg-[#2a3147] text-gray-300 text-[9px] px-2 py-0.5 rounded shadow-inner whitespace-nowrap">{group.packages.length} Pkt</span>
                                                            </div>
                                                        </div>

                                                        <div className="flex flex-wrap gap-2 items-center px-1" onClick={(e) => e.stopPropagation()}>
                                                            {group.packages.map((pkg, pIdx) => {
                                                                const isPkgMapShown = showMapIds.includes(pkg.packageId);
                                                                const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                                                const isProses = ['siap_antar', 'proses'].includes(String(pkg.status).toLowerCase().replace(' ', '_'));
                                                                const resolvedUrlFoto = getFotoUrl(pkg);
                                                                
                                                                return (
                                                                    <div key={pIdx} className="inline-flex items-center gap-2 bg-[#151928] hover:bg-[#2a3147] border border-[#2a3147] text-gray-300 pr-3 pl-1.5 py-1.5 rounded-lg text-[10px] md:text-[11px] font-mono transition-all shadow-sm">
                                                                        {resolvedUrlFoto ? (
                                                                            <img 
                                                                                src={resolvedUrlFoto} alt="Paket" 
                                                                                className="w-9 h-9 md:w-11 md:h-11 rounded object-cover border border-[#374151] cursor-pointer hover:opacity-80 shrink-0" 
                                                                                onClick={(e) => { e.stopPropagation(); setSelectedImage(resolvedUrlFoto); }}
                                                                                title="Lihat Foto Bukti"
                                                                            />
                                                                        ) : (
                                                                            <div 
                                                                                className="w-9 h-9 md:w-11 md:h-11 rounded bg-[#1e2336] border border-[#2a3147] flex items-center justify-center shrink-0 cursor-pointer hover:bg-gray-600"
                                                                                onClick={(e) => { e.stopPropagation(); setSelectedImage('https://via.placeholder.com/400x500/1e2336/9ca3af.png?text=Foto+Belum+Tersedia'); }}
                                                                                title="Foto belum tersedia"
                                                                            >
                                                                                <i className="fas fa-box text-[10px] md:text-xs text-gray-500"></i>
                                                                            </div>
                                                                        )}
                                                                        <span className="font-semibold tracking-wide ml-0.5">{pkg.packageId}</span>
                                                                        {(isSukses || isProses) && (
                                                                            <button 
                                                                                onClick={(e) => { e.stopPropagation(); toggleMap(pkg.packageId); }}
                                                                                className={`ml-0.5 w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center text-[8px] md:text-[10px] transition-colors ${isPkgMapShown ? 'bg-red-500/20 text-red-400 hover:bg-red-500/35' : 'bg-blue-500/20 text-blue-400 hover:bg-blue-500/35'}`}
                                                                                title="Lacak & Detail Paket"
                                                                            >
                                                                                <i className={`fas ${isPkgMapShown ? 'fa-times' : 'fa-location-arrow'}`}></i>
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>

                                                        <div className="grid grid-cols-2 gap-x-2 gap-y-1.5 justify-center w-max mx-auto">
                                                            <div className="flex flex-col items-center">
                                                                <div className="bg-[#153a2b] text-[#34d399] px-2 py-0.5 rounded-md text-[11px] font-bold border border-[#1d4f3b] flex items-center justify-center min-w-[44px] shadow-sm"><i className="fas fa-check-circle mr-1"></i>{group.s_sukses}</div>
                                                                <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Sukses</span>
                                                            </div>
                                                            <div className="flex flex-col items-center">
                                                                <div className="bg-[#1e3a8a] text-[#60a5fa] px-2 py-0.5 rounded-md text-[11px] font-bold border border-[#1e40af] flex items-center justify-center min-w-[44px] shadow-sm"><i className="fas fa-truck mr-1"></i>{group.s_proses}</div>
                                                                <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Proses</span>
                                                            </div>
                                                            <div className="flex flex-col items-center">
                                                                <div className="bg-[#431407] text-[#fb923c] px-2 py-0.5 rounded-md text-[11px] font-bold border border-[#7c2d12] flex items-center justify-center min-w-[44px] shadow-sm"><i className="fas fa-clock mr-1"></i>{group.s_pending}</div>
                                                                <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Pending</span>
                                                            </div>
                                                            <div className="flex flex-col items-center">
                                                                <div className="bg-[#450a0a] text-[#f87171] px-2 py-0.5 rounded-md text-[11px] font-bold border border-[#7f1d1d] flex items-center justify-center min-w-[44px] shadow-sm"><i className="fas fa-times-circle mr-1"></i>{group.s_cancel}</div>
                                                                <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Cancel</span>
                                                            </div>
                                                        </div>

                                                        <div className="flex justify-center text-[13px] font-black text-[#34d399]">
                                                            {group.uangCASH > 0 ? '+' : ''}{group.uangCASH === 0 ? 'Rp 0' : formatCurrency(group.uangCASH)}
                                                        </div>
                                                        <div className="flex justify-center text-[13px] font-black text-[#60a5fa]">
                                                            {group.uangTFOlshop === 0 ? 'Rp 0' : formatCurrency(group.uangTFOlshop)}
                                                        </div>
                                                        <div className="flex justify-center text-[13px] font-black text-[#c084fc]">
                                                            {group.uangTFKantor === 0 ? 'Rp 0' : formatCurrency(group.uangTFKantor)}
                                                        </div>
                                                        <div className="flex justify-center text-[13px] font-black text-[#f87171]">
                                                            {group.bebanOngkirOlshop > 0 ? '-' : ''}{group.bebanOngkirOlshop === 0 ? 'Rp 0' : formatCurrency(group.bebanOngkirOlshop)}
                                                        </div>
                                                        <div className="flex justify-end pr-2 text-[14px] font-black text-white">
                                                            {formatCurrency(group.totalBersih)}
                                                        </div>
                                                    </div>

                                                    {/* MAP/TIMELINE BUKA DILUAR ACCORDION */}
                                                    {group.packages.some(p => showMapIds.includes(p.packageId)) && !isGroupExpanded && (
                                                        <div className="px-4 pb-4" onClick={(e) => e.stopPropagation()}>
                                                            {group.packages.map((pkg) => {
                                                                if (!showMapIds.includes(pkg.packageId)) return null;

                                                                let displayKurir = String(pkg.kurirId || '');
                                                                let displayTglFull = String(pkg.dateString || pkg.tanggal || '-');
                                                                let displayInputTglFull = String(pkg.tanggalInput || pkg.tanggal || '-');

                                                                if (displayKurir.includes('T') && displayKurir.length > 10 && /\d/.test(displayKurir)) {
                                                                    let tempDate = displayKurir; displayKurir = displayTglFull; displayTglFull = tempDate;
                                                                }
                                                                if (!displayKurir || displayKurir === '' || displayKurir === 'undefined') displayKurir = '-';
                                                                else if (displayKurir.includes('@')) displayKurir = displayKurir.split('@')[0];

                                                                const parseWaktu = (tglStr) => {
                                                                    if (tglStr === '-') return '-';
                                                                    try {
                                                                        const raw = new Date(tglStr);
                                                                        if(!isNaN(raw.getTime())) {
                                                                            const tgl = raw.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                                                                            const hasTime = tglStr.includes(':') || tglStr.includes(' ') || (tglStr.includes('T') && !tglStr.endsWith('T00:00:00') && !tglStr.endsWith('T00:00:00.000Z') && !tglStr.endsWith('00:00:00'));
                                                                            if (hasTime && (raw.getHours() !== 0 || raw.getMinutes() !== 0)) {
                                                                                return tgl + " - " + raw.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) + " WIT";
                                                                            }
                                                                            return tgl;
                                                                        }
                                                                    } catch(e) {}
                                                                    return tglStr.includes('T') ? tglStr.split('T')[0] : tglStr;
                                                                };
                                                                
                                                                displayTglFull = parseWaktu(displayTglFull);
                                                                displayInputTglFull = parseWaktu(displayInputTglFull);
                                                                const isSukses = String(pkg.status).toLowerCase() === 'sukses';

                                                                return (
                                                                    <div key={`map-container-${pkg.packageId}`} className="mb-4 bg-[#151928] p-3 rounded-xl border border-[#2a3147] animate-fade-in-down">
                                                                        <div className="text-[10px] text-gray-300 font-mono mb-2 bg-[#1e2336] inline-block px-2 py-1 rounded shadow-inner border border-[#2a3147]">Resi: {pkg.packageId}</div>
                                                                        
                                                                        <div className="flex flex-wrap gap-x-2 gap-y-1.5 mb-3">
                                                                            {pkg.customerPhone && <div className="text-[10px] md:text-[11px] text-gray-300 bg-[#1e2336] border border-[#2a3147] px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-phone text-[#e65c00] mr-1.5"></i> {pkg.customerPhone}</div>}
                                                                            <div className="text-[10px] md:text-[11px] text-gray-300 bg-[#1e2336] border border-[#2a3147] px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-truck text-[#e65c00] mr-1.5"></i> <span className="font-medium">{displayKurir}</span></div>
                                                                        </div>

                                                                        <div className="bg-[#1e2336] p-3 rounded-xl border border-[#2a3147] shadow-sm text-[10px] md:text-xs">
                                                                            <h5 className="font-bold text-[#e65c00] uppercase mb-2 text-[9px] tracking-wider"><i className="fas fa-history mr-1.5"></i> Histori Perjalanan Paket</h5>
                                                                            <div className="space-y-3 relative border-l border-[#374151] ml-2.5 pl-4">
                                                                                <div className="relative">
                                                                                    <div className="absolute -left-[21px] top-0.5 bg-green-500 w-2.5 h-2.5 rounded-full border-2 border-[#1e2336]"></div>
                                                                                    <p className="font-bold text-gray-200">Paket Diterima di Gudang Exceed</p>
                                                                                    <p className="text-gray-500 text-[9px]"><span className="font-bold text-gray-400">{displayInputTglFull}</span> - Sistem Terdaftar</p>
                                                                                </div>
                                                                                <div className="relative">
                                                                                    <div className={`absolute -left-[21px] top-0.5 w-2.5 h-2.5 rounded-full border-2 border-[#1e2336] ${pkg.status !== 'siap_antar' && pkg.status !== 'proses' ? 'bg-green-500' : 'bg-blue-500 animate-ping'}`}></div>
                                                                                    {pkg.status === 'siap_antar' || pkg.status === 'proses' ? (
                                                                                        <div>
                                                                                            <p className="font-bold text-blue-400">Sedang Di Proses Antar oleh Kurir {displayKurir}</p>
                                                                                            <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                        </div>
                                                                                    ) : (
                                                                                        <div>
                                                                                            <p className="font-semibold text-gray-300">Diserahkan Ke Kurir ({displayKurir})</p>
                                                                                            <p className="text-gray-500 text-[9px]">Paket berhasil disortir dan dibawa kurir</p>
                                                                                        </div>
                                                                                    )}
                                                                                </div>
                                                                                {isSukses && (
                                                                                    <div className="relative">
                                                                                        <div className="absolute -left-[21px] top-0.5 bg-green-500 w-2.5 h-2.5 rounded-full border-2 border-[#1e2336]"></div>
                                                                                        <p className="font-bold text-emerald-400">Paket Sukses Diterima</p>
                                                                                        <p className="text-gray-500 text-[9px]">Diselesaikan pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                    </div>
                                                                                )}
                                                                                {String(pkg.status).toLowerCase() === 'cancel' && (
                                                                                    <div className="relative">
                                                                                        <div className="absolute -left-[21px] top-0.5 bg-red-500 w-2.5 h-2.5 rounded-full border-2 border-[#1e2336]"></div>
                                                                                        <p className="font-bold text-red-400">Paket Batal / Cancel</p>
                                                                                        <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                    </div>
                                                                                )}
                                                                                {String(pkg.status).toLowerCase() === 'pending' && (
                                                                                    <div className="relative">
                                                                                        <div className="absolute -left-[21px] top-0.5 bg-orange-500 w-2.5 h-2.5 rounded-full border-2 border-[#1e2336] animate-pulse"></div>
                                                                                        <p className="font-bold text-orange-400">Paket Pending / Tertunda</p>
                                                                                        <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        </div>
                                                                        <TrackingMap packageId={pkg.packageId} address={pkg.address} status={pkg.status} lastSuccessId={globalLastSuccessId} />
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}

                                                    {/* ACCORDION ISI (RINCIAN PAKET) */}
                                                    {isGroupExpanded && (
                                                        <div className="bg-[#151928] p-3 border-t-2 border-[#1e2336] flex flex-col gap-2.5 shadow-inner">
                                                            {group.packages.map((pkg, pIdx) => {
                                                                const { hBarang, oDasar, oTambahan } = getFinancials(pkg);
                                                                const metode = String(pkg.metodeBayar).trim().toUpperCase();
                                                                
                                                                const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                                                const isProses = ['siap_antar', 'proses'].includes(String(pkg.status).toLowerCase().replace(' ', '_'));

                                                                const isUangMasuk = (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD');
                                                                
                                                                let totalValue = 0;
                                                                if (isSukses) {
                                                                    if (isUangMasuk) {
                                                                        totalValue = hBarang; 
                                                                    } else if (metode === 'TF OLSHOP') {
                                                                        totalValue = -(oDasar + oTambahan); 
                                                                    }
                                                                }

                                                                let displayKurir = String(pkg.kurirId || '');
                                                                let displayTglFull = String(pkg.dateString || pkg.tanggal || '-');
                                                                let displayInputTglFull = String(pkg.tanggalInput || pkg.tanggal || '-');

                                                                if (displayKurir.includes('T') && displayKurir.length > 10 && /\d/.test(displayKurir)) {
                                                                    let tempDate = displayKurir; displayKurir = displayTglFull; displayTglFull = tempDate;
                                                                }
                                                                if (!displayKurir || displayKurir === '' || displayKurir === 'undefined') displayKurir = '-';
                                                                else if (displayKurir.includes('@')) displayKurir = displayKurir.split('@')[0];

                                                                const parseWaktu = (tglStr) => {
                                                                    if (tglStr === '-') return '-';
                                                                    try {
                                                                        const raw = new Date(tglStr);
                                                                        if(!isNaN(raw.getTime())) {
                                                                            const tgl = raw.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                                                                            const hasTime = tglStr.includes(':') || tglStr.includes(' ') || (tglStr.includes('T') && !tglStr.endsWith('T00:00:00') && !tglStr.endsWith('T00:00:00.000Z') && !tglStr.endsWith('00:00:00'));
                                                                            if (hasTime && (raw.getHours() !== 0 || raw.getMinutes() !== 0)) {
                                                                                return tgl + " - " + raw.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) + " WIT";
                                                                            }
                                                                            return tgl;
                                                                        }
                                                                    } catch(e) {}
                                                                    return tglStr.includes('T') ? tglStr.split('T')[0] : tglStr;
                                                                };
                                                                
                                                                displayTglFull = parseWaktu(displayTglFull);
                                                                displayInputTglFull = parseWaktu(displayInputTglFull);

                                                                const isMapShown = showMapIds.includes(pkg.packageId);
                                                                const resolvedUrlFoto = getFotoUrl(pkg);

                                                                return (
                                                                    <div key={pIdx} className="flex flex-col gap-2">
                                                                        <div className="bg-[#1e2336] rounded-lg border border-[#2a3147] p-2 md:p-2.5 flex items-center justify-between hover:bg-[#252b41] transition-colors overflow-x-auto scrollbar-hide">
                                                                            
                                                                            <div className="flex items-center gap-2.5 md:gap-3 shrink-0">
                                                                                {resolvedUrlFoto ? (
                                                                                    <div 
                                                                                        className="relative w-12 h-12 md:w-14 md:h-14 rounded-lg overflow-hidden border border-[#374151] shrink-0 cursor-pointer shadow-sm group"
                                                                                        onClick={(e) => { e.stopPropagation(); setSelectedImage(resolvedUrlFoto); }}
                                                                                    >
                                                                                        <img src={resolvedUrlFoto} alt="Bukti" className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" loading="lazy" />
                                                                                        <div className="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                                                                            <i className="fas fa-search-plus text-white text-[10px]"></i>
                                                                                        </div>
                                                                                    </div>
                                                                                ) : (
                                                                                    <div 
                                                                                        className="w-12 h-12 md:w-14 md:h-14 rounded-lg bg-[#151928] border border-dashed border-[#374151] flex flex-col items-center justify-center shrink-0 cursor-pointer text-gray-500 hover:text-gray-400 hover:bg-[#252b41] transition-colors"
                                                                                        onClick={(e) => { e.stopPropagation(); setSelectedImage('https://via.placeholder.com/400x500/1e2336/9ca3af.png?text=Foto+Belum+Tersedia'); }}
                                                                                        title="Foto belum tersedia"
                                                                                    >
                                                                                        <i className="fas fa-image text-xs md:text-sm mb-0.5"></i>
                                                                                        <span className="text-[6px] md:text-[7px] font-bold uppercase">No Foto</span>
                                                                                    </div>
                                                                                )}

                                                                                <div className="flex flex-col">
                                                                                    <span className="bg-[#2a3147] text-gray-300 font-mono text-[10px] md:text-[11px] px-2 py-0.5 rounded shadow-inner tracking-wider w-max">{pkg.packageId}</span>
                                                                                    
                                                                                    <div className="flex items-center gap-1.5 mt-1.5">
                                                                                        <span className="text-[9px] text-gray-400 whitespace-nowrap">
                                                                                            <i className="fas fa-calendar-alt mr-1"></i> {displayTglFull.split(' - ')[0]}
                                                                                        </span>
                                                                                        <span className={`text-[7px] font-bold px-1.5 py-0.5 rounded border whitespace-nowrap ${
                                                                                            metode === 'TF OLSHOP' ? 'bg-purple-900/40 text-purple-400 border-purple-700/50' :
                                                                                            metode === 'CASH' || metode === 'COD' ? 'bg-[#153a2b] text-[#34d399] border-[#1d4f3b]' :
                                                                                            metode === 'TF KANTOR' ? 'bg-[#1e3a8a] text-[#60a5fa] border-[#1e40af]' :
                                                                                            'bg-[#2a3147] text-gray-400 border-gray-600'
                                                                                        }`}>
                                                                                            {metode || 'KOSONG'}
                                                                                        </span>
                                                                                    </div>
                                                                                </div>

                                                                                <div className="flex flex-col gap-1.5 ml-1 md:ml-2">
                                                                                    <StatusBadge status={pkg.status} />
                                                                                    {(isSukses || isProses) && (
                                                                                        <button 
                                                                                            onClick={() => toggleMap(pkg.packageId)} 
                                                                                            className="bg-[#374151] hover:bg-[#4b5563] text-[#60a5fa] border border-gray-600 text-[8px] md:text-[9px] px-2 py-0.5 rounded flex items-center justify-center transition-all shadow-sm active:scale-95 font-bold w-full"
                                                                                        >
                                                                                            <i className={`fas ${isMapShown ? 'fa-times text-red-400' : 'fa-location-arrow text-blue-400'} mr-1`}></i>
                                                                                            {isMapShown ? 'Tutup' : 'Lacak'}
                                                                                        </button>
                                                                                    )}
                                                                                </div>
                                                                            </div>

                                                                            <div className="flex items-center gap-3 md:gap-4 shrink-0 ml-3">
                                                                                <div className="text-[10px] flex flex-col items-end">
                                                                                    <span className="text-gray-400">Brg: <span className={isUangMasuk ? "text-[#34d399] font-bold" : "text-[#34d399] font-bold"}>{isUangMasuk ? '+' : ''}{formatCurrency(hBarang)}</span></span>
                                                                                    <span className="text-gray-400">Ongkir: <span className={metode === 'TF OLSHOP' && oDasar > 0 ? "text-[#f87171] font-bold" : "text-[#f87171] font-bold"}>{metode === 'TF OLSHOP' && oDasar > 0 ? '-' : ''}{formatCurrency(oDasar)}</span></span>
                                                                                    <span className="text-gray-400">Tamb: <span className={metode === 'TF OLSHOP' && oTambahan > 0 ? "text-[#fb923c] font-bold" : "text-[#fb923c] font-bold"}>{metode === 'TF OLSHOP' && oTambahan > 0 ? '-' : ''}{formatCurrency(oTambahan)}</span></span>
                                                                                </div>
                                                                                <span className={`text-[13px] font-black w-[80px] md:w-[100px] text-right ${totalValue < 0 ? 'text-[#f87171]' : (totalValue > 0 ? 'text-[#34d399]' : 'text-gray-500')}`}>
                                                                                    {totalValue > 0 && isSukses ? '+' : ''}{formatCurrency(totalValue)}
                                                                                </span>
                                                                            </div>

                                                                        </div>

                                                                        {isMapShown && (
                                                                            <div className="bg-[#1e2336] p-3 rounded-xl border border-[#2a3147] animate-fade-in-down mt-1">
                                                                                
                                                                                <div className="flex flex-wrap gap-x-2 gap-y-1.5 mb-3">
                                                                                    {pkg.customerPhone && <div className="text-[10px] md:text-[11px] text-gray-300 bg-[#151928] border border-[#2a3147] px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-phone text-[#e65c00] mr-1.5"></i> {pkg.customerPhone}</div>}
                                                                                    <div className="text-[10px] md:text-[11px] text-gray-300 bg-[#151928] border border-[#2a3147] px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-truck text-[#e65c00] mr-1.5"></i> <span className="font-medium">{displayKurir}</span></div>
                                                                                </div>

                                                                                <div className="bg-[#151928] p-3 rounded-xl border border-[#2a3147] shadow-sm text-[10px] md:text-xs">
                                                                                    <h5 className="font-bold text-[#e65c00] uppercase mb-2 text-[9px] tracking-wider"><i className="fas fa-history mr-1.5"></i> Histori Perjalanan Paket</h5>
                                                                                    <div className="space-y-3 relative border-l border-[#374151] ml-2.5 pl-4">
                                                                                        <div className="relative">
                                                                                            <div className="absolute -left-[21px] top-0.5 bg-green-500 w-2.5 h-2.5 rounded-full border-2 border-[#151928]"></div>
                                                                                            <p className="font-bold text-gray-200">Paket Diterima di Gudang Exceed</p>
                                                                                            <p className="text-gray-500 text-[9px]"><span className="font-bold text-gray-400">{displayInputTglFull}</span> - Sistem Terdaftar</p>
                                                                                        </div>
                                                                                        <div className="relative">
                                                                                            <div className={`absolute -left-[21px] top-0.5 w-2.5 h-2.5 rounded-full border-2 border-[#151928] ${pkg.status !== 'siap_antar' && pkg.status !== 'proses' ? 'bg-green-500' : 'bg-blue-500 animate-ping'}`}></div>
                                                                                            {pkg.status === 'siap_antar' || pkg.status === 'proses' ? (
                                                                                                <div>
                                                                                                    <p className="font-bold text-blue-400">Sedang Di Proses Antar oleh Kurir {displayKurir}</p>
                                                                                                    <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                                </div>
                                                                                            ) : (
                                                                                                <div>
                                                                                                    <p className="font-semibold text-gray-300">Diserahkan Ke Kurir ({displayKurir})</p>
                                                                                                    <p className="text-gray-500 text-[9px]">Paket berhasil disortir dan dibawa kurir</p>
                                                                                                </div>
                                                                                            )}
                                                                                        </div>
                                                                                        {isSukses && (
                                                                                            <div className="relative">
                                                                                                <div className="absolute -left-[21px] top-0.5 bg-green-500 w-2.5 h-2.5 rounded-full border-2 border-[#151928]"></div>
                                                                                                <p className="font-bold text-emerald-400">Paket Sukses Diterima</p>
                                                                                                <p className="text-gray-500 text-[9px]">Diselesaikan pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                            </div>
                                                                                        )}
                                                                                        {String(pkg.status).toLowerCase() === 'cancel' && (
                                                                                            <div className="relative">
                                                                                                <div className="absolute -left-[21px] top-0.5 bg-red-500 w-2.5 h-2.5 rounded-full border-2 border-[#151928]"></div>
                                                                                                <p className="font-bold text-red-400">Paket Batal / Cancel</p>
                                                                                                <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                            </div>
                                                                                        )}
                                                                                        {String(pkg.status).toLowerCase() === 'pending' && (
                                                                                            <div className="relative">
                                                                                                <div className="absolute -left-[21px] top-0.5 bg-orange-500 w-2.5 h-2.5 rounded-full border-2 border-[#151928] animate-pulse"></div>
                                                                                                <p className="font-bold text-orange-400">Paket Pending / Tertunda</p>
                                                                                                <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                                            </div>
                                                                                        )}
                                                                                    </div>
                                                                                </div>

                                                                                <TrackingMap packageId={pkg.packageId} address={pkg.address} status={pkg.status} lastSuccessId={globalLastSuccessId} />
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="text-center pt-2 pb-2"><p className="text-[9px] md:text-[10px] text-gray-400 font-medium">Exceed Express Logistics &copy; 2026</p></div>
                    </div>

                    {selectedImage && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 transition-opacity" onClick={() => setSelectedImage(null)}>
                            <div className="relative w-full max-w-md flex flex-col items-center transform transition-all scale-100" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-lg"><i className="fas fa-times text-xl"></i></button>
                                <img src={selectedImage} alt="Foto Paket Membesar" className="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border-4 border-white/10 bg-black/50" />
                                <p className="text-white font-black mt-4 tracking-widest text-sm uppercase flex items-center bg-black/50 px-4 py-2 rounded-full border border-white/10"><i className="fas fa-camera mr-2 text-blue-400"></i> FOTO BUKTI</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
