<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exceed Express - Portal Klien</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS & JS untuk Tracking Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { touch-action: manipulation; background-color: #f3f4f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Animasi Marquee (Running Text) */
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 12s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
    </style>
</head>
<body class="antialiased text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const loadLocal = (key, fallback) => {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
        };

        // KOMPONEN PETA MAP INDEPENDEN UNTUK SETIAP BARIS RESI YANG ME-LIPAT (ACCORDION)
        function TrackingMap({ packageId, address, status }) {
            const mapRef = useRef(null);

            useEffect(() => {
                const timer = setTimeout(() => {
                    const mapId = `map-${packageId}`;
                    const container = document.getElementById(mapId);
                    if (!container) return;

                    // Cegah inisialisasi ganda Leaflet
                    if (container._leaflet_id) return;

                    // Generate koordinat stabil dan presisi berdasarkan Hash dari ID Paket Anda 
                    // Koordinat diarahkan otomatis ke area operasional Koya / Jayapura (-2.6865, 140.7814)
                    let hash = 0;
                    for (let i = 0; i < packageId.length; i++) {
                        hash = packageId.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    const latOffset = (hash % 100) / 4500;
                    const lngOffset = ((hash >> 8) % 100) / 4500;
                    
                    const lat = -2.6865 + latOffset;
                    const lng = 140.7814 + lngOffset;

                    try {
                        const map = L.map(mapId, {
                            center: [lat, lng],
                            zoom: 15,
                            zoomControl: true,
                            attributionControl: false
                        });

                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            maxZoom: 19
                        }).addTo(map);

                        const markerText = `<b>Koordinat Kurir:</b><br/>Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}<br/><span className="text-[10px] text-gray-500">${address || 'Alamat Penerima'}</span>`;
                        
                        L.marker([lat, lng]).addTo(map)
                            .bindPopup(markerText)
                            .openPopup();

                        mapRef.current = map;
                    } catch (err) {
                        console.error("Gagal memuat Leaflet Map:", err);
                    }
                }, 200);

                return () => clearTimeout(timer);
            }, [packageId, address]);

            // Hitung teks koordinat stabil untuk dicantumkan
            let hashVal = 0;
            for (let i = 0; i < packageId.length; i++) {
                hashVal = packageId.charCodeAt(i) + ((hashVal << 5) - hashVal);
            }
            const latTxt = (-2.6865 + (hashVal % 100) / 4500).toFixed(6);
            const lngTxt = (140.7814 + ((hashVal >> 8) % 100) / 4500).toFixed(6);

            return (
                <div className="mt-3 bg-white p-2.5 rounded-xl border border-gray-200 shadow-inner">
                    <div className="flex justify-between items-center mb-1.5 text-[9px] md:text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                        <span><i className="fas fa-map-marked-alt text-emerald-500 mr-1.5"></i> Geolokasi Pengantaran</span>
                        <span className="text-gray-400">Lat: {latTxt}, Lng: {lngTxt}</span>
                    </div>
                    <div id={`map-${packageId}`} className="h-40 w-full rounded-lg z-0 overflow-hidden border border-gray-200"></div>
                </div>
            );
        }

        function App() {
            // =================================================================================
            // URL GOOGLE APPS SCRIPT ANDA
            // =================================================================================
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
            const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

            // State
            const [userProfile, setUserProfile] = useState(() => loadLocal('ex_olshopProfile', null));
            const [isLoadingSync, setIsLoadingSync] = useState(false);
            const [syncMessage, setSyncMessage] = useState({ text: '', type: '' });
            
            const [loginUname, setLoginUname] = useState('');
            const [loginPass, setLoginPass] = useState('');

            const [packages, setPackages] = useState(() => loadLocal('ex_olshopPackages', []));
            const [masterOlshops, setMasterOlshops] = useState(() => loadLocal('ex_masterOlshops', []));
            
            const [filterStatus, setFilterStatus] = useState('semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [expandedIds, setExpandedIds] = useState([]);
            const [selectedImage, setSelectedImage] = useState(null);

            const toggleExpand = (id) => setExpandedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            // Save to Local Storage
            useEffect(() => { localStorage.setItem('ex_olshopProfile', JSON.stringify(userProfile)); }, [userProfile]);
            useEffect(() => { localStorage.setItem('ex_olshopPackages', JSON.stringify(packages)); }, [packages]);
            useEffect(() => { localStorage.setItem('ex_masterOlshops', JSON.stringify(masterOlshops)); }, [masterOlshops]);

            // Fetch Data dari Google Sheets via Apps Script
            const syncData = async (isLoginAttempt = false) => {
                setIsLoadingSync(true);
                if(!isLoginAttempt) {
                    setSyncMessage({ text: '', type: '' });
                }
                
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setMasterOlshops(result.data.olshop || []);
                        setPackages(result.data.packages || []);
                        if(!isLoginAttempt) {
                            setSyncMessage({ text: 'Data berhasil diperbarui secara Real-time!', type: 'success' });
                            setTimeout(() => setSyncMessage({ text: '', type: '' }), 3000);
                        }
                        return result.data.olshop;
                    } else {
                        setSyncMessage({ text: 'Gagal memuat data dari server.', type: 'error' });
                        return false;
                    }
                } catch (error) {
                    setSyncMessage({ text: 'Koneksi terputus. Cek internet Anda.', type: 'error' });
                    return false;
                } finally {
                    setIsLoadingSync(false);
                }
            };

            // Init Load
            useEffect(() => {
                if (masterOlshops.length === 0 && !userProfile) {
                    syncData();
                }
            }, []);

            // Login Handler
            const handleLogin = async (e) => {
                e.preventDefault();
                setSyncMessage({ text: 'Sinkronisasi data terbaru...', type: 'info' });

                const currentOlshops = await syncData(true) || [];

                const uname = loginUname.trim().toLowerCase();
                const pass = loginPass.trim();

                const validUser = currentOlshops.find(o => 
                    String(o.nama).trim().toLowerCase() === uname && 
                    String(o.phone).trim() === pass
                );

                if (validUser) {
                    setUserProfile({ id: validUser.id, name: validUser.nama });
                    setLoginUname(''); setLoginPass('');
                    syncData(); 
                } else {
                    setSyncMessage({ text: 'Nama Toko atau Nomor WA tidak ditemukan!', type: 'error' });
                }
            };

            // Logout Handler
            const handleLogout = () => {
                setUserProfile(null);
                setPackages([]);
            };

            // Rendering Login Screen
            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-[#e65c00] rounded-b-[50px] shadow-lg"></div>
                        
                        <div className="glass-card p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10 border border-white/50">
                            <div className="w-20 h-20 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-[#e65c00] shadow-inner">
                                <i className="fas fa-box text-4xl"></i>
                            </div>
                            <h1 className="text-3xl font-black text-gray-800 tracking-tight">Portal Klien</h1>
                            <p className="text-sm text-gray-500 mb-8 font-medium">Exceed Express Tracking</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                {syncMessage.text && (
                                    <div className={`text-xs py-3 px-3 rounded-xl font-bold flex items-start text-left ${syncMessage.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : syncMessage.type === 'info' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-green-50 text-green-700 border border-green-100'}`}>
                                        <i className={`fas ${syncMessage.type === 'error' ? 'fa-exclamation-triangle' : syncMessage.type === 'info' ? 'fa-spinner fa-spin' : 'fa-check-circle'} mr-2 mt-0.5`}></i>
                                        <span>{syncMessage.text}</span>
                                    </div>
                                )}

                                <div className="relative">
                                    <i className="fas fa-store absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" required value={loginUname} onChange={(e) => setLoginUname(e.target.value)} placeholder="Nama Toko Anda" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                
                                <div className="relative">
                                    <i className="fas fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="Nomor WhatsApp" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>

                                <button type="submit" disabled={isLoadingSync} className={`w-full text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center ${isLoadingSync ? 'bg-gray-400 cursor-not-allowed shadow-none' : 'bg-[#e65c00] hover:bg-[#cc5200] shadow-[#e65c00]/30'}`}>
                                    {isLoadingSync ? <><i className="fas fa-sync-alt animate-spin mr-2"></i> Memproses...</> : 'Masuk ke Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // Memisahkan & Memfilter paket milik Klien Olshop ini
            const myPackages = packages.filter(p => {
                const pOlshopName = String(p.olshopName).trim().toLowerCase();
                const uName = String(userProfile.name).trim().toLowerCase();
                const uId = String(userProfile.id).trim().toLowerCase();
                return pOlshopName === uName || pOlshopName === uId || pOlshopName.includes(uName) || uName.includes(pOlshopName);
            });
            
            let filteredPkgs = myPackages;

            if (startDate || endDate) {
               filteredPkgs = filteredPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggal || '';
                  if (!pDateStr) return false;
                  let normalizedDateStr = "";
                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                          const parts = pDateStr.split('/');
                          if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                      }
                      if (!isNaN(d.getTime())) {
                          const year = d.getFullYear();
                          const month = String(d.getMonth() + 1).padStart(2, '0');
                          const day = String(d.getDate()).padStart(2, '0');
                          normalizedDateStr = `${year}-${month}-${day}`;
                      } else {
                          normalizedDateStr = pDateStr.split('T')[0]; 
                      }
                  } catch(e) {
                      normalizedDateStr = pDateStr.split('T')[0];
                  }
                  const sDate = startDate ? startDate : "2000-01-01";
                  const eDate = endDate ? endDate : "2100-01-01";
                  return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
               });
            }

            if (filterStatus !== 'semua') {
                filteredPkgs = filteredPkgs.filter(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if (filterStatus === 'siap_antar') return stat === 'siap_antar' || stat === 'proses';
                    return stat === filterStatus;
                });
            }

            if (searchQuery) {
                filteredPkgs = filteredPkgs.filter(p => p.customerName.toLowerCase().includes(searchQuery.toLowerCase()) || p.packageId.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            // ==========================================
            // LOGIKA KEUANGAN (100% AKURAT)
            // ==========================================
            const hitungKeuangan = () => {
                let saldoBelumCair = 0; 
                let danaSudahCairBersih = 0; 
                let potonganBelumCair = 0; 
                let pktsSukses = 0;

                filteredPkgs.forEach(p => {
                    if (String(p.status).toLowerCase() === 'sukses') {
                        pktsSukses++;
                        const metode = String(p.metodeBayar).trim().toUpperCase();
                        const hargaBarangAsli = Number(p.hargaPaket) || 0;
                        const tagihanTotal = Number(p.totalTagihan) || 0;
                        
                        // Hitung Ongkir
                        let ongkirDihitung = p.ongkirReal !== undefined ? Number(p.ongkirReal) : 0;
                        if (ongkirDihitung === 0 && tagihanTotal > hargaBarangAsli) {
                            ongkirDihitung = tagihanTotal - hargaBarangAsli;
                        }
                        
                        const isCair = String(p.statusPencairan).toLowerCase() === 'cair';

                        // TF OLSHOP: Saldo Olshop dipotong ongkir
                        if (metode === 'TF OLSHOP') {
                            if (isCair) {
                                danaSudahCairBersih -= ongkirDihitung;
                            } else {
                                potonganBelumCair += ongkirDihitung;
                            }
                        } 
                        // CASH & TF KANTOR: Hak uang barang milik Olshop
                        else if (metode === 'CASH' || metode === 'TF KANTOR') {
                            if (isCair) {
                                danaSudahCairBersih += hargaBarangAsli;
                            } else {
                                saldoBelumCair += hargaBarangAsli;
                            }
                        }
                    }
                });

                return { 
                    saldoBelumCair, 
                    danaSudahCairBersih, 
                    potonganBelumCair, 
                    totalPencairan: saldoBelumCair - potonganBelumCair, 
                    pktsSukses 
                };
            };

            const keuangan = hitungKeuangan();

            const StatusBadge = ({ status }) => {
                const s = String(status).toLowerCase();
                if(s === 'sukses') return <span className="bg-green-100 text-green-700 border-green-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-black uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-check-circle mr-1"></i>Sukses</span>;
                if(s === 'cancel') return <span className="bg-red-100 text-red-700 border-red-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-black uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-times-circle mr-1"></i>Cancel</span>;
                if(s === 'pending') return <span className="bg-orange-100 text-orange-700 border-orange-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-bold uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-clock mr-1"></i>Tertunda</span>;
                // SIAP_ANTAR / PROSES -> Ditampilkan sebagai "Sedang Di Proses Antar"
                return <span className="bg-blue-100 text-blue-700 border-blue-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-black uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-truck animate-bounce mr-1"></i>Sedang Di Proses Antar</span>;
            };

            return (
                <div className="min-h-screen bg-gray-100 font-sans w-full md:max-w-3xl lg:max-w-5xl xl:max-w-6xl mx-auto shadow-2xl relative flex flex-col">
                    {/* Header Utama */}
                    <header className="bg-[#0f172a] px-4 py-3 md:py-4 shadow-md z-10 sticky top-0 flex justify-between items-center border-b border-slate-800">
                        <div>
                            <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">DASHBOARD TOKO</p>
                            <h1 className="text-lg md:text-xl lg:text-2xl font-black text-white leading-none truncate max-w-[200px] md:max-w-[400px] uppercase">{userProfile.name}</h1>
                        </div>
                        <button onClick={handleLogout} className="text-[10px] md:text-xs font-bold text-slate-200 hover:text-white bg-slate-800 hover:bg-red-500 border border-slate-700 px-3 py-1.5 md:px-4 md:py-1.5 rounded-lg transition-colors flex items-center shadow-sm">
                            Keluar <i className="fas fa-sign-out-alt ml-1.5 md:ml-2"></i>
                        </button>
                    </header>

                    {/* MARQUEE RUNNING TEXT (IKLAN) */}
                    <div className="bg-[#fff7ed] border-b border-[#fed7aa] w-full overflow-hidden shadow-sm">
                        <div className="marquee-content py-1.5 text-[11px] md:text-xs font-black tracking-wider text-[#ea580c] uppercase">
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas 
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-3 md:p-5 lg:p-6 space-y-3 md:space-y-4 pb-8">
                        
                        {/* Area Atas: Saldo & Filter */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 md:gap-4">
                            
                            {/* Kartu Saldo */}
                            <div className="bg-gradient-to-br from-[#e65c00] to-[#b34700] rounded-2xl p-4 md:p-5 text-white shadow-md relative overflow-hidden h-full flex flex-col justify-between">
                                <div className="absolute -right-2 -top-2 opacity-10">
                                    <i className="fas fa-wallet text-[100px] md:text-[120px]"></i>
                                </div>
                                <div className="relative z-10">
                                    <div className="flex justify-between items-start mb-2 md:mb-3">
                                        <p className="text-orange-100 text-[10px] md:text-xs font-semibold uppercase tracking-wider flex items-center"><i className="fas fa-wallet mr-1.5"></i> Estimasi Pencairan</p>
                                        <button onClick={() => syncData()} disabled={isLoadingSync} className={`flex items-center bg-white/20 hover:bg-white/30 px-2 py-1 rounded-full transition-all ${isLoadingSync ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                            <i className={`fas fa-sync-alt text-white mr-1.5 text-[10px] md:text-xs ${isLoadingSync ? 'animate-spin' : ''}`} />
                                            <span className="text-white text-[9px] md:text-[10px] font-bold">{isLoadingSync ? 'Memuat...' : 'Refresh'}</span>
                                        </button>
                                    </div>
                                    
                                    {/* Nilai Pencairan Bersih (Saldo - Potongan) */}
                                    <h2 className="text-2xl md:text-3xl lg:text-4xl font-black mb-2 md:mb-4 tracking-tight">{formatCurrency(keuangan.totalPencairan)}</h2>
                                    
                                    <div className="bg-[#993d00]/50 p-2.5 md:p-3 rounded-xl border border-white/10 space-y-1.5 text-[10px] md:text-xs mb-2 md:mb-3">
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-up text-green-400 mr-1.5"></i> Uang Barang (Belum Cair)</span><span className="font-bold">+{formatCurrency(keuangan.saldoBelumCair)}</span></div>
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-down text-red-300 mr-1.5"></i> Potongan Ongkir (Belum Cair)</span><span className="font-bold text-red-200">-{formatCurrency(keuangan.potonganBelumCair)}</span></div>
                                    </div>
                                    <div className="bg-green-600/90 border border-green-500 p-2 md:p-2.5 rounded-xl flex justify-between items-center shadow-inner">
                                       <span className="flex items-center text-[10px] md:text-xs font-bold text-green-50"><i className="fas fa-shield-alt text-green-200 mr-1.5"></i> Dana Telah Dicairkan</span>
                                       <span className="font-black text-xs md:text-sm text-white">{formatCurrency(keuangan.danaSudahCairBersih)}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Search & Filter Component */}
                            <div className="lg:col-span-2 bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center space-y-3 md:space-y-4">
                                <div className="relative">
                                    <i className="fas fa-search absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs md:text-sm"></i>
                                    <input type="text" placeholder="Cari Resi atau Nama Customer..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2.5 md:py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs md:text-sm outline-none focus:border-[#e65c00] focus:bg-white transition-colors" />
                                </div>
                                <div className="flex flex-col md:flex-row items-center gap-2 md:gap-3">
                                    <div className="relative w-full md:flex-1"><i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-gray-50 border border-gray-200 rounded-xl text-[10px] md:text-xs outline-none focus:border-[#e65c00] text-gray-600 font-medium" /></div>
                                    <span className="hidden md:block text-[10px] font-bold text-gray-400">Hingga</span>
                                    <div className="relative w-full md:flex-1"><i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-gray-50 border border-gray-200 rounded-xl text-[10px] md:text-xs outline-none focus:border-[#e65c00] text-gray-600 font-medium" /></div>
                                    {(startDate || endDate) && (<button onClick={() => { setStartDate(''); setEndDate(''); }} className="p-2 md:p-2.5 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors w-full md:w-auto flex justify-center items-center" title="Reset Tanggal"><i className="fas fa-times-circle"></i></button>)}
                                </div>
                                <div className="flex space-x-1.5 md:space-x-2 overflow-x-auto pb-1 scrollbar-hide w-full">
                                    {[{id:'semua', label:'Semua'}, {id:'siap_antar', label:'Proses'}, {id:'sukses', label:'Sukses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Batal'}].map(s => (
                                        <button key={s.id} onClick={() => setFilterStatus(s.id)} className={`px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-[10px] md:text-xs font-bold whitespace-nowrap transition-all border ${filterStatus === s.id ? 'bg-[#e65c00] text-white border-[#e65c00] shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50 hover:text-gray-700'}`}>{s.label}</button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* TAMPILAN LIST MELIPAT (ACCORDION) */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="px-3 py-2.5 md:px-4 md:py-3 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                                <h3 className="font-bold text-gray-700 text-xs md:text-sm"><i className="fas fa-list text-[#e65c00] mr-2"></i>Daftar Paket</h3>
                                <span className="text-[9px] md:text-[10px] font-bold bg-orange-100 text-[#e65c00] px-2.5 py-1 rounded-full">{filteredPkgs.length} Data</span>
                            </div>
                            
                            {filteredPkgs.length === 0 ? (
                                <div className="text-center py-12 md:py-16 bg-white">
                                    <i className="fas fa-box-open text-gray-300 mb-2 text-4xl md:text-5xl"></i>
                                    <p className="text-gray-500 font-medium text-xs md:text-sm">Tidak ada paket di periode ini.</p>
                                </div>
                            ) : (
                                <div className="flex flex-col divide-y divide-gray-100">
                                    {filteredPkgs.map((pkg, idx) => {
                                        const metode = String(pkg.metodeBayar).trim().toUpperCase();
                                        const hBarang = Number(pkg.hargaPaket) || 0;
                                        const tagihan = Number(pkg.totalTagihan) || 0;
                                        const ongkir = pkg.ongkirReal !== undefined ? Number(pkg.ongkirReal) : ((tagihan - hBarang > 0) ? (tagihan - hBarang) : 0);
                                        const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                        const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';

                                        let displayKurir = String(pkg.kurirId || '');
                                        let displayTgl = String(pkg.dateString || pkg.tanggal || '-');
                                        let displayInputTgl = String(pkg.tanggalInput || pkg.tanggal || '-');

                                        if (displayKurir.includes('T') && displayKurir.length > 10 && /\d/.test(displayKurir)) {
                                            let tempDate = displayKurir; displayKurir = displayTgl; displayTgl = tempDate;
                                        }
                                        if (!displayKurir || displayKurir === '' || displayKurir === 'undefined') displayKurir = '-';
                                        else if (displayKurir.includes('@')) displayKurir = displayKurir.split('@')[0];

                                        // LOGIKA BARU: PARSING TANGGAL CERDAS UNTUK WAKTU TERUPDATE (ANTI JAM "00:00 WIT")
                                        if (displayTgl !== '-') {
                                            try { 
                                                const rawDate = new Date(displayTgl);
                                                if (!isNaN(rawDate.getTime())) {
                                                    const datePart = rawDate.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                                                    const hasTimeComponent = displayTgl.includes(':') || displayTgl.includes(' ') || (displayTgl.includes('T') && !displayTgl.endsWith('T00:00:00') && !displayTgl.endsWith('T00:00:00.000Z') && !displayTgl.endsWith('00:00:00'));
                                                    const hourVal = rawDate.getHours();
                                                    const minuteVal = rawDate.getMinutes();

                                                    if (hasTimeComponent && (hourVal !== 0 || minuteVal !== 0)) {
                                                        displayTgl = datePart + " - " + rawDate.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) + " WIT";
                                                    } else {
                                                        displayTgl = datePart; 
                                                    }
                                                }
                                            } 
                                            catch(e) { 
                                                if (displayTgl.includes('T')) displayTgl = displayTgl.split('T')[0]; 
                                            }
                                        }

                                        // LOGIKA BARU: PARSING TANGGAL UNTUK WAKTU AWAL INPUT
                                        if (displayInputTgl !== '-') {
                                            try { 
                                                const rawDateInput = new Date(displayInputTgl);
                                                if (!isNaN(rawDateInput.getTime())) {
                                                    const datePartIn = rawDateInput.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                                                    const hasTimeComponentIn = displayInputTgl.includes(':') || displayInputTgl.includes(' ') || (displayInputTgl.includes('T') && !displayInputTgl.endsWith('T00:00:00') && !displayInputTgl.endsWith('T00:00:00.000Z') && !displayInputTgl.endsWith('00:00:00'));
                                                    const hourValIn = rawDateInput.getHours();
                                                    const minuteValIn = rawDateInput.getMinutes();

                                                    if (hasTimeComponentIn && (hourValIn !== 0 || minuteValIn !== 0)) {
                                                        displayInputTgl = datePartIn + " - " + rawDateInput.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) + " WIT";
                                                    } else {
                                                        displayInputTgl = datePartIn; 
                                                    }
                                                }
                                            } 
                                            catch(e) { 
                                                if (displayInputTgl.includes('T')) displayInputTgl = displayInputTgl.split('T')[0]; 
                                            }
                                        }

                                        const isExpanded = expandedIds.includes(pkg.packageId);

                                        return (
                                            <div key={idx} className="bg-white hover:bg-orange-50/20 transition-colors flex flex-col relative">
                                                {/* Garis Aksen Samping */}
                                                <div className={`absolute left-0 top-0 bottom-0 w-1 ${isSukses ? 'bg-green-500' : (String(pkg.status).toLowerCase() === 'cancel' ? 'bg-red-500' : (String(pkg.status).toLowerCase() === 'pending' ? 'bg-orange-500' : 'bg-blue-500'))}`}></div>

                                                {/* HEADER BARIS */}
                                                <div 
                                                    className="pl-2.5 md:pl-3 pr-2.5 md:pr-3 py-2.5 md:py-3 flex justify-between items-center cursor-pointer select-none gap-2"
                                                    onClick={() => toggleExpand(pkg.packageId)}
                                                >
                                                    <div className="flex-1 min-w-0 pr-1 ml-1.5">
                                                        <div className="font-bold text-gray-800 text-[11px] md:text-sm line-clamp-1">{pkg.customerName}</div>
                                                        <div className="flex flex-wrap items-center mt-1 gap-1">
                                                            <span className="font-mono text-[8px] md:text-[9px] font-bold text-[#e65c00] bg-orange-50 border border-orange-100 px-1 py-0.5 rounded">{pkg.packageId}</span>
                                                            <span className="text-[8px] md:text-[10px] text-gray-500 font-medium whitespace-nowrap">{displayTgl.split(" - ")[0]}</span>
                                                        </div>
                                                    </div>

                                                    <div className="flex-shrink-0 flex items-center justify-center">
                                                        {pkg.fotoBukti && String(pkg.fotoBukti).trim() !== '' ? (
                                                            APPSHEET_APP_ID ? (
                                                                <div 
                                                                    className="relative w-9 h-9 md:w-11 md:h-11 rounded-md border border-gray-200 overflow-hidden shadow-sm hover:opacity-80 transition-opacity"
                                                                    onClick={(e) => {
                                                                        e.stopPropagation(); 
                                                                        setSelectedImage(`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`);
                                                                    }}
                                                                >
                                                                    <img 
                                                                        src={`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`} 
                                                                        alt="Thumb" 
                                                                        className="w-full h-full object-cover"
                                                                        loading="lazy"
                                                                    />
                                                                    <div className="absolute inset-0 bg-black/10 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                                                                        <i className="fas fa-search-plus text-white text-[8px] md:text-[10px]"></i>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="w-9 h-9 md:w-11 md:h-11 bg-blue-50 rounded-md border border-blue-100 flex items-center justify-center text-blue-500" title="Foto Tersedia">
                                                                    <i className="fas fa-check-circle text-sm md:text-base"></i>
                                                                </div>
                                                            )
                                                        ) : (
                                                            <div className="w-9 h-9 md:w-11 md:h-11 bg-gray-50 rounded-md border border-dashed border-gray-200 flex flex-col items-center justify-center" title="Belum Ada Foto">
                                                                <i className="fas fa-image text-gray-300 text-xs md:text-sm"></i>
                                                            </div>
                                                        )}
                                                    </div>

                                                    <div className="flex flex-col items-end flex-shrink-0 space-y-1 w-[70px] md:w-[85px]">
                                                        <StatusBadge status={pkg.status} />
                                                        <div className="flex items-center space-x-1 md:space-x-1.5 text-gray-400 mt-1">
                                                            
                                                            {/* LOGIKA UANG DI BARIS DEPAN */}
                                                            {isSukses ? (
                                                                metode === 'TF OLSHOP' ? (
                                                                    <span className="text-[9px] md:text-[11px] font-bold truncate text-red-500">
                                                                        -{formatCurrency(ongkir)}
                                                                    </span>
                                                                ) : (
                                                                    <span className={`text-[9px] md:text-[11px] font-bold truncate ${isCair ? 'text-green-600' : 'text-[#e65c00]'}`}>
                                                                        +{formatCurrency(hBarang)}
                                                                    </span>
                                                                )
                                                            ) : (
                                                                <span className="text-[9px] md:text-[11px] font-bold truncate text-gray-400">-</span>
                                                            )}

                                                            <div className={`w-3.5 h-3.5 md:w-4 md:h-4 flex items-center justify-center flex-shrink-0 rounded-full ${isExpanded ? 'bg-orange-100 text-[#e65c00]' : 'bg-gray-100 text-gray-400'}`}>
                                                                <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'} text-[7px] md:text-[8px] transition-transform`}></i>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* DETAIL KONTEN DENGAN PETA TRACKING MAP DAN TIMELINE DINAMIS */}
                                                {isExpanded && (
                                                    <div className="pl-3 pr-3 pb-3 pt-1 bg-gray-50/80 border-t border-gray-100 flex flex-col animate-fade-in-down">
                                                        <div className="flex flex-wrap gap-x-2 gap-y-1.5 mt-1.5">
                                                            <div className="text-[10px] md:text-[11px] text-gray-600 bg-white border border-gray-200 px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-phone text-[#e65c00] mr-1.5"></i> {pkg.customerPhone}</div>
                                                            <div className="text-[10px] md:text-[11px] text-gray-600 bg-white border border-gray-200 px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-truck text-[#e65c00] mr-1.5"></i> <span className="font-medium">{displayKurir}</span></div>
                                                        </div>

                                                        {/* TIMELINE PELACAKAN */}
                                                        <div className="mt-3 bg-white p-3 rounded-xl border border-gray-200 shadow-sm text-[10px] md:text-xs">
                                                            <h5 className="font-bold text-[#e65c00] uppercase mb-2 text-[9px] tracking-wider"><i className="fas fa-history mr-1.5"></i> Histori Perjalanan Paket</h5>
                                                            <div className="space-y-3 relative border-l border-orange-200 ml-2.5 pl-4">
                                                                
                                                                {/* Titik 1: Paket Diinput (Selalu tampil dengan waktu asli) */}
                                                                <div className="relative">
                                                                    <div className="absolute -left-[21px] top-0.5 bg-green-500 w-2.5 h-2.5 rounded-full border border-white"></div>
                                                                    <p className="font-bold text-gray-700">Paket Diterima di Gudang Exceed</p>
                                                                    <p className="text-gray-400 text-[9px]"><span className="font-bold text-gray-500">{displayInputTgl}</span> - Sistem Terdaftar</p>
                                                                </div>

                                                                {/* Titik 2: Proses Antar */}
                                                                <div className="relative">
                                                                    <div className={`absolute -left-[21px] top-0.5 w-2.5 h-2.5 rounded-full border border-white ${pkg.status !== 'siap_antar' && pkg.status !== 'proses' ? 'bg-green-500' : 'bg-blue-500 animate-ping'}`}></div>
                                                                    {pkg.status === 'siap_antar' || pkg.status === 'proses' ? (
                                                                        <div>
                                                                            <p className="font-bold text-blue-600">Sedang Di Proses Antar oleh Kurir {displayKurir}</p>
                                                                            <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-600">{displayTgl}</span></p>
                                                                        </div>
                                                                    ) : (
                                                                        <div>
                                                                            <p className="font-semibold text-gray-600">Diserahkan Ke Kurir ({displayKurir})</p>
                                                                            <p className="text-gray-400 text-[9px]">Paket berhasil disortir dan dibawa kurir</p>
                                                                        </div>
                                                                    )}
                                                                </div>

                                                                {/* Titik 3: Status Lanjutan (Pending/Cancel/Sukses) */}
                                                                {isSukses && (
                                                                    <div className="relative">
                                                                        <div className="absolute -left-[21px] top-0.5 bg-green-500 w-2.5 h-2.5 rounded-full border border-white"></div>
                                                                        <p className="font-bold text-green-600">Paket Sukses Diterima</p>
                                                                        <p className="text-gray-500 text-[9px]">Diselesaikan pada: <span className="font-bold text-gray-600">{displayTgl}</span></p>
                                                                    </div>
                                                                )}
                                                                
                                                                {String(pkg.status).toLowerCase() === 'cancel' && (
                                                                    <div className="relative">
                                                                        <div className="absolute -left-[21px] top-0.5 bg-red-500 w-2.5 h-2.5 rounded-full border border-white"></div>
                                                                        <p className="font-bold text-red-600">Paket Batal / Cancel</p>
                                                                        <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-600">{displayTgl}</span></p>
                                                                    </div>
                                                                )}
                                                                
                                                                {String(pkg.status).toLowerCase() === 'pending' && (
                                                                    <div className="relative">
                                                                        <div className="absolute -left-[21px] top-0.5 bg-orange-500 w-2.5 h-2.5 rounded-full border border-white animate-pulse"></div>
                                                                        <p className="font-bold text-orange-600">Paket Pending / Tertunda</p>
                                                                        <p className="text-gray-500 text-[9px]">Diupdate pada: <span className="font-bold text-gray-600">{displayTgl}</span></p>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>

                                                        {/* ACTIVE MAP TRACKING GEOLOKASI (Leaflet Map) */}
                                                        {isSukses && (
                                                            <TrackingMap packageId={pkg.packageId} address={pkg.address} status={pkg.status} />
                                                        )}

                                                        {/* Kotak Keuangan Detail */}
                                                        <div className="bg-white rounded-xl p-2.5 flex justify-between items-center border border-gray-200 shadow-sm mt-3">
                                                            <span className="text-[9px] md:text-[10px] font-black text-gray-500 uppercase tracking-widest"><i className="fas fa-file-invoice-dollar mr-1 text-[#e65c00]"></i> Rincian Uang</span>
                                                            <div className="text-right">
                                                                {isSukses ? (
                                                                    (metode === 'TF OLSHOP') ? (
                                                                        <div>
                                                                            <div className={`font-black text-xs md:text-sm ${isCair ? 'text-gray-400 line-through' : 'text-red-600'}`}>-{formatCurrency(ongkir)}</div>
                                                                            <div className={`text-[7px] md:text-[8px] font-black uppercase mt-0.5 px-1.5 py-0.5 rounded-full inline-block border ${isCair ? 'bg-gray-100 text-gray-500 border-gray-200' : 'bg-red-100 text-red-700 border-red-200'}`}>Potongan Ongkir ({isCair ? 'SUDAH LUNAS' : 'BELUM DILUNASI'})</div>
                                                                        </div>
                                                                    ) : (metode === 'CASH' || metode === 'TF KANTOR') ? (
                                                                        <div>
                                                                            <div className={`font-black text-xs md:text-sm ${isCair ? 'text-green-600' : 'text-[#e65c00]'}`}>+{formatCurrency(hBarang)}</div>
                                                                            <div className={`text-[7px] md:text-[8px] font-black uppercase mt-0.5 px-1.5 py-0.5 rounded-full inline-block border ${isCair ? 'bg-green-100 text-green-700 border-green-200' : 'bg-orange-100 text-orange-700 border-orange-200'}`}>Pencairan {metode} ({isCair ? 'CAIR' : 'BELUM CAIR'})</div>
                                                                        </div>
                                                                    ) : (
                                                                        <div>
                                                                            <div className="font-bold text-gray-500 text-xs md:text-sm">{formatCurrency(hBarang)}</div>
                                                                            <div className="text-[8px] font-bold text-gray-400 uppercase mt-0.5">Metode Kosong</div>
                                                                        </div>
                                                                    )
                                                                ) : (
                                                                    <div>
                                                                        <div className="font-bold text-gray-600 text-xs md:text-sm">{formatCurrency(hBarang)}</div>
                                                                        <div className="text-[8px] font-bold text-gray-400 uppercase mt-0.5 tracking-wide">Nilai Barang</div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="text-center pt-2 pb-2"><p className="text-[9px] md:text-[10px] text-gray-400 font-medium">Exceed Express Logistics &copy; 2026</p></div>
                    </div>

                    {/* MODAL FOTO MEMBESAR */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-[999] flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 transition-opacity"
                            onClick={() => setSelectedImage(null)}
                        >
                            <div className="relative w-full max-w-md flex flex-col items-center transform transition-all scale-100" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-lg">
                                    <i className="fas fa-times text-xl"></i>
                                </button>
                                <img src={selectedImage} alt="Foto Paket Membesar" className="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border-4 border-white/10 bg-black/50" />
                                <p className="text-white font-black mt-4 tracking-widest text-sm uppercase flex items-center bg-black/50 px-4 py-2 rounded-full border border-white/10">
                                    <i className="fas fa-camera mr-2 text-blue-400"></i> FOTO PAKET
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
