<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exceed Express - Portal Klien</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { touch-action: manipulation; background-color: #f9fafb; font-family: 'Segoe UI', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* Animasi Buka Tutup List */
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }
    </style>
</head>
<body class="antialiased text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const loadLocal = (key, fallback) => {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
        };

        function App() {
            // =====================================================================
            // URL APPS SCRIPT & ID APPSHEET ANDA
            // =====================================================================
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
            const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

            // State User & UI
            const [userProfile, setUserProfile] = useState(() => loadLocal('exceed_olshopProfile', null));
            const [isLoadingSync, setIsLoadingSync] = useState(false);
            const [syncMessage, setSyncMessage] = useState({ text: '', type: '' });
            
            const [loginUname, setLoginUname] = useState('');
            const [loginPass, setLoginPass] = useState('');

            // Data State
            const [packages, setPackages] = useState(() => loadLocal('exceed_packages', []));
            const [masterOlshops, setMasterOlshops] = useState(() => loadLocal('exceed_masterOlshops', []));
            
            // Filter State
            const [filterStatus, setFilterStatus] = useState('semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');

            // State Modal Gambar
            const [selectedImage, setSelectedImage] = useState(null);

            // State List Melipat (Accordion) - Mencatat baris mana yang sedang dipencet/dibuka
            const [expandedIds, setExpandedIds] = useState([]);

            const toggleExpand = (id) => {
                setExpandedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
            };

            // Save to Local Storage
            useEffect(() => { localStorage.setItem('exceed_olshopProfile', JSON.stringify(userProfile)); }, [userProfile]);
            useEffect(() => { localStorage.setItem('exceed_packages', JSON.stringify(packages)); }, [packages]);
            useEffect(() => { localStorage.setItem('exceed_masterOlshops', JSON.stringify(masterOlshops)); }, [masterOlshops]);

            // Fetch Data dari Apps Script
            const syncData = async (isLoginAttempt = false) => {
                setIsLoadingSync(true);
                if(!isLoginAttempt) setSyncMessage({ text: '', type: '' });
                
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setMasterOlshops(result.data.olshop || []);
                        setPackages(result.data.packages || []);
                        if(!isLoginAttempt) {
                            setSyncMessage({ text: 'Data berhasil diperbarui secara Real-time!', type: 'success' });
                            setTimeout(() => setSyncMessage({ text: '', type: '' }), 3000);
                        }
                        return result.data.olshop;
                    } else {
                        setSyncMessage({ text: 'Gagal memuat data dari server.', type: 'error' });
                        return false;
                    }
                } catch (error) {
                    setSyncMessage({ text: 'Koneksi terputus. Cek internet Anda.', type: 'error' });
                    return false;
                } finally {
                    setIsLoadingSync(false);
                }
            };

            // Init Load
            useEffect(() => {
                if (masterOlshops.length === 0 && !userProfile) {
                    syncData();
                }
            }, []);

            // Login Handler KHUSUS OLSHOP
            const handleLogin = async (e) => {
                e.preventDefault();
                setSyncMessage({ text: 'Sinkronisasi data terbaru...', type: 'info' });

                const currentOlshops = await syncData(true) || [];
                const uname = loginUname.trim().toLowerCase();
                const pass = loginPass.trim();

                const validUser = currentOlshops.find(o => 
                    String(o.nama).trim().toLowerCase() === uname && 
                    String(o.phone).trim() === pass
                );

                if (validUser) {
                    setUserProfile({ id: validUser.id, name: validUser.nama });
                    setLoginUname(''); setLoginPass('');
                    syncData(); // Tarik data paket setelah login
                } else {
                    setSyncMessage({ text: 'Nama Toko atau Nomor WA tidak ditemukan!', type: 'error' });
                }
            };

            const handleLogout = () => {
                setUserProfile(null);
                setPackages([]);
            };

            // ==========================================
            // RENDER HALAMAN LOGIN
            // ==========================================
            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-[#e65c00] shadow-lg" style={{ borderBottomLeftRadius: '100% 20%', borderBottomRightRadius: '100% 20%' }}></div>
                        
                        <div className="bg-white/95 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10 border border-white/50 mt-8">
                            <div className="w-20 h-20 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-[#e65c00] shadow-inner">
                                <i className="fas fa-box text-4xl"></i>
                            </div>
                            <h1 className="text-3xl font-black text-gray-800 tracking-tight">Portal Klien</h1>
                            <p className="text-sm text-gray-500 mb-8 font-medium">Exceed Express Tracking</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                {syncMessage.text && (
                                    <div className={`text-xs py-3 px-3 rounded-xl font-bold flex items-start text-left ${syncMessage.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : syncMessage.type === 'info' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-green-50 text-green-700 border border-green-100'}`}>
                                        <i className={`fas ${syncMessage.type === 'error' ? 'fa-exclamation-triangle' : syncMessage.type === 'info' ? 'fa-spinner fa-spin' : 'fa-check-circle'} mr-2 mt-0.5`}></i>
                                        <span>{syncMessage.text}</span>
                                    </div>
                                )}

                                <div className="relative">
                                    <i className="fas fa-store absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" required value={loginUname} onChange={(e) => setLoginUname(e.target.value)} placeholder="Ketik Nama Toko Anda" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:bg-white transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                
                                <div className="relative">
                                    <i className="fas fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="Nomor WhatsApp" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:bg-white transition-all font-medium" disabled={isLoadingSync} />
                                </div>

                                <button type="submit" disabled={isLoadingSync} className={`w-full text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center mt-2 ${isLoadingSync ? 'bg-gray-400 cursor-not-allowed shadow-none' : 'bg-[#e65c00] hover:bg-[#cc5200] shadow-[#e65c00]/30'}`}>
                                    {isLoadingSync ? <><i className="fas fa-sync-alt animate-spin mr-2"></i> Memproses...</> : 'Masuk ke Portal'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ==========================================
            // FILTER & LOGIKA KEUANGAN DASHBOARD
            // ==========================================
            const myPackages = packages.filter(p => {
                const uName = String(userProfile.name).trim().toLowerCase();
                const uId = String(userProfile.id).trim().toLowerCase();
                const pOlshopName = String(p.olshopName).trim().toLowerCase();
                
                if (pOlshopName === uName || pOlshopName === uId || pOlshopName.includes(uName) || uName.includes(pOlshopName)) return true;
                
                for (const key in p) {
                    const val = String(p[key]).trim().toLowerCase();
                    if (val === uName || val === uId || val.includes(uName)) return true;
                }
                return false;
            });
            
            let filteredPkgs = myPackages;

            // 1. Filter Tanggal
            if (startDate || endDate) {
               filteredPkgs = filteredPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggal || '';
                  if (!pDateStr) return false;

                  let normalizedDateStr = "";

                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                          const parts = pDateStr.split('/');
                          if (parts.length === 3) {
                              d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                          }
                      }
                      if (!isNaN(d.getTime())) {
                          const year = d.getFullYear();
                          const month = String(d.getMonth() + 1).padStart(2, '0');
                          const day = String(d.getDate()).padStart(2, '0');
                          normalizedDateStr = `${year}-${month}-${day}`;
                      } else {
                          normalizedDateStr = pDateStr.split('T')[0]; 
                      }
                  } catch(e) {
                      normalizedDateStr = pDateStr.split('T')[0];
                  }

                  const sDate = startDate ? startDate : "2000-01-01";
                  const eDate = endDate ? endDate : "2100-01-01";
                  return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
               });
            }

            // 2. Filter Status & Search
            if (filterStatus !== 'semua') {
                filteredPkgs = filteredPkgs.filter(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if (filterStatus === 'siap_antar') return stat === 'siap_antar' || stat === 'proses';
                    return stat === filterStatus;
                });
            }

            if (searchQuery) {
                filteredPkgs = filteredPkgs.filter(p => p.customerName.toLowerCase().includes(searchQuery.toLowerCase()) || p.packageId.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            // 3. Kalkulasi Keuangan
            const hitungKeuangan = () => {
                let saldoBelumCair = 0; let saldoSudahCair = 0; let potonganOngkir = 0; 
                filteredPkgs.forEach(p => {
                    if (String(p.status).toLowerCase() === 'sukses') {
                        const metode = String(p.metodeBayar).trim().toUpperCase();
                        const hargaPkt = Number(p.hargaPaket) || 0;
                        const tagihanTotal = Number(p.totalTagihan) || 0;
                        const ongkirDihitung = p.ongkirReal !== undefined ? Number(p.ongkirReal) : ((tagihanTotal - hargaPkt > 0) ? (tagihanTotal - hargaPkt) : 0);
                        const isCair = String(p.statusPencairan).toLowerCase() === 'cair';

                        if (metode === 'TF OLSHOP') {
                            potonganOngkir += ongkirDihitung;
                        } else if (metode === 'CASH' || metode === 'TF KANTOR') {
                            if (isCair) saldoSudahCair += hargaPkt;
                            else saldoBelumCair += hargaPkt;
                        }
                    }
                });
                return { saldoBelumCair, saldoSudahCair, potonganOngkir, totalPencairanEstimasi: saldoBelumCair - potonganOngkir };
            };

            const keuangan = hitungKeuangan();

            // DIPERKECIL: Ukuran badge status disesuaikan
            const StatusBadge = ({ status }) => {
                const s = String(status).toLowerCase();
                if(s === 'sukses') return <span className="bg-green-100 text-green-700 border-green-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-black uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-check-circle mr-1"></i>Sukses</span>;
                if(s === 'cancel') return <span className="bg-red-100 text-red-700 border-red-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-black uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-times-circle mr-1"></i>Cancel</span>;
                if(s === 'pending') return <span className="bg-orange-100 text-orange-700 border-orange-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-black uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-clock mr-1"></i>Tertunda</span>;
                return <span className="bg-blue-100 text-blue-700 border-blue-200 px-2 py-0.5 rounded text-[8px] md:text-[9px] font-black uppercase border inline-flex items-center whitespace-nowrap"><i className="fas fa-truck mr-1"></i>Proses</span>;
            };

            return (
                <div className="min-h-screen bg-gray-100 font-sans w-full md:max-w-3xl lg:max-w-5xl xl:max-w-6xl mx-auto shadow-2xl relative flex flex-col">
                    {/* PERUBAHAN: Header menjadi Biru Navy Gelap & Tulisan Putih */}
                    <header className="bg-[#0f172a] px-4 py-3 md:py-4 shadow-md z-10 sticky top-0 flex justify-between items-center border-b border-slate-800">
                        <div>
                            <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">DASHBOARD TOKO</p>
                            <h1 className="text-lg md:text-xl lg:text-2xl font-black text-white leading-none truncate max-w-[200px] md:max-w-[400px]">{userProfile.name}</h1>
                        </div>
                        <button onClick={handleLogout} className="text-[10px] md:text-xs font-bold text-slate-200 hover:text-white bg-slate-800 hover:bg-red-500 border border-slate-700 px-3 py-1.5 md:px-4 md:py-1.5 rounded-lg transition-colors flex items-center shadow-sm">
                            Keluar <i className="fas fa-sign-out-alt ml-1.5 md:ml-2"></i>
                        </button>
                    </header>

                    {/* DIPERKECIL: Padding keseluruhan halaman dikurangi */}
                    <div className="flex-1 overflow-y-auto p-3 md:p-5 lg:p-6 space-y-3 md:space-y-4 pb-8">
                        
                        {/* Area Atas: Saldo & Filter */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 md:gap-4">
                            
                            {/* Kartu Saldo */}
                            <div className="bg-gradient-to-br from-[#e65c00] to-[#b34700] rounded-2xl p-4 md:p-5 text-white shadow-md relative overflow-hidden h-full flex flex-col justify-between">
                                <div className="absolute -right-2 -top-2 opacity-10">
                                    <i className="fas fa-wallet text-[100px] md:text-[120px]"></i>
                                </div>
                                <div className="relative z-10">
                                    <div className="flex justify-between items-start mb-2 md:mb-3">
                                        <p className="text-orange-100 text-[10px] md:text-xs font-semibold uppercase tracking-wider flex items-center"><i className="fas fa-wallet mr-1.5"></i> Estimasi Pencairan</p>
                                        <button onClick={() => syncData()} disabled={isLoadingSync} className={`flex items-center bg-white/20 hover:bg-white/30 px-2 py-1 rounded-full transition-all ${isLoadingSync ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                            <i className={`fas fa-sync-alt text-white mr-1.5 text-[10px] md:text-xs ${isLoadingSync ? 'animate-spin' : ''}`}></i>
                                            <span className="text-white text-[9px] md:text-[10px] font-bold">{isLoadingSync ? 'Memuat...' : 'Refresh'}</span>
                                        </button>
                                    </div>
                                    <h2 className="text-2xl md:text-3xl lg:text-4xl font-black mb-2 md:mb-4 tracking-tight">{formatCurrency(keuangan.totalPencairanEstimasi)}</h2>
                                    <div className="bg-[#993d00]/50 p-2.5 md:p-3 rounded-xl border border-white/10 space-y-1.5 text-[10px] md:text-xs mb-2 md:mb-3">
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-up text-green-400 mr-1.5"></i> Pencairan (Cash/TF Ktr)</span><span className="font-bold">+{formatCurrency(keuangan.saldoBelumCair)}</span></div>
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-down text-red-300 mr-1.5"></i> Potongan Ongkir</span><span className="font-bold text-red-200">-{formatCurrency(keuangan.potonganOngkir)}</span></div>
                                    </div>
                                    <div className="bg-green-600/90 border border-green-500 p-2 md:p-2.5 rounded-xl flex justify-between items-center shadow-inner">
                                       <span className="flex items-center text-[10px] md:text-xs font-bold text-green-50"><i className="fas fa-shield-alt text-green-200 mr-1.5"></i> Dana Telah Dicairkan</span>
                                       <span className="font-black text-xs md:text-sm text-white">{formatCurrency(keuangan.saldoSudahCair)}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Search & Filter Component */}
                            <div className="lg:col-span-2 bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center space-y-3 md:space-y-4">
                                <div className="relative">
                                    <i className="fas fa-search absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs md:text-sm"></i>
                                    <input type="text" placeholder="Cari Resi atau Nama Customer..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2.5 md:py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs md:text-sm outline-none focus:border-[#e65c00] focus:bg-white transition-colors" />
                                </div>
                                <div className="flex flex-col md:flex-row items-center gap-2 md:gap-3">
                                    <div className="relative w-full md:flex-1"><i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-gray-50 border border-gray-200 rounded-xl text-[10px] md:text-xs outline-none focus:border-[#e65c00] text-gray-600 font-medium" /></div>
                                    <span className="hidden md:block text-[10px] font-bold text-gray-400">Hingga</span>
                                    <div className="relative w-full md:flex-1"><i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-gray-50 border border-gray-200 rounded-xl text-[10px] md:text-xs outline-none focus:border-[#e65c00] text-gray-600 font-medium" /></div>
                                    {(startDate || endDate) && (<button onClick={() => { setStartDate(''); setEndDate(''); }} className="p-2 md:p-2.5 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors w-full md:w-auto flex justify-center items-center" title="Reset Tanggal"><i className="fas fa-times-circle"></i></button>)}
                                </div>
                                <div className="flex space-x-1.5 md:space-x-2 overflow-x-auto pb-1 scrollbar-hide w-full">
                                    {[{id:'semua', label:'Semua'}, {id:'siap_antar', label:'Proses'}, {id:'sukses', label:'Sukses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Batal'}].map(s => (
                                        <button key={s.id} onClick={() => setFilterStatus(s.id)} className={`px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-[10px] md:text-xs font-bold whitespace-nowrap transition-all border ${filterStatus === s.id ? 'bg-[#e65c00] text-white border-[#e65c00] shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50 hover:text-gray-700'}`}>{s.label}</button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* TAMPILAN LIST MELIPAT (ACCORDION / BISA DIKLIK) */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                            <div className="px-3 py-2.5 md:px-4 md:py-3 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                                <h3 className="font-bold text-gray-700 text-xs md:text-sm"><i className="fas fa-list text-[#e65c00] mr-2"></i>Daftar Paket</h3>
                                <span className="text-[9px] md:text-[10px] font-bold bg-orange-100 text-[#e65c00] px-2.5 py-1 rounded-full">{filteredPkgs.length} Data</span>
                            </div>
                            
                            {filteredPkgs.length === 0 ? (
                                <div className="text-center py-12 md:py-16 bg-white">
                                    <i className="fas fa-box-open text-gray-300 mb-2 text-4xl md:text-5xl"></i>
                                    <p className="text-gray-500 font-medium text-xs md:text-sm">Tidak ada paket di periode ini.</p>
                                </div>
                            ) : (
                                <div className="flex flex-col divide-y divide-gray-100">
                                    {filteredPkgs.map((pkg, idx) => {
                                        const metode = String(pkg.metodeBayar).trim().toUpperCase();
                                        const hBarang = Number(pkg.hargaPaket) || 0;
                                        const tagihan = Number(pkg.totalTagihan) || 0;
                                        const ongkir = pkg.ongkirReal !== undefined ? Number(pkg.ongkirReal) : ((tagihan - hBarang > 0) ? (tagihan - hBarang) : 0);
                                        const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                        const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';

                                        let displayKurir = String(pkg.kurirId || '');
                                        let displayTgl = String(pkg.dateString || pkg.tanggal || '-');

                                        if (displayKurir.includes('T') && displayKurir.length > 10 && /\d/.test(displayKurir)) {
                                            let tempDate = displayKurir; displayKurir = displayTgl; displayTgl = tempDate;
                                        }
                                        if (!displayKurir || displayKurir === '' || displayKurir === 'undefined') displayKurir = '-';
                                        else if (displayKurir.includes('@')) displayKurir = displayKurir.split('@')[0];

                                        if (displayTgl !== '-') {
                                            if (displayTgl.includes('T')) {
                                                try { displayTgl = new Date(displayTgl).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: '2-digit'}); } 
                                                catch(e) { displayTgl = displayTgl.split('T')[0]; }
                                            } else {
                                                try { let d = new Date(displayTgl); if(!isNaN(d.getTime())) displayTgl = d.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: '2-digit'}); } catch(e) {}
                                            }
                                        }

                                        const isExpanded = expandedIds.includes(pkg.packageId);

                                        return (
                                            <div key={idx} className="bg-white hover:bg-orange-50/20 transition-colors flex flex-col relative">
                                                {/* Garis Aksen Samping berdasarkan Status */}
                                                <div className={`absolute left-0 top-0 bottom-0 w-1 ${isSukses ? 'bg-green-500' : (String(pkg.status).toLowerCase() === 'cancel' ? 'bg-red-500' : 'bg-[#e65c00]')}`}></div>

                                                {/* HEADER BARIS (SELALU MUNCUL, BISA DIKLIK) - DIPERKECIL PADDING & FONT */}
                                                <div 
                                                    className="pl-2.5 md:pl-3 pr-2.5 md:pr-3 py-2.5 md:py-3 flex justify-between items-center cursor-pointer select-none gap-2"
                                                    onClick={() => toggleExpand(pkg.packageId)}
                                                >
                                                    {/* KIRI: Info Utama */}
                                                    <div className="flex-1 min-w-0 pr-1">
                                                        <div className="font-bold text-gray-800 text-[11px] md:text-sm line-clamp-1">{pkg.customerName}</div>
                                                        <div className="flex flex-wrap items-center mt-1 gap-1">
                                                            <span className="font-mono text-[8px] md:text-[9px] font-bold text-[#e65c00] bg-orange-50 border border-orange-100 px-1 py-0.5 rounded">{pkg.packageId}</span>
                                                            <span className="text-[8px] md:text-[10px] text-gray-500 font-medium whitespace-nowrap">{displayTgl}</span>
                                                        </div>
                                                    </div>

                                                    {/* TENGAH: Thumbnail Foto (Mungil) */}
                                                    <div className="flex-shrink-0 flex items-center justify-center">
                                                        {pkg.fotoBukti && String(pkg.fotoBukti).trim() !== '' ? (
                                                            APPSHEET_APP_ID ? (
                                                                <div 
                                                                    className="relative w-9 h-9 md:w-11 md:h-11 rounded-md border border-gray-200 overflow-hidden shadow-sm hover:opacity-80 transition-opacity"
                                                                    onClick={(e) => {
                                                                        e.stopPropagation(); // Mencegah baris melar saat foto diklik
                                                                        setSelectedImage(`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`);
                                                                    }}
                                                                >
                                                                    <img 
                                                                        src={`https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(pkg.fotoBukti)}`} 
                                                                        alt="Thumb" 
                                                                        className="w-full h-full object-cover"
                                                                        loading="lazy"
                                                                    />
                                                                    <div className="absolute inset-0 bg-black/10 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                                                                        <i className="fas fa-search-plus text-white text-[8px] md:text-[10px]"></i>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="w-9 h-9 md:w-11 md:h-11 bg-blue-50 rounded-md border border-blue-100 flex items-center justify-center text-blue-500" title="Foto Tersedia">
                                                                    <i className="fas fa-check-circle text-sm md:text-base"></i>
                                                                </div>
                                                            )
                                                        ) : (
                                                            <div className="w-9 h-9 md:w-11 md:h-11 bg-gray-50 rounded-md border border-dashed border-gray-200 flex flex-col items-center justify-center" title="Belum Ada Foto">
                                                                <i className="fas fa-image text-gray-300 text-xs md:text-sm"></i>
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* KANAN: Status & Uang */}
                                                    <div className="flex flex-col items-end flex-shrink-0 space-y-1 w-[65px] md:w-[85px]">
                                                        <StatusBadge status={pkg.status} />
                                                        <div className="flex items-center space-x-1 md:space-x-1.5 text-gray-400 mt-1">
                                                            <span className={`text-[9px] md:text-[11px] font-bold truncate ${isSukses && isCair ? 'text-green-600' : (isSukses ? 'text-[#e65c00]' : 'text-gray-400')}`}>
                                                                {isSukses && (metode === 'CASH' || metode === 'TF KANTOR') ? formatCurrency(hBarang) : (isSukses && metode === 'TF OLSHOP' ? `-${formatCurrency(ongkir)}` : '-')}
                                                            </span>
                                                            <div className={`w-3.5 h-3.5 md:w-4 md:h-4 flex items-center justify-center flex-shrink-0 rounded-full ${isExpanded ? 'bg-orange-100 text-[#e65c00]' : 'bg-gray-100 text-gray-400'}`}>
                                                                <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'} text-[7px] md:text-[8px] transition-transform`}></i>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* DETAIL KONTEN (MUNCUL HANYA JIKA DIKLIK) */}
                                                {isExpanded && (
                                                    <div className="pl-3 pr-3 pb-3 pt-1 bg-gray-50/80 border-t border-gray-100 flex flex-col animate-fade-in-down">
                                                        {/* Info Kontak & Kurir */}
                                                        <div className="flex flex-wrap gap-x-2 gap-y-1.5 mt-1.5">
                                                            <div className="text-[10px] md:text-[11px] text-gray-600 bg-white border border-gray-200 px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-phone text-[#e65c00] mr-1.5"></i> {pkg.customerPhone}</div>
                                                            <div className="text-[10px] md:text-[11px] text-gray-600 bg-white border border-gray-200 px-2 py-1 rounded-md flex items-center shadow-sm"><i className="fas fa-truck text-[#e65c00] mr-1.5"></i> <span className="font-medium">{displayKurir}</span></div>
                                                        </div>

                                                        {/* Kotak Keuangan Detail */}
                                                        <div className="bg-white rounded-md p-2.5 flex justify-between items-center border border-gray-200 shadow-sm mt-2.5">
                                                            <span className="text-[9px] md:text-[10px] font-black text-gray-500 uppercase tracking-widest"><i className="fas fa-file-invoice-dollar mr-1 text-[#e65c00]"></i> Rincian Uang</span>
                                                            <div className="text-right">
                                                                {isSukses ? (
                                                                    (metode === 'TF OLSHOP') ? (
                                                                        <div>
                                                                            <div className="font-black text-red-600 text-xs md:text-sm">-{formatCurrency(ongkir)}</div>
                                                                            <div className="text-[8px] font-bold text-red-400 uppercase mt-0.5 tracking-wide">Potongan Ongkir ({metode})</div>
                                                                        </div>
                                                                    ) : (metode === 'CASH' || metode === 'TF KANTOR') ? (
                                                                        <div>
                                                                            <div className={`font-black text-xs md:text-sm ${isCair ? 'text-green-600' : 'text-[#e65c00]'}`}>{formatCurrency(hBarang)}</div>
                                                                            <div className={`text-[7px] md:text-[8px] font-black uppercase mt-0.5 px-1.5 py-0.5 rounded-full inline-block border ${isCair ? 'bg-green-100 text-green-700 border-green-200' : 'bg-orange-100 text-orange-700 border-orange-200'}`}>{isCair ? 'TELAH CAIR' : 'BELUM CAIR'}</div>
                                                                        </div>
                                                                    ) : (
                                                                        <div>
                                                                            <div className="font-bold text-gray-500 text-xs md:text-sm">{formatCurrency(hBarang)}</div>
                                                                            <div className="text-[8px] font-bold text-gray-400 uppercase mt-0.5">Metode Kosong</div>
                                                                        </div>
                                                                    )
                                                                ) : (
                                                                    <div>
                                                                        <div className="font-bold text-gray-600 text-xs md:text-sm">{formatCurrency(hBarang)}</div>
                                                                        <div className="text-[8px] font-bold text-gray-400 uppercase mt-0.5 tracking-wide">Nilai Barang</div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="text-center pt-2 pb-2"><p className="text-[9px] md:text-[10px] text-gray-400 font-medium">Exceed Express Logistics &copy; 2026</p></div>
                    </div>

                    {/* MODAL FOTO MEMBESAR */}
                    {selectedImage && (
                        <div 
                            className="fixed inset-0 z-[999] flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 transition-opacity"
                            onClick={() => setSelectedImage(null)}
                        >
                            <div 
                               className="relative w-full max-w-lg md:max-w-2xl lg:max-w-4xl flex flex-col items-center transform transition-all scale-100"
                               onClick={(e) => e.stopPropagation()} 
                            >
                                <button 
                                    onClick={() => setSelectedImage(null)}
                                    className="absolute -top-14 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center transition-colors shadow-xl border border-white/20"
                                >
                                    <i className="fas fa-times text-xl md:text-2xl"></i>
                                </button>
                                <img 
                                    src={selectedImage} 
                                    alt="Foto Paket Membesar" 
                                    className="w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl border-4 border-white/10 bg-black/50"
                                />
                                <p className="text-white font-black mt-4 tracking-widest text-sm md:text-base uppercase flex items-center bg-black/50 px-4 py-2 rounded-full border border-white/10">
                                    <i className="fas fa-camera mr-2 text-blue-400"></i> FOTO PAKET
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
