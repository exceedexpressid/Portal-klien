<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exceed Express - Portal Klien</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS & JS untuk Tracking Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { touch-action: manipulation; background-color: #f3f4f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Animasi Marquee */
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 12s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }

        @keyframes bounce-move {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }
        .moving-truck-marker {
            animation: bounce-move 1s ease-in-out infinite;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.4));
        }
    </style>
</head>
<body class="antialiased text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const loadLocal = (key, fallback) => {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
        };

        // KOMPONEN PETA MAP INDEPENDEN UNTUK SETIAP BARIS RESI
        function TrackingMap({ packageId, address, status, lastSuccessId }) {
            const mapRef = useRef(null);
            
            const isProses = ['siap_antar', 'proses'].includes(String(status).toLowerCase().replace(' ', '_'));

            useEffect(() => {
                const timer = setTimeout(() => {
                    const mapId = `map-${packageId}`;
                    const container = document.getElementById(mapId);
                    if (!container) return;
                    if (container._leaflet_id) return;

                    let baseIdForHash = packageId;
                    if (isProses && lastSuccessId) {
                        baseIdForHash = lastSuccessId;
                    }

                    let hash = 0;
                    for (let i = 0; i < baseIdForHash.length; i++) {
                        hash = baseIdForHash.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    const latOffset = (hash % 100) / 4500;
                    const lngOffset = ((hash >> 8) % 100) / 4500;
                    
                    const lat = -2.6865 + latOffset;
                    const lng = 140.7814 + lngOffset;

                    try {
                        const map = L.map(mapId, {
                            center: [lat, lng],
                            zoom: 16,
                            zoomControl: true,
                            attributionControl: false
                        });

                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            maxZoom: 19
                        }).addTo(map);

                        let marker;
                        if (isProses) {
                            const truckIcon = L.divIcon({
                                className: 'custom-leaflet-icon',
                                html: `<div class="text-[#e65c00] text-3xl moving-truck-marker"><i class="fas fa-truck-fast"></i></div>`,
                                iconSize: [40, 40],
                                iconAnchor: [20, 20],
                                popupAnchor: [0, -20]
                            });
                            marker = L.marker([lat, lng], { icon: truckIcon }).addTo(map);
                            marker.bindPopup(`<b>Kurir Dalam Perjalanan!</b><br/><span class="text-[10px] text-gray-500">Menuju: ${address || 'Alamat Penerima'}</span>`).openPopup();
                        } else {
                            const markerText = `<b>Lokasi Pengiriman:</b><br/>Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}<br/><span class="text-[10px] text-gray-500">${address || 'Alamat Penerima'}</span>`;
                            marker = L.marker([lat, lng]).addTo(map);
                            marker.bindPopup(markerText).openPopup();
                        }

                        mapRef.current = map;
                    } catch (err) {
                        console.error("Gagal memuat Leaflet Map:", err);
                    }
                }, 300);

                return () => clearTimeout(timer);
            }, [packageId, address, status, lastSuccessId]);

            return (
                <div className="bg-[#1e2336] p-2.5 rounded-xl border border-[#2a3147] shadow-inner animate-fade-in-down mt-2">
                    <div className="flex justify-between items-center mb-1.5 text-[9px] md:text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        <span><i className={`fas ${isProses ? 'fa-satellite-dish text-blue-400 animate-pulse' : 'fa-map-marked-alt text-[#34d399]'} mr-1.5`}></i> {isProses ? 'Live Tracking Kurir' : 'Geolokasi Pengantaran'}</span>
                        <span className="text-gray-500">Dilindungi Sandi</span>
                    </div>
                    <div id={`map-${packageId}`} className="h-48 w-full rounded-lg z-0 overflow-hidden border border-[#2a3147]"></div>
                </div>
            );
        }

        function App() {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
            const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

            const [userProfile, setUserProfile] = useState(() => loadLocal('ex_olshopProfile', null));
            const [isLoadingSync, setIsLoadingSync] = useState(false);
            const [syncMessage, setSyncMessage] = useState({ text: '', type: '' });
            
            const [loginUname, setLoginUname] = useState('');
            const [loginPass, setLoginPass] = useState('');

            const [packages, setPackages] = useState(() => loadLocal('ex_olshopPackages', []));
            const [masterOlshops, setMasterOlshops] = useState(() => loadLocal('ex_masterOlshops', []));
            
            const [filterStatus, setFilterStatus] = useState('semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [expandedCustomers, setExpandedCustomers] = useState([]); 
            const [showMapIds, setShowMapIds] = useState([]); 
            const [selectedImage, setSelectedImage] = useState(null);

            const toggleCustomerExpand = (name) => setExpandedCustomers(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
            const toggleMap = (id) => setShowMapIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            // ===============================================
            // HELPER: DEDUKSI KEUANGAN YANG AKURAT 100%
            // ===============================================
            const getFinancials = (pkg) => {
                const hBarang = Number(pkg.hargaPaket) || 0;
                const tagihan = Number(pkg.totalTagihan) || 0;
                const selisihTagihan = tagihan - hBarang > 0 ? tagihan - hBarang : 0;
                
                let oTambahan = Number(pkg.tambahanOngkir) || Number(pkg.ongkirTambahan) || Number(pkg.ongkir_tambahan) || Number(pkg.ongkirVolume) || Number(pkg.tambahan) || 0;
                let oDasar = Number(pkg.ongkirDasar) || Number(pkg.ongkir) || 0;
                
                // DEDUKSI CERDAS (Auto-koreksi jika Google Apps Script gagal baca kolom Tambahan)
                if (oTambahan === 0 && oDasar > 0 && selisihTagihan > oDasar) {
                    oTambahan = selisihTagihan - oDasar;
                } else if (oTambahan === 0 && oDasar === 0 && selisihTagihan > 0) {
                    oDasar = selisihTagihan;
                }
                if (oDasar === 0 && oTambahan > 0 && selisihTagihan > oTambahan) {
                    oDasar = selisihTagihan - oTambahan;
                }

                return { hBarang, tagihan, oDasar, oTambahan, oTotal: oDasar + oTambahan };
            };

            useEffect(() => { localStorage.setItem('ex_olshopProfile', JSON.stringify(userProfile)); }, [userProfile]);
            useEffect(() => { localStorage.setItem('ex_olshopPackages', JSON.stringify(packages)); }, [packages]);
            useEffect(() => { localStorage.setItem('ex_masterOlshops', JSON.stringify(masterOlshops)); }, [masterOlshops]);

            const getFotoUrl = (pkg) => {
                const fileKey = pkg.fotoBukti || pkg.foto_bukti || pkg.foto || pkg.bukti || pkg.gambar;
                if (!fileKey || String(fileKey).trim() === '') return null;
                
                if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) {
                    return fileKey;
                }
                return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
            };

            const syncData = async (isLoginAttempt = false) => {
                setIsLoadingSync(true);
                if(!isLoginAttempt) { setSyncMessage({ text: '', type: '' }); }
                
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setMasterOlshops(result.data.olshop || []);
                        setPackages(result.data.packages || []);
                        if(!isLoginAttempt) {
                            setSyncMessage({ text: 'Data berhasil diperbarui secara Real-time!', type: 'success' });
                            setTimeout(() => setSyncMessage({ text: '', type: '' }), 3000);
                        }
                        return result.data.olshop;
                    } else {
                        setSyncMessage({ text: 'Gagal memuat data dari server.', type: 'error' });
                        return false;
                    }
                } catch (error) {
                    setSyncMessage({ text: 'Koneksi terputus. Cek internet Anda.', type: 'error' });
                    return false;
                } finally {
                    setIsLoadingSync(false);
                }
            };

            useEffect(() => {
                if (masterOlshops.length === 0 && !userProfile) { syncData(); }
                // eslint-disable-next-line
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setSyncMessage({ text: 'Sinkronisasi data terbaru...', type: 'info' });

                const currentOlshops = await syncData(true) || [];
                const uname = loginUname.trim().toLowerCase();
                const pass = loginPass.trim();

                const validUser = currentOlshops.find(o => 
                    String(o.nama).trim().toLowerCase() === uname && 
                    String(o.phone).trim() === pass
                );

                if (validUser) {
                    setUserProfile({ id: validUser.id, name: validUser.nama });
                    setLoginUname(''); setLoginPass('');
                    syncData(); 
                } else {
                    setSyncMessage({ text: 'Nama Toko atau Nomor WA tidak ditemukan!', type: 'error' });
                }
            };

            const handleLogout = () => {
                setUserProfile(null);
                setPackages([]);
            };

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-[#e65c00] rounded-b-[50px] shadow-lg"></div>
                        <div className="glass-card p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10 border border-white/50">
                            <div className="w-20 h-20 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-[#e65c00] shadow-inner">
                                <i className="fas fa-box text-4xl"></i>
                            </div>
                            <h1 className="text-3xl font-black text-gray-800 tracking-tight">Portal Klien</h1>
                            <p className="text-sm text-gray-500 mb-8 font-medium">Exceed Express Tracking</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                {syncMessage.text && (
                                    <div className={`text-xs py-3 px-3 rounded-xl font-bold flex items-start text-left ${syncMessage.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : syncMessage.type === 'info' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-green-50 text-green-700 border border-green-100'}`}>
                                        <i className={`fas ${syncMessage.type === 'error' ? 'fa-exclamation-triangle' : syncMessage.type === 'info' ? 'fa-spinner fa-spin' : 'fa-check-circle'} mr-2 mt-0.5`}></i>
                                        <span>{syncMessage.text}</span>
                                    </div>
                                )}
                                <div className="relative">
                                    <i className="fas fa-store absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" required value={loginUname} onChange={(e) => setLoginUname(e.target.value)} placeholder="Nama Toko Anda" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                <div className="relative">
                                    <i className="fas fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="Nomor WhatsApp" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                <button type="submit" disabled={isLoadingSync} className={`w-full text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center ${isLoadingSync ? 'bg-gray-400 cursor-not-allowed shadow-none' : 'bg-[#e65c00] hover:bg-[#cc5200] shadow-[#e65c00]/30'}`}>
                                    {isLoadingSync ? <><i className="fas fa-sync-alt animate-spin mr-2"></i> Memproses...</> : 'Masuk ke Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const myPackages = packages.filter(p => {
                const pOlshopName = String(p.olshopName).trim().toLowerCase();
                const uName = String(userProfile.name).trim().toLowerCase();
                const uId = String(userProfile.id).trim().toLowerCase();
                return pOlshopName === uName || pOlshopName === uId || pOlshopName.includes(uName) || uName.includes(pOlshopName);
            });

            const lastSuccessPackage = [...myPackages].reverse().find(p => String(p.status).toLowerCase() === 'sukses');
            const globalLastSuccessId = lastSuccessPackage ? lastSuccessPackage.packageId : 'DEFAULT123';
            
            let filteredPkgs = myPackages;

            if (startDate || endDate) {
               filteredPkgs = filteredPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggal || '';
                  if (!pDateStr) return false;
                  let normalizedDateStr = "";
                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                          const parts = pDateStr.split('/');
                          if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                      }
                      if (!isNaN(d.getTime())) {
                          const year = d.getFullYear();
                          const month = String(d.getMonth() + 1).padStart(2, '0');
                          const day = String(d.getDate()).padStart(2, '0');
                          normalizedDateStr = `${year}-${month}-${day}`;
                      } else { normalizedDateStr = pDateStr.split('T')[0]; }
                  } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                  const sDate = startDate ? startDate : "2000-01-01";
                  const eDate = endDate ? endDate : "2100-01-01";
                  return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
               });
            }

            if (filterStatus !== 'semua') {
                filteredPkgs = filteredPkgs.filter(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if (filterStatus === 'proses') return stat === 'siap_antar' || stat === 'proses';
                    return stat === filterStatus;
                });
            }

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filteredPkgs = filteredPkgs.filter(p => String(p.customerName).toLowerCase().includes(q) || String(p.packageId).toLowerCase().includes(q));
            }

            // ===============================================
            // PENGELOMPOKAN CUSTOMER
            // ===============================================
            const groups = {};
            filteredPkgs.forEach(pkg => {
                const cName = String(pkg.customerName || 'Tanpa Nama').trim().toUpperCase();
                if(!groups[cName]) {
                    groups[cName] = {
                        customerName: cName,
                        packages: [],
                        s_sukses: 0, s_proses: 0, s_pending: 0, s_cancel: 0,
                        uangCASH: 0, uangTFOlshop: 0, uangTFKantor: 0, 
                        ongkirDasar: 0, ongkirTambahan: 0, 
                        bebanOngkirOlshop: 0, 
                        totalBersih: 0
                    };
                }
                const g = groups[cName];
                g.packages.push(pkg);
                
                let stat = String(pkg.status).toLowerCase().replace(' ', '_');
                if(stat === 'sukses') g.s_sukses++;
                else if(stat === 'siap_antar' || stat === 'proses') g.s_proses++;
                else if(stat === 'pending') g.s_pending++;
                else if(stat === 'cancel') g.s_cancel++;

                const { hBarang, oDasar, oTambahan, oTotal } = getFinancials(pkg);
                const metode = String(pkg.metodeBayar).trim().toUpperCase();

                if(stat === 'sukses') {
                    g.ongkirDasar += oDasar;
                    g.ongkirTambahan += oTambahan;
                    
                    if (metode === 'CASH' || metode === 'COD') {
                        g.uangCASH += hBarang; 
                    } else if (metode === 'TF OLSHOP') {
                        g.uangTFOlshop += hBarang;
                        g.bebanOngkirOlshop += oTotal; 
                    } else if (metode === 'TF KANTOR') {
                        g.uangTFKantor += hBarang; 
                    }
                }
                g.totalBersih = g.uangCASH + g.uangTFKantor - g.bebanOngkirOlshop;
            });
            const groupedCustomers = Object.values(groups).sort((a,b) => b.packages.length - a.packages.length);

            // ===============================================
            // KEUANGAN UTAMA 
            // ===============================================
            const hitungKeuangan = () => {
                let saldoBelumCair = 0; 
                let danaSudahCairBersih = 0; 
                let potonganBelumCair = 0; 
                let pktsSukses = 0;

                filteredPkgs.forEach(p => {
                    if (String(p.status).toLowerCase() === 'sukses') {
                        pktsSukses++;
                        const metode = String(p.metodeBayar).trim().toUpperCase();
                        const { hBarang, oTotal } = getFinancials(p);
                        
                        const isCair = String(p.statusPencairan).toLowerCase() === 'cair';

                        if (metode === 'TF OLSHOP') {
                            if (isCair) danaSudahCairBersih -= oTotal; 
                            else potonganBelumCair += oTotal; 
                        } 
                        else if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') {
                            if (isCair) danaSudahCairBersih += hBarang; 
                            else saldoBelumCair += hBarang; 
                        }
                    }
                });

                return { saldoBelumCair, danaSudahCairBersih, potonganBelumCair, totalPencairan: saldoBelumCair - potonganBelumCair, pktsSukses };
            };

            const keuangan = hitungKeuangan();

            // ===============================================
            // REKAP TABEL GLOBAL
            // ===============================================
            const hitungRingkasanTabel = () => {
                let s_sukses = 0, s_proses = 0, s_pending = 0, s_cancel = 0;
                let uangBarang = 0, ongkirDasar = 0, ongkirTambahan = 0, totalBebanOngkirOlshop = 0, totalBersih = 0;

                filteredPkgs.forEach(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if(stat === 'sukses') s_sukses++;
                    else if(stat === 'siap_antar' || stat === 'proses') s_proses++;
                    else if(stat === 'pending') s_pending++;
                    else if(stat === 'cancel') s_cancel++;

                    if(stat === 'sukses') {
                        const metode = String(p.metodeBayar).trim().toUpperCase();
                        const { hBarang, oDasar, oTambahan, oTotal } = getFinancials(p);

                        ongkirDasar += oDasar;
                        ongkirTambahan += oTambahan;

                        if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') {
                            uangBarang += hBarang; 
                        } else if (metode === 'TF OLSHOP') {
                            totalBebanOngkirOlshop += oTotal; 
                        }
                    }
                });
                totalBersih = uangBarang - totalBebanOngkirOlshop;
                return { s_sukses, s_proses, s_pending, s_cancel, uangBarang, ongkirDasar, ongkirTambahan, totalBersih, totalBebanOngkirOlshop };
            };

            const ringkasan = hitungRingkasanTabel();

            const StatusBadge = ({ status }) => {
                const s = String(status).toLowerCase();
                if(s === 'sukses') return <span className="bg-[#153a2b] text-[#34d399] px-2 py-0.5 rounded text-[9px] font-bold border border-[#1d4f3b] shadow-sm"><i className="fas fa-check-circle mr-1"></i>Sukses</span>;
                if(s === 'cancel') return <span className="bg-[#450a0a] text-[#f87171] px-2 py-0.5 rounded text-[9px] font-bold border border-[#7f1d1d] shadow-sm"><i className="fas fa-times-circle mr-1"></i>Cancel</span>;
                if(s === 'pending') return <span className="bg-[#431407] text-[#fb923c] px-2 py-0.5 rounded text-[9px] font-bold border border-[#7c2d12] shadow-sm"><i className="fas fa-clock mr-1"></i>Tertunda</span>;
                return <span className="bg-[#1e3a8a] text-[#60a5fa] px-2 py-0.5 rounded text-[9px] font-bold border border-[#1e40af] shadow-sm"><i className="fas fa-truck mr-1 animate-pulse"></i>Proses Antar</span>;
            };

            return (
                <div className="min-h-screen bg-gray-100 font-sans w-full md:max-w-3xl lg:max-w-5xl xl:max-w-6xl mx-auto shadow-2xl relative flex flex-col">
                    <header className="bg-[#0f172a] px-4 py-3 md:py-4 shadow-md z-10 sticky top-0 flex justify-between items-center border-b border-slate-800">
                        <div>
                            <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">DASHBOARD TOKO</p>
                            <h1 className="text-lg md:text-xl lg:text-2xl font-black text-white leading-none truncate max-w-[200px] md:max-w-[400px] uppercase">{userProfile.name}</h1>
                        </div>
                        <button onClick={handleLogout} className="text-[10px] md:text-xs font-bold text-slate-200 hover:text-white bg-slate-800 hover:bg-red-500 border border-slate-700 px-3 py-1.5 md:px-4 md:py-1.5 rounded-lg transition-colors flex items-center shadow-sm">

                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

                                    <div className="flex justify-between items-start mb-2 md:mb-3">
                                        <p className="text-orange-100 text-[10px] md:text-xs font-semibold uppercase tracking-wider flex items-center"><i className="fas fa-wallet mr-1.5"></i> Estimasi Pencairan</p>
