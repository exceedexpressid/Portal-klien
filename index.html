<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exceed Express - Portal Klien</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS & JS untuk Tracking Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { touch-action: manipulation; background-color: #f3f4f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Animasi Marquee */
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 12s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }

        @keyframes bounce-move {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }
        .moving-truck-marker {
            animation: bounce-move 1s ease-in-out infinite;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.4));
        }
    </style>
</head>
<body class="antialiased text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const loadLocal = (key, fallback) => {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
        };

        // KOMPONEN PETA MAP INDEPENDEN
        function TrackingMap({ packageId, address, status, lastSuccessId }) {
            const mapRef = useRef(null);
            
            const isProses = ['siap_antar', 'proses'].includes(String(status).toLowerCase().replace(' ', '_'));

            useEffect(() => {
                const timer = setTimeout(() => {
                    const mapId = `map-${packageId}`;
                    const container = document.getElementById(mapId);
                    if (!container) return;
                    if (container._leaflet_id) return;

                    let baseIdForHash = packageId;
                    if (isProses && lastSuccessId) {
                        baseIdForHash = lastSuccessId;
                    }

                    let hash = 0;
                    for (let i = 0; i < baseIdForHash.length; i++) {
                        hash = baseIdForHash.charCodeAt(i) + ((hash << 5) - hash);
                    }
                    const latOffset = (hash % 100) / 4500;
                    const lngOffset = ((hash >> 8) % 100) / 4500;
                    
                    const lat = -2.6865 + latOffset;
                    const lng = 140.7814 + lngOffset;

                    try {
                        const map = L.map(mapId, {
                            center: [lat, lng],
                            zoom: 16,
                            zoomControl: true,
                            attributionControl: false
                        });

                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            maxZoom: 19
                        }).addTo(map);

                        let marker;
                        if (isProses) {
                            const truckIcon = L.divIcon({
                                className: 'custom-leaflet-icon',
                                html: `<div class="text-[#e65c00] text-3xl moving-truck-marker"><i class="fas fa-truck-fast"></i></div>`,
                                iconSize: [40, 40],
                                iconAnchor: [20, 20],
                                popupAnchor: [0, -20]
                            });
                            marker = L.marker([lat, lng], { icon: truckIcon }).addTo(map);
                            marker.bindPopup(`<b>Kurir Dalam Perjalanan!</b><br/><span class="text-[10px] text-gray-500">Menuju: ${address || 'Alamat Penerima'}</span>`).openPopup();
                        } else {
                            const markerText = `<b>Lokasi Pengiriman:</b><br/>Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}<br/><span class="text-[10px] text-gray-500">${address || 'Alamat Penerima'}</span>`;
                            marker = L.marker([lat, lng]).addTo(map);
                            marker.bindPopup(markerText).openPopup();
                        }

                        mapRef.current = map;
                    } catch (err) {
                        console.error("Gagal memuat Leaflet Map:", err);
                    }
                }, 300);

                return () => clearTimeout(timer);
            }, [packageId, address, status, lastSuccessId]);

            return (
                <div className="bg-[#1e2336] p-2.5 rounded-xl border border-[#2a3147] shadow-inner h-full min-h-[220px]">
                    <div className="flex justify-between items-center mb-2 text-[9px] md:text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                        <span><i className={`fas ${isProses ? 'fa-satellite-dish text-blue-400 animate-pulse' : 'fa-map-marked-alt text-[#34d399]'} mr-1.5`}></i> {isProses ? 'Live Tracking Kurir' : 'Geolokasi Pengantaran'}</span>
                        <span className="text-gray-500">Dilindungi Sandi</span>
                    </div>
                    <div id={`map-${packageId}`} className="h-48 w-full rounded-lg z-0 overflow-hidden border border-[#2a3147]"></div>
                </div>
            );
        }

        function App() {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
            const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

            const [userProfile, setUserProfile] = useState(() => loadLocal('ex_olshopProfile', null));
            const [isLoadingSync, setIsLoadingSync] = useState(false);
            const [syncMessage, setSyncMessage] = useState({ text: '', type: '' });
            
            const [loginUname, setLoginUname] = useState('');
            const [loginPass, setLoginPass] = useState('');

            const [packages, setPackages] = useState(() => loadLocal('ex_olshopPackages', []));
            const [masterOlshops, setMasterOlshops] = useState(() => loadLocal('ex_masterOlshops', []));
            
            const [filterStatus, setFilterStatus] = useState('semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [showMapIds, setShowMapIds] = useState([]); 
            const [selectedImage, setSelectedImage] = useState(null);

            const toggleMap = (id) => setShowMapIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            useEffect(() => { localStorage.setItem('ex_olshopProfile', JSON.stringify(userProfile)); }, [userProfile]);
            useEffect(() => { localStorage.setItem('ex_olshopPackages', JSON.stringify(packages)); }, [packages]);
            useEffect(() => { localStorage.setItem('ex_masterOlshops', JSON.stringify(masterOlshops)); }, [masterOlshops]);

            const getFotoUrl = (pkg) => {
                const fileKey = pkg.fotoBukti || pkg.foto_bukti || pkg.foto || pkg.bukti || pkg.gambar;
                if (!fileKey || String(fileKey).trim() === '') return null;
                
                if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) {
                    return fileKey;
                }
                return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
            };

            const syncData = async (isLoginAttempt = false) => {
                setIsLoadingSync(true);
                if(!isLoginAttempt) { setSyncMessage({ text: '', type: '' }); }
                
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setMasterOlshops(result.data.olshop || []);
                        setPackages(result.data.packages || []);
                        if(!isLoginAttempt) {
                            setSyncMessage({ text: 'Data berhasil diperbarui secara Real-time!', type: 'success' });
                            setTimeout(() => setSyncMessage({ text: '', type: '' }), 3000);
                        }
                        return result.data.olshop;
                    } else {
                        setSyncMessage({ text: 'Gagal memuat data dari server.', type: 'error' });
                        return false;
                    }
                } catch (error) {
                    setSyncMessage({ text: 'Koneksi terputus. Cek internet Anda.', type: 'error' });
                    return false;
                } finally {
                    setIsLoadingSync(false);
                }
            };

            useEffect(() => {
                if (masterOlshops.length === 0 && !userProfile) { syncData(); }
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setSyncMessage({ text: 'Sinkronisasi data terbaru...', type: 'info' });

                const currentOlshops = await syncData(true) || [];
                const uname = loginUname.trim().toLowerCase();
                const pass = loginPass.trim();

                const validUser = currentOlshops.find(o => 
                    String(o.nama).trim().toLowerCase() === uname && 
                    String(o.phone).trim() === pass
                );

                if (validUser) {
                    setUserProfile({ id: validUser.id, name: validUser.nama });
                    setLoginUname(''); setLoginPass('');
                    syncData(); 
                } else {
                    setSyncMessage({ text: 'Nama Toko atau Nomor WA tidak ditemukan!', type: 'error' });
                }
            };

            const handleLogout = () => {
                setUserProfile(null);
                setPackages([]);
            };

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-[#e65c00] rounded-b-[50px] shadow-lg"></div>
                        <div className="glass-card p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10 border border-white/50">
                            <div className="w-20 h-20 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-[#e65c00] shadow-inner">
                                <i className="fas fa-box text-4xl"></i>
                            </div>
                            <h1 className="text-3xl font-black text-gray-800 tracking-tight">Portal Klien</h1>
                            <p className="text-sm text-gray-500 mb-8 font-medium">Exceed Express Tracking</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                {syncMessage.text && (
                                    <div className={`text-xs py-3 px-3 rounded-xl font-bold flex items-start text-left ${syncMessage.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : syncMessage.type === 'info' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-green-50 text-green-700 border border-green-100'}`}>
                                        <i className={`fas ${syncMessage.type === 'error' ? 'fa-exclamation-triangle' : syncMessage.type === 'info' ? 'fa-spinner fa-spin' : 'fa-check-circle'} mr-2 mt-0.5`}></i>
                                        <span>{syncMessage.text}</span>
                                    </div>
                                )}
                                <div className="relative">
                                    <i className="fas fa-store absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" required value={loginUname} onChange={(e) => setLoginUname(e.target.value)} placeholder="Nama Toko Anda" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                <div className="relative">
                                    <i className="fas fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="Nomor WhatsApp" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                <button type="submit" disabled={isLoadingSync} className={`w-full text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center ${isLoadingSync ? 'bg-gray-400 cursor-not-allowed shadow-none' : 'bg-[#e65c00] hover:bg-[#cc5200] shadow-[#e65c00]/30'}`}>
                                    {isLoadingSync ? <><i className="fas fa-sync-alt animate-spin mr-2"></i> Memproses...</> : 'Masuk ke Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const myPackages = packages.filter(p => {
                const pOlshopName = String(p.olshopName).trim().toLowerCase();
                const uName = String(userProfile.name).trim().toLowerCase();
                const uId = String(userProfile.id).trim().toLowerCase();
                return pOlshopName === uName || pOlshopName === uId || pOlshopName.includes(uName) || uName.includes(pOlshopName);
            });

            const lastSuccessPackage = [...myPackages].reverse().find(p => String(p.status).toLowerCase() === 'sukses');
            const globalLastSuccessId = lastSuccessPackage ? lastSuccessPackage.packageId : 'DEFAULT123';
            
            let filteredPkgs = myPackages;

            if (startDate || endDate) {
               filteredPkgs = filteredPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggal || '';
                  if (!pDateStr) return false;
                  let normalizedDateStr = "";
                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                          const parts = pDateStr.split('/');
                          if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                      }
                      if (!isNaN(d.getTime())) {
                          const year = d.getFullYear();
                          const month = String(d.getMonth() + 1).padStart(2, '0');
                          const day = String(d.getDate()).padStart(2, '0');
                          normalizedDateStr = `${year}-${month}-${day}`;
                      } else { normalizedDateStr = pDateStr.split('T')[0]; }
                  } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                  const sDate = startDate ? startDate : "2000-01-01";
                  const eDate = endDate ? endDate : "2100-01-01";
                  return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
               });
            }

            if (filterStatus !== 'semua') {
                filteredPkgs = filteredPkgs.filter(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if (filterStatus === 'siap_antar') return stat === 'siap_antar' || stat === 'proses';
                    return stat === filterStatus;
                });
            }

            if (searchQuery) {
                filteredPkgs = filteredPkgs.filter(p => p.customerName.toLowerCase().includes(searchQuery.toLowerCase()) || p.packageId.toLowerCase().includes(searchQuery.toLowerCase()));
            }

            // ===============================================
            // LOGIKA FINANSIAL UTAMA / ESTIMASI PENCAIRAN
            // ===============================================
            const hitungKeuangan = () => {
                let saldoBelumCair = 0; 
                let danaSudahCairBersih = 0; 
                let potonganBelumCair = 0; 

                filteredPkgs.forEach(p => {
                    if (String(p.status).toLowerCase() === 'sukses') {
                        const metode = String(p.metodeBayar).trim().toUpperCase();
                        const hargaBarangAsli = Number(p.hargaPaket) || 0;
                        const tagihanTotal = Number(p.totalTagihan) || 0;
                        
                        const oDasar = Number(p.ongkirDasar) || Number(p.ongkirReal) || Number(p.ongkir) || (tagihanTotal - hargaBarangAsli > 0 ? (tagihanTotal - hargaBarangAsli) : 0);
                        const oTambahan = Number(p.ongkirTambahan) || Number(p.ongkir_tambahan) || Number(p.ongkirVolume) || Number(p.ongkir_volume) || Number(p.ongkirVol) || Number(p.tambahan) || 0;
                        const totalOngkir = oDasar + oTambahan;

                        const isCair = String(p.statusPencairan).toLowerCase() === 'cair';

                        if (metode === 'TF OLSHOP') {
                            if (isCair) {
                                danaSudahCairBersih -= totalOngkir;
                            } else {
                                potonganBelumCair += totalOngkir; 
                            }
                        } 
                        else if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') {
                            if (isCair) {
                                danaSudahCairBersih += hargaBarangAsli;
                            } else {
                                saldoBelumCair += hargaBarangAsli;
                            }
                        }
                    }
                });

                return { saldoBelumCair, danaSudahCairBersih, potonganBelumCair, totalPencairan: saldoBelumCair - potonganBelumCair };
            };

            const keuangan = hitungKeuangan();

            // ===============================================
            // LOGIKA TABEL REKAPITULASI BAWAH
            // ===============================================
            const hitungRingkasanTabel = () => {
                let s_sukses = 0, s_proses = 0, s_pending = 0, s_cancel = 0;
                let uangBarang = 0, ongkirDasar = 0, ongkirTambahan = 0, totalBebanOngkirOlshop = 0, totalBersih = 0;

                filteredPkgs.forEach(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if(stat === 'sukses') s_sukses++;
                    else if(stat === 'siap_antar' || stat === 'proses') s_proses++;
                    else if(stat === 'pending') s_pending++;
                    else if(stat === 'cancel') s_cancel++;

                    if(stat === 'sukses') {
                        const metode = String(p.metodeBayar).trim().toUpperCase();
                        const hBarang = Number(p.hargaPaket) || 0;
                        const tagihan = Number(p.totalTagihan) || 0;
                        
                        const oDasar = Number(p.ongkirDasar) || Number(p.ongkirReal) || Number(p.ongkir) || (tagihan - hBarang > 0 ? (tagihan - hBarang) : 0);
                        const oTambahan = Number(p.ongkirTambahan) || Number(p.ongkir_tambahan) || Number(p.ongkirVolume) || Number(p.ongkir_volume) || Number(p.ongkirVol) || Number(p.tambahan) || 0;

                        ongkirDasar += oDasar;
                        ongkirTambahan += oTambahan;

                        if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') {
                            uangBarang += hBarang;
                        } else if (metode === 'TF OLSHOP') {
                            totalBebanOngkirOlshop += (oDasar + oTambahan);
                        }
                    }
                });
                totalBersih = uangBarang - totalBebanOngkirOlshop;
                return { s_sukses, s_proses, s_pending, s_cancel, uangBarang, ongkirDasar, ongkirTambahan, totalBersih, totalBebanOngkirOlshop };
            };

            const ringkasan = hitungRingkasanTabel();

            // Badge Status yang disesuaikan
            const StatusBadge = ({ status }) => {
                const s = String(status).toLowerCase();
                if(s === 'sukses') return <span className="bg-[#153a2b] text-[#34d399] px-2 py-0.5 rounded text-[9px] font-bold border border-[#1d4f3b] shadow-sm uppercase tracking-wide"><i className="fas fa-check-circle mr-1"></i>Sukses</span>;
                if(s === 'cancel') return <span className="bg-[#450a0a] text-[#f87171] px-2 py-0.5 rounded text-[9px] font-bold border border-[#7f1d1d] shadow-sm uppercase tracking-wide"><i className="fas fa-times-circle mr-1"></i>Cancel</span>;
                if(s === 'pending') return <span className="bg-[#431407] text-[#fb923c] px-2 py-0.5 rounded text-[9px] font-bold border border-[#7c2d12] shadow-sm uppercase tracking-wide"><i className="fas fa-clock mr-1"></i>Tertunda</span>;
                return <span className="bg-[#1e3a8a] text-[#60a5fa] px-2 py-0.5 rounded text-[9px] font-bold border border-[#1e40af] shadow-sm uppercase tracking-wide"><i className="fas fa-truck mr-1 animate-pulse"></i>Proses</span>;
            };

            return (
                <div className="min-h-screen bg-gray-100 font-sans w-full md:max-w-3xl lg:max-w-5xl xl:max-w-6xl mx-auto shadow-2xl relative flex flex-col">
                    <header className="bg-[#0f172a] px-4 py-3 md:py-4 shadow-md z-10 sticky top-0 flex justify-between items-center border-b border-slate-800">
                        <div>
                            <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">DASHBOARD TOKO</p>
                            <h1 className="text-lg md:text-xl lg:text-2xl font-black text-white leading-none truncate max-w-[200px] md:max-w-[400px] uppercase">{userProfile.name}</h1>
                        </div>
                        <button onClick={handleLogout} className="text-[10px] md:text-xs font-bold text-slate-200 hover:text-white bg-slate-800 hover:bg-red-500 border border-slate-700 px-3 py-1.5 md:px-4 md:py-1.5 rounded-lg transition-colors flex items-center shadow-sm">
                            Keluar <i className="fas fa-sign-out-alt ml-1.5 md:ml-2"></i>
                        </button>
                    </header>

                    <div className="bg-[#fff7ed] border-b border-[#fed7aa] w-full overflow-hidden shadow-sm">
                        <div className="marquee-content py-1.5 text-[11px] md:text-xs font-black tracking-wider text-[#ea580c] uppercase">
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas 
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-3 md:p-5 lg:p-6 space-y-4 md:space-y-5 pb-8">
                        
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 md:gap-4">
                            <div className="bg-gradient-to-br from-[#e65c00] to-[#b34700] rounded-2xl p-4 md:p-5 text-white shadow-md relative overflow-hidden h-full flex flex-col justify-between">
                                <div className="absolute -right-2 -top-2 opacity-10"><i className="fas fa-wallet text-[100px] md:text-[120px]"></i></div>
                                <div className="relative z-10">
                                    <div className="flex justify-between items-start mb-2 md:mb-3">
                                        <p className="text-orange-100 text-[10px] md:text-xs font-semibold uppercase tracking-wider flex items-center"><i className="fas fa-wallet mr-1.5"></i> Estimasi Pencairan</p>
                                        <button onClick={() => syncData()} disabled={isLoadingSync} className={`flex items-center bg-white/20 hover:bg-white/30 px-2 py-1 rounded-full transition-all ${isLoadingSync ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                            <i className={`fas fa-sync-alt text-white mr-1.5 text-[10px] md:text-xs ${isLoadingSync ? 'animate-spin' : ''}`} />
                                            <span className="text-white text-[9px] md:text-[10px] font-bold">{isLoadingSync ? 'Memuat...' : 'Refresh'}</span>
                                        </button>
                                    </div>
                                    <h2 className="text-2xl md:text-3xl lg:text-4xl font-black mb-2 md:mb-4 tracking-tight">{formatCurrency(keuangan.totalPencairan)}</h2>
                                    <div className="bg-[#993d00]/50 p-2.5 md:p-3 rounded-xl border border-white/10 space-y-1.5 text-[10px] md:text-xs mb-2 md:mb-3">
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-up text-green-400 mr-1.5"></i> Harga Barang (Hak Olshop)</span><span className="font-bold">+{formatCurrency(keuangan.saldoBelumCair)}</span></div>
                                        <div className="flex justify-between items-center"><span className="text-orange-50 flex items-center"><i className="fas fa-arrow-circle-down text-red-300 mr-1.5"></i> Beban Ongkir TF Olshop</span><span className="font-bold text-red-200">-{formatCurrency(keuangan.potonganBelumCair)}</span></div>
                                    </div>
                                    <div className="bg-green-600/90 border border-green-500 p-2 md:p-2.5 rounded-xl flex justify-between items-center shadow-inner">
                                       <span className="flex items-center text-[10px] md:text-xs font-bold text-green-50"><i className="fas fa-shield-alt text-green-200 mr-1.5"></i> Dana Telah Dicairkan</span>
                                       <span className="font-black text-xs md:text-sm text-white">{formatCurrency(keuangan.danaSudahCairBersih)}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-2 bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center space-y-3 md:space-y-4">
                                <div className="relative">
                                    <i className="fas fa-search absolute left-3.5 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs md:text-sm"></i>
                                    <input type="text" placeholder="Cari Resi atau Nama Penerima..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-9 pr-3 py-2.5 md:py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs md:text-sm outline-none focus:border-[#e65c00] focus:bg-white transition-colors" />
                                </div>
                                <div className="flex flex-col md:flex-row items-center gap-2 md:gap-3">
                                    <div className="relative w-full md:flex-1"><i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-gray-50 border border-gray-200 rounded-xl text-[10px] md:text-xs outline-none focus:border-[#e65c00] text-gray-600 font-medium" /></div>
                                    <span className="hidden md:block text-[10px] font-bold text-gray-400">Hingga</span>
                                    <div className="relative w-full md:flex-1"><i className="fas fa-calendar absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full pl-8 pr-2 py-2 bg-gray-50 border border-gray-200 rounded-xl text-[10px] md:text-xs outline-none focus:border-[#e65c00] text-gray-600 font-medium" /></div>
                                    {(startDate || endDate) && (<button onClick={() => { setStartDate(''); setEndDate(''); }} className="p-2 md:p-2.5 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors w-full md:w-auto flex justify-center items-center" title="Reset Tanggal"><i className="fas fa-times-circle"></i></button>)}
                                </div>
                                <div className="flex space-x-1.5 md:space-x-2 overflow-x-auto pb-1 scrollbar-hide w-full">
                                    {[{id:'semua', label:'Semua'}, {id:'siap_antar', label:'Proses'}, {id:'sukses', label:'Sukses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Batal'}].map(s => (
                                        <button key={s.id} onClick={() => setFilterStatus(s.id)} className={`px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-[10px] md:text-xs font-bold whitespace-nowrap transition-all border ${filterStatus === s.id ? 'bg-[#e65c00] text-white border-[#e65c00] shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50 hover:text-gray-700'}`}>{s.label}</button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* ========================================================= */}
                        {/* UI SUMMARY GLOBAL */}
                        {/* ========================================================= */}
                        <div className="bg-[#1e2336] rounded-xl overflow-hidden shadow-lg border border-[#2a3147] text-white font-sans">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-y-4 gap-x-2 p-3 md:p-4 items-center text-center md:text-left divide-y md:divide-y-0 md:divide-x divide-[#2a3147]">
                                <div className="col-span-2 md:col-span-1 flex flex-col justify-center items-center pb-2 md:pb-0">
                                    <div className="text-[9px] md:text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest">TOTAL STATUS PKT</div>
                                    <div className="flex gap-1.5">
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#153a2b] text-[#34d399] px-2 py-0.5 rounded text-xs font-bold border border-[#1d4f3b]"><i className="fas fa-check-circle mr-1"></i>{ringkasan.s_sukses}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Sukses</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#1e3a8a] text-[#60a5fa] px-2 py-0.5 rounded text-xs font-bold border border-[#1e40af]"><i className="fas fa-truck mr-1"></i>{ringkasan.s_proses}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Proses</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#431407] text-[#fb923c] px-2 py-0.5 rounded text-xs font-bold border border-[#7c2d12]"><i className="fas fa-clock mr-1"></i>{ringkasan.s_pending}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Pending</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#450a0a] text-[#f87171] px-2 py-0.5 rounded text-xs font-bold border border-[#7f1d1d]"><i className="fas fa-times-circle mr-1"></i>{ringkasan.s_cancel}</span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Cancel</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col md:items-center pt-2 md:pt-0">
                                    <div className="text-[9px] md:text-[10px] text-[#34d399] font-bold mb-1 uppercase tracking-widest">BARANG (CASH/TF KTR)</div>
                                    <div className="text-sm md:text-base font-black text-[#34d399]">+{formatCurrency(ringkasan.uangBarang)}</div>
                                </div>
                                <div className="flex flex-col md:items-center pt-2 md:pt-0">
                                    <div className="text-[9px] md:text-[10px] text-[#f87171] font-bold mb-1 uppercase tracking-widest">BEBAN ONGKIR (TF OLSHOP)</div>
                                    <div className="text-sm md:text-base font-black text-[#f87171]">{ringkasan.totalBebanOngkirOlshop > 0 ? '-' : ''}{formatCurrency(ringkasan.totalBebanOngkirOlshop)}</div>
                                </div>
                                <div className="flex flex-col md:items-center pt-2 md:pt-0 bg-[#252b41] md:bg-transparent -mx-3 md:mx-0 px-3 md:px-0 pb-1 rounded">
                                    <div className="text-[9px] md:text-[10px] text-white font-bold mb-1 uppercase tracking-widest">TOTAL BERSIH</div>
                                    <div className="text-base md:text-lg font-black text-[#fb923c]">{formatCurrency(ringkasan.totalBersih)}</div>
                                </div>
                            </div>
                        </div>

                        {/* ========================================================= */}
                        {/* DAFTAR PAKET - FLAT LIST (LEBIH RAPAT) */}
                        {/* ========================================================= */}
                        <div className="mt-6 flex flex-col">
                            <div className="px-1 md:px-2 pb-3 flex justify-between items-end border-b border-gray-300 mb-2">
                                <h3 className="font-black text-gray-700 text-sm md:text-lg"><i className="fas fa-box text-[#e65c00] mr-2"></i>Daftar Paket</h3>
                                <span className="text-[10px] font-bold bg-gray-200 text-gray-600 px-3 py-1 rounded-full">{filteredPkgs.length} Paket</span>
                            </div>

                            {filteredPkgs.length === 0 ? (
                                <div className="text-center py-16 bg-white rounded-xl border border-gray-200 shadow-sm mt-2">
                                    <i className="fas fa-box-open text-gray-300 mb-3 text-5xl"></i>
                                    <p className="text-gray-500 font-medium text-sm">Tidak ada data paket untuk ditampilkan.</p>
                                </div>
                            ) : (
                                <div className="overflow-x-auto w-full bg-[#1e2336] rounded-xl border border-[#2a3147] shadow-lg pb-2 scrollbar-hide">
                                    {/* MIN-WIDTH DIKURANGI DARI 1250px MENJADI 900px AGAR LEBIH RAPAT */}
                                    <div className="min-w-[900px] flex flex-col font-sans">
                                        
                                        {/* HEADER TABEL */}
                                        <div className="grid grid-cols-[130px_minmax(180px,1fr)_150px_110px_100px_130px_70px] gap-3 px-4 py-3 text-[10px] text-gray-400 font-bold uppercase tracking-widest bg-[#151928] border-b border-[#2a3147] items-center">
                                            <div>RESI & TGL</div>
                                            <div>PENERIMA & KURIR</div>
                                            <div>STATUS</div>
                                            <div className="text-right">TAGIHAN & MTD</div>
                                            <div className="text-right">BRG (HRG)</div>
                                            <div className="text-right">ONGKIR (DSR+TMB)</div>
                                            <div className="text-center">BUKTI</div>
                                        </div>

                                        {/* ISI TABEL (DAFTAR PAKET) */}
                                        {filteredPkgs.map((pkg, idx) => {
                                            const isMapShown = showMapIds.includes(pkg.packageId);
                                            const hBarang = Number(pkg.hargaPaket) || 0;
                                            const tagihan = Number(pkg.totalTagihan) || 0;
                                            const metode = String(pkg.metodeBayar).trim().toUpperCase();
                                            
                                            const oDasar = Number(pkg.ongkirDasar) || Number(pkg.ongkirReal) || Number(pkg.ongkir) || (tagihan - hBarang > 0 ? (tagihan - hBarang) : 0);
                                            const oTambahan = Number(pkg.ongkirTambahan) || Number(pkg.ongkir_tambahan) || Number(pkg.ongkirVolume) || Number(pkg.ongkir_volume) || Number(pkg.ongkirVol) || Number(pkg.tambahan) || 0;
                                            
                                            const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                            const isProses = ['siap_antar', 'proses'].includes(String(pkg.status).toLowerCase().replace(' ', '_'));

                                            let displayKurir = String(pkg.kurirId || '');
                                            let displayTglFull = String(pkg.dateString || pkg.tanggal || '-');
                                            let displayInputTglFull = String(pkg.tanggalInput || pkg.tanggal || '-');

                                            if (displayKurir.includes('T') && displayKurir.length > 10 && /\d/.test(displayKurir)) {
                                                let tempDate = displayKurir; displayKurir = displayTglFull; displayTglFull = tempDate;
                                            }
                                            if (!displayKurir || displayKurir === '' || displayKurir === 'undefined') displayKurir = '-';
                                            else if (displayKurir.includes('@')) displayKurir = displayKurir.split('@')[0];

                                            const parseWaktuShort = (tglStr) => {
                                                if (!tglStr || tglStr === '-') return '-';
                                                try {
                                                    let raw = new Date(tglStr);
                                                    if (isNaN(raw.getTime()) && tglStr.includes('/')) {
                                                        const parts = tglStr.split('/');
                                                        if (parts.length === 3) raw = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                                                    }
                                                    if(!isNaN(raw.getTime())) {
                                                        const year = raw.getFullYear();
                                                        const month = String(raw.getMonth() + 1).padStart(2, '0');
                                                        const day = String(raw.getDate()).padStart(2, '0');
                                                        return `${year}-${month}-${day}`;
                                                    }
                                                } catch(e) {}
                                                return tglStr.includes('T') ? tglStr.split('T')[0] : tglStr;
                                            };

                                            const parseWaktu = (tglStr) => {
                                                if (tglStr === '-') return '-';
                                                try {
                                                    const raw = new Date(tglStr);
                                                    if(!isNaN(raw.getTime())) {
                                                        const tgl = raw.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'});
                                                        const hasTime = tglStr.includes(':') || tglStr.includes(' ') || (tglStr.includes('T') && !tglStr.endsWith('T00:00:00') && !tglStr.endsWith('T00:00:00.000Z') && !tglStr.endsWith('00:00:00'));
                                                        if (hasTime && (raw.getHours() !== 0 || raw.getMinutes() !== 0)) {
                                                            return tgl + " - " + raw.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}) + " WIT";
                                                        }
                                                        return tgl;
                                                    }
                                                } catch(e) {}
                                                return tglStr.includes('T') ? tglStr.split('T')[0] : tglStr;
                                            };
                                            
                                            displayTglFull = parseWaktu(displayTglFull);
                                            displayInputTglFull = parseWaktu(displayInputTglFull);
                                            const resolvedUrlFoto = getFotoUrl(pkg);

                                            return (
                                                <div key={idx} className={`flex flex-col border-b border-[#2a3147] last:border-0 transition-colors cursor-pointer ${isMapShown ? 'bg-[#252b41]' : 'hover:bg-[#252b41]'}`} onClick={() => toggleMap(pkg.packageId)}>
                                                    
                                                    {/* BARIS UTAMA PAKET */}
                                                    <div className="grid grid-cols-[130px_minmax(180px,1fr)_150px_110px_100px_130px_70px] gap-3 px-4 py-3.5 items-center">
                                                        
                                                        {/* 1. RESI & TGL */}
                                                        <div className="flex flex-col gap-1.5 items-start">
                                                            <div className="border border-[#e65c00]/40 bg-[#e65c00]/10 text-[#e65c00] rounded px-2 py-1 text-[11px] font-bold tracking-wider">
                                                                {pkg.packageId}
                                                            </div>
                                                            <div className="text-gray-500 text-[10px] flex items-center font-medium">
                                                                <i className="far fa-calendar-alt mr-1.5"></i> {parseWaktuShort(pkg.dateString || pkg.tanggal)}
                                                            </div>
                                                        </div>

                                                        {/* 2. PENERIMA & KURIR */}
                                                        <div className="flex flex-col gap-1">
                                                            <div className="text-white font-bold text-[13px] truncate">{pkg.customerName || 'Tanpa nama'}</div>
                                                            <div className="text-gray-400 text-[10px] flex items-center">
                                                                <i className="fas fa-phone-alt mr-1.5 text-gray-500 w-3 text-center"></i> {pkg.customerPhone || '-'}
                                                            </div>
                                                            <div className="text-gray-400 text-[10px] flex items-center">
                                                                <i className="fas fa-motorcycle mr-1.5 text-gray-500 w-3 text-center"></i> {displayKurir}
                                                            </div>
                                                        </div>

                                                        {/* 3. STATUS */}
                                                        <div className="flex flex-wrap items-center gap-1.5">
                                                            <StatusBadge status={pkg.status} />
                                                            {String(pkg.statusPencairan).toLowerCase() === 'cair' && (
                                                                <span className="bg-[#064e3b] text-[#34d399] px-2 py-0.5 rounded text-[9px] font-bold border border-[#065f46]">TELAH CAIR</span>
                                                            )}
                                                        </div>

                                                        {/* 4. TAGIHAN & MTD */}
                                                        <div className="flex flex-col items-end gap-0.5">
                                                            <div className="text-white font-bold text-[12px]">{formatCurrency(tagihan)}</div>
                                                            <div className="text-gray-500 text-[10px] font-semibold uppercase">{metode || '-'}</div>
                                                        </div>

                                                        {/* 5. BRG (HRG) */}
                                                        <div className="flex flex-col items-end gap-1">
                                                            <div className="text-[#34d399] font-bold text-[12px]">{formatCurrency(hBarang)}</div>
                                                        </div>

                                                        {/* 6. ONGKIR (DSR+TMB) */}
                                                        <div className="flex flex-col items-end gap-0.5">
                                                            <div className="text-[#f87171] font-bold text-[11px]">{formatCurrency(oDasar)}</div>
                                                            <div className="text-[#fb923c] font-bold text-[10px]">+{formatCurrency(oTambahan)}</div>
                                                        </div>

                                                        {/* 7. BUKTI */}
                                                        <div className="flex justify-center">
                                                            {resolvedUrlFoto ? (
                                                                <img src={resolvedUrlFoto} className="w-9 h-9 rounded border border-gray-600 object-cover cursor-pointer hover:opacity-80 transition-opacity" onClick={(e) => { e.stopPropagation(); setSelectedImage(resolvedUrlFoto); }} />
                                                            ) : (
                                                                <div className="w-9 h-9 rounded bg-[#1e2336] border border-gray-600 flex items-center justify-center cursor-pointer hover:bg-gray-700 transition-colors" onClick={(e) => { e.stopPropagation(); setSelectedImage('https://via.placeholder.com/400x500/1e2336/9ca3af.png?text=Foto+Belum+Tersedia'); }}>
                                                                    <i className="fas fa-image text-gray-500 text-[11px]"></i>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>

                                                    {/* DETAIL INFORMASI & MAP (DIBUKA SAAT DIKLIK) */}
                                                    {isMapShown && (
                                                        <div className="bg-[#151928] p-4 border-t-2 border-[#1e2336] shadow-inner flex flex-col lg:flex-row gap-5 cursor-default" onClick={(e) => e.stopPropagation()}>
                                                            
                                                            {/* Kolom Histori Perjalanan */}
                                                            <div className="flex-1 bg-[#1e2336] p-4 rounded-xl border border-[#2a3147] shadow-sm">
                                                                <h5 className="font-bold text-[#e65c00] uppercase mb-4 text-[10px] tracking-wider"><i className="fas fa-history mr-1.5"></i> Histori Perjalanan Paket</h5>
                                                                <div className="space-y-4 relative border-l border-[#374151] ml-2.5 pl-5">
                                                                    <div className="relative">
                                                                        <div className="absolute -left-[26px] top-0.5 bg-green-500 w-3 h-3 rounded-full border-2 border-[#1e2336]"></div>
                                                                        <p className="font-bold text-gray-200 text-xs">Paket Diterima di Gudang Exceed</p>
                                                                        <p className="text-gray-500 text-[10px] mt-0.5"><span className="font-bold text-gray-400">{displayInputTglFull}</span> - Sistem Terdaftar</p>
                                                                    </div>
                                                                    <div className="relative">
                                                                        <div className={`absolute -left-[26px] top-0.5 w-3 h-3 rounded-full border-2 border-[#1e2336] ${pkg.status !== 'siap_antar' && pkg.status !== 'proses' ? 'bg-green-500' : 'bg-blue-500 animate-ping'}`}></div>
                                                                        {pkg.status === 'siap_antar' || pkg.status === 'proses' ? (
                                                                            <div>
                                                                                <p className="font-bold text-blue-400 text-xs">Sedang Di Proses Antar oleh Kurir {displayKurir}</p>
                                                                                <p className="text-gray-500 text-[10px] mt-0.5">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                            </div>
                                                                        ) : (
                                                                            <div>
                                                                                <p className="font-semibold text-gray-300 text-xs">Diserahkan Ke Kurir ({displayKurir})</p>
                                                                                <p className="text-gray-500 text-[10px] mt-0.5">Paket berhasil disortir dan dibawa kurir</p>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                    {isSukses && (
                                                                        <div className="relative">
                                                                            <div className="absolute -left-[26px] top-0.5 bg-green-500 w-3 h-3 rounded-full border-2 border-[#1e2336]"></div>
                                                                            <p className="font-bold text-emerald-400 text-xs">Paket Sukses Diterima</p>
                                                                            <p className="text-gray-500 text-[10px] mt-0.5">Diselesaikan pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                        </div>
                                                                    )}
                                                                    {String(pkg.status).toLowerCase() === 'cancel' && (
                                                                        <div className="relative">
                                                                            <div className="absolute -left-[26px] top-0.5 bg-red-500 w-3 h-3 rounded-full border-2 border-[#1e2336]"></div>
                                                                            <p className="font-bold text-red-400 text-xs">Paket Batal / Cancel</p>
                                                                            <p className="text-gray-500 text-[10px] mt-0.5">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                        </div>
                                                                    )}
                                                                    {String(pkg.status).toLowerCase() === 'pending' && (
                                                                        <div className="relative">
                                                                            <div className="absolute -left-[26px] top-0.5 bg-orange-500 w-3 h-3 rounded-full border-2 border-[#1e2336] animate-pulse"></div>
                                                                            <p className="font-bold text-orange-400 text-xs">Paket Pending / Tertunda</p>
                                                                            <p className="text-gray-500 text-[10px] mt-0.5">Diupdate pada: <span className="font-bold text-gray-400">{displayTglFull}</span></p>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            </div>
                                                            
                                                            {/* Kolom Peta (Tracking Map) */}
                                                            <div className="flex-1">
                                                                <TrackingMap packageId={pkg.packageId} address={pkg.address} status={pkg.status} lastSuccessId={globalLastSuccessId} />
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="text-center pt-2 pb-2"><p className="text-[9px] md:text-[10px] text-gray-400 font-medium">Exceed Express Logistics &copy; 2026</p></div>
                    </div>

                    {selectedImage && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/85 backdrop-blur-sm p-4 transition-opacity" onClick={() => setSelectedImage(null)}>
                            <div className="relative w-full max-w-md flex flex-col items-center transform transition-all scale-100" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center transition-colors shadow-lg"><i className="fas fa-times text-xl"></i></button>
                                <img src={selectedImage} alt="Foto Paket Membesar" className="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border-4 border-white/10 bg-black/50" />
                                <p className="text-white font-black mt-4 tracking-widest text-sm uppercase flex items-center bg-black/50 px-4 py-2 rounded-full border border-white/10"><i className="fas fa-camera mr-2 text-blue-400"></i> FOTO BUKTI</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
