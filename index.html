<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Klien - Exceed Express</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e2336">
    <link rel="apple-touch-icon" href="Logo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS & JS untuk Tracking Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
    <!-- Pustaka React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Pustaka Babel (Menggunakan versi spesifik 7.23.5 untuk mencegah error import) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- PUSTAKA UNTUK EXPORT JPG & PDF (CETAK REKAP) -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: manipulation; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Tulisan Berjalan */
        .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        
        /* Animasi */
        @keyframes fadeInDown { 0% { opacity: 0; transform: translateY(-5px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
        
        @keyframes bounce-move { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .moving-truck-marker { animation: bounce-move 1s ease-in-out infinite; filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.5)); }

        /* Tabel Dashboard Fit To Screen */
        .table-fit { table-layout: fixed; width: 100%; border-collapse: collapse; }
        .table-fit th, .table-fit td { word-wrap: break-word; overflow-wrap: break-word; }

        .cetak-area { width: 100%; max-width: 100%; margin: 0 auto; background-color: #fff; }
        .print-table { width: 100%; table-layout: fixed; border-collapse: collapse; }
        .print-table th, .print-table td { border: 1px solid #000; word-wrap: break-word; overflow-wrap: break-word; }
        .print-table th { background-color: #f3f4f6; text-align: center; font-weight: bold; }
        .print-table td { text-align: left; vertical-align: middle; }
        .print-table td.center { text-align: center; }
        .print-table td.right { text-align: right; }
        
        .box-summary { border: 1px solid #000; font-weight: bold; background-color: #fff; width: 100%; table-layout: fixed; }
        .box-summary td { border: 1px solid #000; word-wrap: break-word; }

        /* PERINTAH PAKSA: BILA DIBUKA DI HP, KECILKAN FONT DRASTIS AGAR MUAT 1 LAYAR */
        @media screen and (max-width: 768px) {
            .cetak-area { padding: 6px !important; }
            .print-table { font-size: 4px; }
            .print-table th, .print-table td { padding: 2px 1px; }
            .box-summary { font-size: 4.5px; }
            .box-summary td { padding: 2px; }
            .cetak-logo-container { width: 35px; height: auto; }
            .cetak-header-text { font-size: 5px; padding: 2px 4px; min-width: 0; width: 100%; }
            .cetak-header-gap { gap: 4px !important; }
            .cetak-title-box { gap: 2px !important; }
            .footer-print { font-size: 4px !important; }
            .footer-print p.lg { font-size: 5px !important; }
        }
        
        /* BILA DIBUKA DI LAPTOP, BESARKAN KEMBALI */
        @media screen and (min-width: 769px) {
            .cetak-area { padding: 32px !important; min-width: 1000px; }
            .print-table { font-size: 11px; }
            .print-table th, .print-table td { padding: 4px 6px; }
            .box-summary { font-size: 12px; }
            .box-summary td { padding: 4px 8px; }
            .cetak-logo-container { width: 120px; }
            .cetak-header-text { font-size: 14px; padding: 6px 16px; min-width: 250px; }
            .cetak-header-gap { gap: 24px !important; }
            .cetak-title-box { gap: 4px !important; }
            .footer-print { font-size: 10px !important; }
            .footer-print p.lg { font-size: 14px !important; }
        }

        /* Aturan saat tombol Print Kertas/Printer Fisik ditekan */
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background-color: #fff !important; }
            .no-print { display: none !important; }
            .cetak-area { width: 100% !important; min-width: 100% !important; margin: 0 !important; padding: 0 !important; box-shadow: none !important; border: none !important; }
            .print-table { font-size: 10px !important; }
            .print-table th, .print-table td { padding: 4px !important; }
            .box-summary { font-size: 11px !important; }
            .cetak-logo-container { width: 100px !important; }
            .cetak-header-text { font-size: 12px !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        #export-loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="antialiased">
    
    <div id="export-loading">
        <i class="fas fa-circle-notch fa-spin text-4xl text-[#e65c00] mb-4"></i>
        <h2 class="text-xl font-bold text-slate-800 text-center px-4">Mempersiapkan Dokumen...</h2>
        <p class="text-slate-500 text-sm mt-2 text-center px-4">Harap tunggu, mengekstrak data ke format cetak <b>Resolusi Tinggi</b>.</p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const loadLocal = (key, fallback) => {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
        };
        
        const formatShort = (amount) => {
            if (!amount && amount !== 0) return '-';
            if (amount === 0) return '0';
            return new Intl.NumberFormat('id-ID').format(amount);
        };

        function TrackingMap({ packageId, address, status, koordinatGps }) {
            const mapRef = useRef(null);
            const isProses = ['siap_antar', 'proses'].includes(String(status).toLowerCase().replace(' ', '_'));

            useEffect(() => {
                const timer = setTimeout(() => {
                    const mapId = `map-${packageId}`;
                    const container = document.getElementById(mapId);
                    if (!container || container._leaflet_id) return;

                    let lat = -2.53371; let lng = 140.71813; let isRealGps = false;

                    if (koordinatGps && typeof koordinatGps === 'string' && koordinatGps.includes(',')) {
                        const parts = koordinatGps.split(',');
                        const parsedLat = parseFloat(parts[0].trim());
                        const parsedLng = parseFloat(parts[1].trim());
                        if (!isNaN(parsedLat) && !isNaN(parsedLng)) { lat = parsedLat; lng = parsedLng; isRealGps = true; }
                    }

                    if (!isRealGps) {
                        let hash = 0;
                        for (let i = 0; i < packageId.length; i++) hash = packageId.charCodeAt(i) + ((hash << 5) - hash);
                        lat = -2.53371 + ((hash % 100) / 4500); lng = 140.71813 + (((hash >> 8) % 100) / 4500);
                    }

                    try {
                        const map = L.map(mapId, { center: [lat, lng], zoom: 16, zoomControl: true, attributionControl: false });
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

                        let marker;
                        if (isProses) {
                            const truckIcon = L.divIcon({ className: 'custom-leaflet-icon', html: `<div class="text-[#e65c00] text-3xl moving-truck-marker"><i class="fas fa-truck-fast"></i></div>`, iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20] });
                            marker = L.marker([lat, lng], { icon: truckIcon }).addTo(map);
                            marker.bindPopup(`<b>Kurir Dalam Perjalanan!</b><br/><span class="text-[10px] text-gray-500">${address || 'Alamat Penerima'}</span>`).openPopup();
                        } else {
                            marker = L.marker([lat, lng]).addTo(map);
                            marker.bindPopup(`<b>Lokasi Pengiriman:</b><br/>${isRealGps ? '📍 GPS Akurat' : '📍 Estimasi Area'}<br/><span class="text-[10px] text-gray-500">${address || 'Alamat Penerima'}</span>`).openPopup();
                        }
                        mapRef.current = map;
                    } catch (err) { console.error("Map Error:", err); }
                }, 300);
                return () => clearTimeout(timer);
            }, [packageId, address, status, koordinatGps]);

            return (
                <div className="bg-[#1e2336] p-2 md:p-3 rounded-xl shadow-inner border border-[#2a3147] mt-3 animate-fade-in-down w-full max-w-full overflow-hidden no-print">
                    <div className="flex justify-between items-center mb-2 text-[9px] md:text-xs font-bold text-gray-400 uppercase tracking-widest">
                        <span><i className={`fas ${isProses ? 'fa-satellite-dish text-blue-400 animate-pulse' : 'fa-map-marked-alt text-[#34d399]'} mr-1.5`}></i> {isProses ? 'Live Tracking Kurir' : 'Geolokasi Pengantaran'}</span>
                    </div>
                    <div id={`map-${packageId}`} className="h-48 md:h-64 w-full rounded-lg z-0 border border-[#2a3147]"></div>
                </div>
            );
        }

        function App() {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
            const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

            const [userProfile, setUserProfile] = useState(() => loadLocal('ex_olshopProfile', null));
            const [isLoadingSync, setIsLoadingSync] = useState(false);
            const [syncMessage, setSyncMessage] = useState({ text: '', type: '' });
            
            const [loginUname, setLoginUname] = useState('');
            const [loginPass, setLoginPass] = useState('');

            const [packages, setPackages] = useState(() => loadLocal('ex_olshopPackages', []));
            const [masterOlshops, setMasterOlshops] = useState(() => loadLocal('ex_masterOlshops', []));
            
            // MENU NAVIGASI UTAMA: 'dashboard' ATAU 'cetak'
            const [activeMenu, setActiveMenu] = useState('dashboard');
            
            // FILTER DASHBOARD
            const [filterStatus, setFilterStatus] = useState('semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [showMapIds, setShowMapIds] = useState([]); 
            const [selectedImage, setSelectedImage] = useState(null);
            const printAreaRef = useRef(null);

            const toggleMap = (id) => setShowMapIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            const getFinancials = (pkg) => {
                const hBarang = Number(pkg.hargaPaket) || 0;
                const tagihan = Number(pkg.totalTagihan) || 0;
                const oTambahan = Number(pkg.tambahanOngkir) || 0;
                let oDasar = Number(pkg.ongkirDasar) || 0;
                if (oDasar === 0) oDasar = (tagihan - hBarang > 0 ? tagihan - hBarang : 0) - oTambahan;
                return { hBarang, tagihan, oDasar: Math.max(0, oDasar), oTambahan, oTotal: Math.max(0, oDasar) + oTambahan };
            };

            const getFotoUrl = (pkg) => {
                const fileKey = pkg.fotoBukti || pkg.foto_bukti || pkg.foto || pkg.bukti || pkg.gambar;
                if (!fileKey || String(fileKey).trim() === '') return null;
                if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) return fileKey;
                return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
            };

            const syncData = async (isLoginAttempt = false) => {
                setIsLoadingSync(true);
                if(!isLoginAttempt) setSyncMessage({ text: '', type: '' });
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    if (result.status === 'success') {
                        setMasterOlshops(result.data.olshop || []);
                        setPackages(result.data.packages || []);
                        if(!isLoginAttempt) {
                            setSyncMessage({ text: 'Data berhasil diperbarui!', type: 'success' });
                            setTimeout(() => setSyncMessage({ text: '', type: '' }), 3000);
                        }
                        return result.data.olshop;
                    } else { setSyncMessage({ text: 'Gagal memuat data dari server.', type: 'error' }); return false; }
                } catch (error) { setSyncMessage({ text: 'Koneksi terputus. Cek internet.', type: 'error' }); return false; } 
                finally { setIsLoadingSync(false); }
            };

            useEffect(() => { if (masterOlshops.length === 0 && !userProfile) syncData(); }, []);
            useEffect(() => { localStorage.setItem('ex_olshopProfile', JSON.stringify(userProfile)); }, [userProfile]);
            useEffect(() => { localStorage.setItem('ex_olshopPackages', JSON.stringify(packages)); }, [packages]);
            useEffect(() => { localStorage.setItem('ex_masterOlshops', JSON.stringify(masterOlshops)); }, [masterOlshops]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setSyncMessage({ text: 'Memeriksa kredensial...', type: 'info' });
                const currentOlshops = await syncData(true) || [];
                const uname = loginUname.trim().toLowerCase();
                const pass = loginPass.trim();
                const validUser = currentOlshops.find(o => String(o.nama).trim().toLowerCase() === uname && String(o.phone).trim() === pass);

                if (validUser) {
                    setUserProfile({ id: validUser.id, name: validUser.nama });
                    setLoginUname(''); setLoginPass('');
                    syncData(); 
                } else { setSyncMessage({ text: 'Nama Toko atau Nomor WA Salah!', type: 'error' }); }
            };

            // HALAMAN LOGIN
            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#0f172a] p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-[#1e3a8a] to-[#0f172a]"></div>
                        <div className="bg-[#1e293b] p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10 border border-slate-700">
                            <div className="w-20 h-20 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 text-[#1d78d4] shadow-inner border border-blue-500/20">
                                <i className="fas fa-store text-4xl"></i>
                            </div>
                            <h1 className="text-2xl font-black text-white tracking-tight">PORTAL KLIEN</h1>
                            <p className="text-sm text-slate-400 mb-8 font-medium">Exceed Express Tracking</p>
                            <form onSubmit={handleLogin} className="space-y-4">
                                {syncMessage.text && (
                                    <div className={`text-xs py-3 px-3 rounded-xl font-bold flex items-start text-left ${syncMessage.type === 'error' ? 'bg-red-900/50 text-red-400 border border-red-800' : 'bg-blue-900/50 text-blue-400 border border-blue-800'}`}>
                                        <i className={`fas ${syncMessage.type === 'error' ? 'fa-exclamation-triangle' : 'fa-spinner fa-spin'} mr-2 mt-0.5`}></i><span>{syncMessage.text}</span>
                                    </div>
                                )}
                                <div className="relative">
                                    <i className="fas fa-store absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                                    <input type="text" required value={loginUname} onChange={(e) => setLoginUname(e.target.value)} placeholder="Ketik Nama Olshop Anda" className="w-full pl-12 pr-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl text-sm outline-none focus:border-[#1d78d4] text-white transition-all font-medium placeholder-slate-500" disabled={isLoadingSync} />
                                </div>
                                <div className="relative">
                                    <i className="fas fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500"></i>
                                    <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="Nomor WhatsApp" className="w-full pl-12 pr-4 py-3.5 bg-slate-800 border border-slate-700 rounded-xl text-sm outline-none focus:border-[#1d78d4] text-white transition-all font-medium placeholder-slate-500" disabled={isLoadingSync} />
                                </div>
                                <button type="submit" disabled={isLoadingSync} className={`w-full text-white font-bold py-3.5 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center mt-2 ${isLoadingSync ? 'bg-slate-600 cursor-not-allowed shadow-none' : 'bg-[#1d78d4] hover:bg-blue-600'}`}>
                                    {isLoadingSync ? <><i className="fas fa-sync-alt animate-spin mr-2"></i> Memproses...</> : 'Buka Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            let rawFilteredPkgs = packages.filter(p => {
                const pOlshopName = String(p.olshopName).trim().toLowerCase();
                const uName = String(userProfile.name).trim().toLowerCase();
                const uId = String(userProfile.id).trim().toLowerCase();
                return pOlshopName === uName || pOlshopName === uId || pOlshopName.includes(uName) || uName.includes(pOlshopName);
            });

            if (startDate || endDate) {
               rawFilteredPkgs = rawFilteredPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggal || '';
                  if (!pDateStr) return false;
                  let normalizedDateStr = "";
                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                          const parts = pDateStr.split('/');
                          if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                      }
                      if (!isNaN(d.getTime())) {
                          const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0');
                          normalizedDateStr = `${year}-${month}-${day}`;
                      } else { normalizedDateStr = pDateStr.split('T')[0]; }
                  } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                  const sDate = startDate ? startDate : "2000-01-01";
                  const eDate = endDate ? endDate : "2100-01-01";
                  return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
               });
            }

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                rawFilteredPkgs = rawFilteredPkgs.filter(p => String(p.customerName).toLowerCase().includes(q) || String(p.packageId).toLowerCase().includes(q));
            }

            let dashboardFilteredPkgs = rawFilteredPkgs;
            if (filterStatus !== 'semua') {
                dashboardFilteredPkgs = dashboardFilteredPkgs.filter(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if (filterStatus === 'proses') return stat === 'siap_antar' || stat === 'proses';
                    return stat === filterStatus;
                });
            }

            let s_sukses = 0, s_proses = 0, s_pending = 0, s_cancel = 0;
            let saldoBelumCair = 0, danaSudahCairBersih = 0, potonganBelumCair = 0;
            let uangBarangAll = 0, bebanOngkirAll = 0;
            let print_sukses = 0, print_pending = 0, print_cancel = 0;
            let print_setoran = 0, print_tfVolume = 0, print_sudahSetor = 0;

            rawFilteredPkgs.forEach(pkg => {
                let stat = String(pkg.status).toLowerCase().replace(' ', '_');
                const metode = String(pkg.metodeBayar).trim().toUpperCase();
                const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';
                const { hBarang, oTotal } = getFinancials(pkg);

                if (dashboardFilteredPkgs.includes(pkg)) {
                    if(stat === 'sukses') s_sukses++;
                    else if(stat === 'siap_antar' || stat === 'proses') s_proses++;
                    else if(stat === 'pending') s_pending++;
                    else if(stat === 'cancel' || stat === 'batal') s_cancel++;

                    if (stat === 'sukses') {
                        if (metode === 'TF OLSHOP') {
                            bebanOngkirAll += oTotal;
                            if (isCair) danaSudahCairBersih -= oTotal; else potonganBelumCair += oTotal; 
                        } else if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') {
                            uangBarangAll += hBarang;
                            if (isCair) danaSudahCairBersih += hBarang; else saldoBelumCair += hBarang; 
                        }
                    }
                }

                if(stat === 'sukses') {
                    print_sukses++;
                    let currentSetoran = 0; let currentTfVolume = 0;
                    if (metode === 'CASH' || metode === 'COD' || metode === 'TF KANTOR') currentSetoran = hBarang;
                    if (metode === 'TF OLSHOP') currentTfVolume = oTotal;
                    
                    print_setoran += currentSetoran;
                    print_tfVolume += currentTfVolume;
                    if (isCair) print_sudahSetor += (currentSetoran - currentTfVolume);
                }
                else if(stat === 'siap_antar' || stat === 'proses' || stat === 'pending') print_pending++;
                else if(stat === 'cancel' || stat === 'batal') print_cancel++;
            });
            
            const totalPencairanEstimasi = saldoBelumCair - potonganBelumCair;
            const totalBersihSemua = uangBarangAll - bebanOngkirAll;
            const print_estimasiSetoran = print_setoran - print_tfVolume;

            const StatusBadge = ({ status, isCair, isSukses }) => {
                const s = String(status).toLowerCase();
                if(s === 'sukses') {
                    return (
                        <div className="flex flex-col items-center justify-center">
                            <span className="bg-[#153a2b] text-[#34d399] px-1 md:px-2 py-0.5 rounded text-[5px] md:text-[9px] font-bold border border-[#1d4f3b] flex items-center shadow-sm w-max"><i className="fas fa-check-circle mr-1"></i>Sukses</span>
                            <span className={`mt-0.5 px-1 py-0.5 rounded text-[4.5px] md:text-[7px] font-bold border w-max ${isCair ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800' : 'bg-[#e65c00]/20 text-[#fb923c] border-[#e65c00]/50'}`}>{isCair ? 'CAIR' : 'BLM CAIR'}</span>
                        </div>
                    );
                }
                if(s === 'cancel' || s === 'batal') return <span className="bg-[#450a0a] text-[#f87171] px-1 md:px-2 py-0.5 rounded text-[5.5px] md:text-[9px] font-bold border border-[#7f1d1d] flex items-center w-max mx-auto shadow-sm"><i className="fas fa-times-circle mr-1"></i>Cancel</span>;
                if(s === 'pending') return <span className="bg-[#431407] text-[#fb923c] px-1 md:px-2 py-0.5 rounded text-[5.5px] md:text-[9px] font-bold border border-[#7c2d12] flex items-center w-max mx-auto shadow-sm"><i className="fas fa-clock mr-1"></i>Pending</span>;
                return <span className="bg-[#1e3a8a] text-[#60a5fa] px-1 md:px-2 py-0.5 rounded text-[5.5px] md:text-[9px] font-bold border border-[#1e40af] flex items-center w-max mx-auto shadow-sm"><i className="fas fa-truck mr-1 animate-pulse"></i>Proses</span>;
            };

            const getIndoDate = (dateStr) => {
                if(!dateStr) return '-';
                try {
                    const d = new Date(dateStr);
                    const months = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];
                    return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
                } catch(e) { return dateStr; }
            };

            const displayHeaderDate = () => {
                if (startDate && endDate) {
                    if (startDate === endDate) return getIndoDate(startDate);
                    return `${getIndoDate(startDate)} - ${getIndoDate(endDate)}`;
                } else if (startDate) return `Sejak ${getIndoDate(startDate)}`;
                else if (endDate) return `Hingga ${getIndoDate(endDate)}`;
                return 'Semua Waktu';
            };

            const executeExport = async (format) => {
                if (!printAreaRef.current) return;
                const loadingEl = document.getElementById('export-loading');
                loadingEl.style.display = 'flex'; 
                const currentScrollY = window.scrollY;
                window.scrollTo(0, 0);

                setTimeout(async () => {
                    try {
                        const element = printAreaRef.current;
                        const canvas = await html2canvas(element, { 
                            scale: 2, 
                            useCORS: true, 
                            backgroundColor: '#ffffff',
                            // TRIK MASTER: Paksa html2canvas me-render seolah-olah layarnya selebar Desktop (1200px)
                            // Meskipun tombol dipencet dari layar HP yang sempit, hasilnya tetap kualitas A4 rapi!
                            windowWidth: 1200, 
                            windowHeight: element.scrollHeight
                        });
                        
                        window.scrollTo(0, currentScrollY);
                        
                        const imgData = canvas.toDataURL('image/jpeg', 1.0);
                        const safeFileNameDate = (startDate === endDate && startDate) ? startDate : 'Rentang_Waktu';
                        const fileName = `Rekap_OLSHOP_${userProfile.name.replace(/\s+/g, '_')}_${safeFileNameDate}`;

                        if (format === 'jpg') {
                            const link = document.createElement('a'); link.href = imgData; link.download = `${fileName}.jpg`; link.click();
                        } else if (format === 'pdf') {
                            const { jsPDF } = window.jspdf;
                            const pdf = new jsPDF('l', 'mm', 'a4');
                            const pdfWidth = pdf.internal.pageSize.getWidth(); const pdfHeight = pdf.internal.pageSize.getHeight();
                            const imgWidth = pdfWidth - 20; const imgHeight = (canvas.height * imgWidth) / canvas.width; 
                            
                            let heightLeft = imgHeight; let position = 10; 
                            pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
                            heightLeft -= (pdfHeight - 20); 
                            
                            while (heightLeft > 0) {
                                position = position - pdfHeight; 
                                pdf.addPage();
                                pdf.addImage(imgData, 'JPEG', 10, position, imgWidth, imgHeight);
                                heightLeft -= pdfHeight;
                            }
                            pdf.save(`${fileName}.pdf`);
                        }
                    } catch (err) { console.error("Gagal export:", err); alert("Terjadi kesalahan saat memproses. Pastikan koneksi internet stabil."); } 
                    finally { loadingEl.style.display = 'none'; }
                }, 800); 
            };

            return (
                <div className="min-h-screen bg-[#f3f4f6] font-sans w-full max-w-[1400px] mx-auto flex flex-col pb-8">
                    
                    {/* HEADER & TABS MENU */}
                    <div className="bg-[#1e2336] px-4 pt-4 pb-0 text-white rounded-b-3xl shadow-md sticky top-0 z-50 no-print">
                        <div className="flex justify-between items-start mb-5">
                            <div>
                                <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-0.5">PORTAL KLIEN</p>
                                <h1 className="text-xl md:text-2xl font-black uppercase tracking-tight">{userProfile.name}</h1>
                            </div>
                            <button onClick={() => {setUserProfile(null); setPackages([]);}} className="text-gray-400 hover:text-white transition-colors" title="Keluar">
                                <i className="fas fa-sign-out-alt text-xl"></i>
                            </button>
                        </div>
                        
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setActiveMenu('dashboard')} 
                                className={`flex-1 py-3 text-[11px] md:text-sm font-bold rounded-t-xl transition-all flex items-center justify-center gap-2 ${activeMenu === 'dashboard' ? 'bg-[#e65c00] text-white shadow-[0_-4px_10px_rgba(230,92,0,0.3)]' : 'bg-transparent text-gray-400 hover:bg-[#2a3147]'}`}
                            >
                                <i className="fas fa-chart-pie"></i> Dashboard
                            </button>
                            <button 
                                onClick={() => setActiveMenu('cetak')} 
                                className={`flex-1 py-3 text-[11px] md:text-sm font-bold rounded-t-xl transition-all flex items-center justify-center gap-2 ${activeMenu === 'cetak' ? 'bg-[#f3f4f6] text-gray-800 shadow-[0_-4px_10px_rgba(0,0,0,0.1)]' : 'bg-transparent text-gray-400 hover:bg-[#2a3147]'}`}
                            >
                                <i className="fas fa-print"></i> Cetak Rekap
                            </button>
                        </div>
                    </div>

                    {/* MARQUEE TULISAN BERJALAN */}
                    <div className="bg-[#fff7ed] border-b border-[#fed7aa] w-full overflow-hidden shadow-sm no-print mb-2">
                        <div className="marquee-content py-1.5 text-[10px] md:text-xs font-black tracking-wider text-[#ea580c] uppercase">
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas 
                        </div>
                    </div>

                    {/* ================= TAMPILAN DASHBOARD (TAB 1) ================= */}
                    {activeMenu === 'dashboard' && (
                        <div className="animate-fade-in-down">
                            {/* KOTAK FILTER KHAS WARNA PUTIH */}
                            <div className="bg-white p-4 md:p-5 rounded-3xl shadow-sm border border-gray-100 mx-3 md:mx-6 mb-5">
                                {/* Search */}
                                <div className="relative mb-4">
                                    <i className="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="Cari Resi atau Nama Customer..." className="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium text-gray-700" />
                                </div>
                                
                                {/* Dates & X */}
                                <div className="flex flex-col gap-3 mb-4">
                                    <div className="flex gap-2 w-full">
                                        <div className="relative flex-1">
                                            <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs"></i>
                                            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="w-full pl-8 pr-2 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs outline-none focus:border-[#e65c00] font-medium text-gray-600" />
                                        </div>
                                        <div className="relative flex-1">
                                            <i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs"></i>
                                            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="w-full pl-8 pr-2 py-3 bg-gray-50 border border-gray-200 rounded-xl text-xs outline-none focus:border-[#e65c00] font-medium text-gray-600" />
                                        </div>
                                    </div>
                                    
                                    {(startDate || endDate) && (
                                        <div className="flex justify-center -mt-2 -mb-1">
                                            <button onClick={() => {setStartDate(''); setEndDate('');}} className="text-red-500 hover:bg-red-50 p-1.5 rounded-full transition-colors">
                                                <i className="fas fa-times font-black text-lg"></i>
                                            </button>
                                        </div>
                                    )}
                                </div>

                                {/* Status Pills */}
                                <div className="flex overflow-x-auto gap-2 scrollbar-hide pt-1 pb-1">
                                    {[{id:'semua', label:'Semua'}, {id:'proses', label:'Proses'}, {id:'sukses', label:'Sukses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Batal'}].map(s => (
                                        <button 
                                            key={s.id} 
                                            onClick={() => setFilterStatus(s.id)} 
                                            className={`px-4 py-2.5 rounded-xl text-[11px] md:text-xs font-bold shrink-0 transition-all ${filterStatus === s.id ? 'bg-[#e65c00] text-white shadow-md' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}
                                        >
                                            {s.label}
                                        </button>
                                    ))}
                                    <button onClick={() => syncData()} disabled={isLoadingSync} className="bg-blue-50 text-blue-600 border border-blue-100 px-4 py-2.5 rounded-xl text-[11px] md:text-xs font-bold shrink-0 flex items-center gap-1.5 ml-auto">
                                        <i className={`fas fa-sync-alt ${isLoadingSync ? 'animate-spin' : ''}`}></i> Refresh
                                    </button>
                                </div>
                            </div>

                            <div className="px-3 md:px-6 space-y-4">
                                {/* WIDGET KEUANGAN */}
                                <div className="bg-[#e65c00] rounded-3xl shadow-lg border border-[#cc5200] overflow-hidden text-white relative">
                                    <div className="absolute right-0 top-0 opacity-10 transform translate-x-4 -translate-y-4"><i className="fas fa-wallet text-[150px]"></i></div>
                                    <div className="p-5 md:p-6 relative z-10">
                                        <h3 className="text-[10px] md:text-[12px] font-bold uppercase tracking-widest text-orange-200 mb-2"><i className="fas fa-wallet mr-1.5"></i> Estimasi Pencairan</h3>
                                        <h1 className="text-4xl md:text-5xl font-black mb-4 tracking-tight drop-shadow-md">{formatCurrency(totalPencairanEstimasi)}</h1>
                                        
                                        <div className="flex flex-col gap-1.5 text-[10px] md:text-xs font-semibold text-orange-100 bg-[#cc5200]/50 p-3.5 rounded-xl border border-white/10 w-max pr-12 shadow-inner">
                                            <div className="flex items-center gap-3"><i className="fas fa-arrow-circle-up text-green-400 text-xs md:text-sm w-3"></i><span>Harga Barang (Hak Olshop)</span><span className="font-bold ml-auto pl-4">+{formatCurrency(saldoBelumCair)}</span></div>
                                            <div className="flex items-center gap-3"><i className="fas fa-arrow-circle-down text-red-300 text-xs md:text-sm w-3"></i><span>Beban Ongkir TF Olshop</span><span className="font-bold text-red-200 ml-auto pl-4">-{formatCurrency(potonganBelumCair)}</span></div>
                                        </div>
                                    </div>
                                    <div className="bg-[#15803d] border-t border-[#166534] px-5 py-3 flex justify-between items-center text-green-50 shadow-inner">
                                        <span className="text-[10px] md:text-xs font-bold flex items-center"><i className="fas fa-shield-alt text-green-300 mr-1.5"></i> Dana Telah Dicairkan</span>
                                        <span className="text-base font-black tracking-wide">{formatCurrency(danaSudahCairBersih)}</span>
                                    </div>
                                </div>

                                {/* WIDGET RINGKASAN STATUS & KEUANGAN TOTAL */}
                                <div className="bg-[#1e2336] rounded-2xl shadow-lg border border-[#2a3147] text-white flex flex-col md:flex-row overflow-hidden divide-y md:divide-y-0 md:divide-x divide-[#2a3147]">
                                    <div className="flex-1 p-4 md:p-5 flex flex-col items-center justify-center">
                                        <div className="text-[9px] md:text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3">TOTAL STATUS PKT</div>
                                        <div className="flex gap-2">
                                            <span className="bg-[#153a2b] text-[#34d399] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#1d4f3b]"><i className="fas fa-check-circle mr-1"></i>{s_sukses} <span className="text-[7px] uppercase font-normal text-gray-400 ml-0.5">Sukses</span></span>
                                            <span className="bg-[#1e3a8a] text-[#60a5fa] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#1e40af]"><i className="fas fa-truck mr-1"></i>{s_proses} <span className="text-[7px] uppercase font-normal text-gray-400 ml-0.5">Proses</span></span>
                                            <span className="bg-[#431407] text-[#fb923c] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#7c2d12]"><i className="fas fa-clock mr-1"></i>{s_pending} <span className="text-[7px] uppercase font-normal text-gray-400 ml-0.5">Pending</span></span>
                                            <span className="bg-[#450a0a] text-[#f87171] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#7f1d1d]"><i className="fas fa-times-circle mr-1"></i>{s_cancel} <span className="text-[7px] uppercase font-normal text-gray-400 ml-0.5">Cancel</span></span>
                                        </div>
                                    </div>
                                    <div className="flex-1 p-4 flex justify-between items-center md:flex-col md:justify-center">
                                        <div className="text-[9px] md:text-[10px] text-[#34d399] font-bold uppercase tracking-widest md:mb-1">BARANG (CASH/TF KTR)</div>
                                        <div className="text-base md:text-lg font-black text-[#34d399]">+{formatCurrency(uangBarangAll)}</div>
                                    </div>
                                    <div className="flex-1 p-4 flex justify-between items-center md:flex-col md:justify-center">
                                        <div className="text-[9px] md:text-[10px] text-[#f87171] font-bold uppercase tracking-widest md:mb-1">BEBAN ONGKIR (TF OLSHOP)</div>
                                        <div className="text-base md:text-lg font-black text-[#f87171]">{bebanOngkirAll > 0 ? '-' : ''}{formatCurrency(bebanOngkirAll)}</div>
                                    </div>
                                    <div className="flex-1 p-4 flex justify-between items-center md:flex-col md:justify-center bg-[#252b41]">
                                        <div className="text-[9px] md:text-[10px] text-white font-bold uppercase tracking-widest md:mb-1">TOTAL BERSIH</div>
                                        <div className="text-lg md:text-xl font-black text-[#fb923c]">{formatCurrency(totalBersihSemua)}</div>
                                    </div>
                                </div>

                                {/* TABEL DATA FLAT (FIT TO SCREEN) */}
                                <div className="flex flex-col mt-6">
                                    <div className="flex justify-between items-end mb-3 px-1">
                                        <h3 className="font-bold text-gray-700 text-sm md:text-lg flex items-center"><i className="fas fa-list-alt text-[#1d78d4] mr-2"></i> Rincian Paket Pelanggan</h3>
                                        <span className="text-[9px] md:text-[11px] font-bold bg-gray-200 text-gray-600 px-3 py-1 rounded-full">{dashboardFilteredPkgs.length} Paket</span>
                                    </div>

                                    {dashboardFilteredPkgs.length === 0 ? (
                                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-10 text-center text-gray-400">
                                            <i className="fas fa-box-open text-4xl mb-3"></i><p className="text-sm font-medium">Tidak ada resi untuk filter ini.</p>
                                        </div>
                                    ) : (
                                        <div className="w-full bg-[#1e2336] rounded-xl overflow-hidden shadow-lg border border-[#2a3147]">
                                            <table className="table-fit">
                                                <thead className="bg-[#1d78d4] text-white text-[4.5px] md:text-[10px] leading-tight font-bold tracking-tighter md:tracking-normal uppercase">
                                                    <tr>
                                                        <th className="w-[4%] p-1 md:p-2 border-b border-blue-600">NO</th>
                                                        <th className="w-[12%] p-1 md:p-2 border-b border-blue-600">NO RESI</th>
                                                        <th className="w-[15%] p-1 md:p-2 border-b border-blue-600 text-left">NAMA CUSTOMER</th>
                                                        <th className="w-[7%] p-1 md:p-2 border-b border-blue-600">FOTO</th>
                                                        <th className="w-[8%] p-1 md:p-2 border-b border-blue-600">LACAK</th>
                                                        <th className="w-[12%] p-1 md:p-2 border-b border-blue-600">STATUS</th>
                                                        <th className="w-[10%] p-1 md:p-2 border-b border-blue-600" title="CASH / COD">CASH</th>
                                                        <th className="w-[8%] p-1 md:p-2 border-b border-blue-600" title="TRANSFER OLSHOP">TF OL</th>
                                                        <th className="w-[8%] p-1 md:p-2 border-b border-blue-600" title="TRANSFER KANTOR">TF KTR</th>
                                                        <th className="w-[7%] p-1 md:p-2 border-b border-blue-600 text-[#fca5a5]">BEBAN</th>
                                                        <th className="w-[9%] p-1 md:p-2 border-b border-blue-600">TOTAL</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="text-[6px] md:text-[11px] text-gray-300">
                                                    {dashboardFilteredPkgs.map((pkg, idx) => {
                                                        const { hBarang, oTotal } = getFinancials(pkg);
                                                        const metode = String(pkg.metodeBayar).trim().toUpperCase();
                                                        const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                                        const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';
                                                        const isMapShown = showMapIds.includes(pkg.packageId);
                                                        const resolvedUrlFoto = getFotoUrl(pkg);

                                                        let uCash = 0, uTfOl = 0, uTfKtr = 0, bBeban = 0, tBersih = 0;

                                                        if (isSukses) {
                                                            if (metode === 'CASH' || metode === 'COD') { uCash = hBarang; tBersih = hBarang; }
                                                            else if (metode === 'TF KANTOR') { uTfKtr = hBarang; tBersih = hBarang; }
                                                            else if (metode === 'TF OLSHOP') { uTfOl = hBarang; bBeban = oTotal; tBersih = hBarang - oTotal; }
                                                        }

                                                        let displayKurir = String(pkg.kurirId || '-');
                                                        if (displayKurir.includes('@')) displayKurir = displayKurir.split('@')[0];

                                                        return (
                                                            <React.Fragment key={idx}>
                                                                <tr className="border-b border-[#2a3147] hover:bg-[#252b41] transition-colors">
                                                                    <td className="p-1 md:p-2 text-center font-semibold text-gray-500">{idx + 1}</td>
                                                                    <td className="p-1 md:p-2 text-center font-mono text-[#60a5fa] font-bold tracking-tighter">{pkg.packageId}</td>
                                                                    <td className="p-1 md:p-2 text-left">
                                                                        <div className="font-bold text-white truncate max-w-[50px] md:max-w-[150px]">{pkg.customerName}</div>
                                                                        <div className="text-[4.5px] md:text-[9px] text-gray-500 mt-0.5 truncate max-w-[50px] md:max-w-[150px]"><i className="fas fa-motorcycle mr-0.5 text-gray-600"></i>{displayKurir}</div>
                                                                    </td>
                                                                    <td className="p-1 md:p-2 text-center align-middle">
                                                                        {resolvedUrlFoto ? (
                                                                            <img src={resolvedUrlFoto} alt="F" className="w-4 h-4 md:w-8 md:h-8 rounded object-cover border border-[#374151] mx-auto cursor-pointer hover:opacity-80" onClick={() => setSelectedImage(resolvedUrlFoto)} />
                                                                        ) : (
                                                                            <div className="w-4 h-4 md:w-8 md:h-8 rounded bg-[#151928] border border-dashed border-[#374151] mx-auto flex items-center justify-center text-gray-600"><i className="fas fa-image text-[5px] md:text-sm"></i></div>
                                                                        )}
                                                                    </td>
                                                                    <td className="p-1 md:p-2 text-center align-middle">
                                                                        {(['sukses', 'siap_antar', 'proses'].includes(String(pkg.status).toLowerCase().replace(' ', '_'))) && (
                                                                            <button onClick={() => toggleMap(pkg.packageId)} className={`w-full py-0.5 md:py-1 rounded text-[5px] md:text-[9px] font-bold transition-colors border shadow-sm flex items-center justify-center ${isMapShown ? 'bg-red-500/20 text-red-400 border-red-500/50' : 'bg-blue-600/30 text-blue-400 border-blue-500/50'}`}>
                                                                                <i className={`fas ${isMapShown ? 'fa-times' : 'fa-location-arrow'} md:mr-1`}></i><span className="hidden md:inline">{isMapShown ? 'Tutup' : 'Lacak'}</span>
                                                                            </button>
                                                                        )}
                                                                    </td>
                                                                    <td className="p-1 md:p-2 text-center align-middle"><StatusBadge status={pkg.status} isCair={isCair} isSukses={isSukses} /></td>
                                                                    <td className="p-1 md:p-2 text-center font-bold text-[#34d399] tracking-tighter">{formatShort(uCash)}</td>
                                                                    <td className="p-1 md:p-2 text-center font-bold text-[#60a5fa] tracking-tighter">{formatShort(uTfOl)}</td>
                                                                    <td className="p-1 md:p-2 text-center font-bold text-[#c084fc] tracking-tighter">{formatShort(uTfKtr)}</td>
                                                                    <td className="p-1 md:p-2 text-center font-bold text-[#f87171] tracking-tighter">{bBeban > 0 ? `-${formatShort(bBeban)}` : '-'}</td>
                                                                    <td className="p-1 md:p-2 text-center font-black text-white tracking-tighter">{tBersih > 0 ? `+${formatShort(tBersih)}` : (tBersih < 0 ? formatShort(tBersih) : '-')}</td>
                                                                </tr>
                                                                {isMapShown && (
                                                                    <tr className="bg-[#151928]">
                                                                        <td colSpan="11" className="p-2 md:p-4 border-b border-[#2a3147]">
                                                                            <div className="flex flex-col md:flex-row gap-4 items-start w-full">
                                                                                <div className="flex-1 w-full bg-[#1e2336] p-3 md:p-4 rounded-xl shadow-inner border border-[#2a3147] text-[8px] md:text-[11px]">
                                                                                    <h5 className="font-bold text-[#e65c00] uppercase mb-2 md:mb-3 tracking-wider"><i className="fas fa-history mr-1.5"></i> Histori Paket</h5>
                                                                                    <div className="space-y-3 relative border-l border-[#374151] ml-2 pl-3 md:pl-4">
                                                                                        <div className="relative">
                                                                                            <div className="absolute -left-[17px] md:-left-[21px] top-0.5 bg-green-500 w-2 h-2 md:w-2.5 md:h-2.5 rounded-full border border-[#151928]"></div>
                                                                                            <p className="font-bold text-gray-200 leading-tight">Diterima di Gudang Exceed</p>
                                                                                            <p className="text-gray-500 text-[6px] md:text-[9px] mt-0.5">{pkg.tanggalInput || pkg.tanggal ? String(pkg.tanggalInput || pkg.tanggal).split('T')[0] : '-'} (Sistem Terdaftar)</p>
                                                                                        </div>
                                                                                        <div className="relative">
                                                                                            <div className={`absolute -left-[17px] md:-left-[21px] top-0.5 w-2 h-2 md:w-2.5 md:h-2.5 rounded-full border border-[#151928] ${pkg.status !== 'siap_antar' && pkg.status !== 'proses' ? 'bg-green-500' : 'bg-blue-500 animate-ping'}`}></div>
                                                                                            <p className={`font-bold leading-tight ${pkg.status === 'siap_antar' || pkg.status === 'proses' ? 'text-blue-400' : 'text-gray-300'}`}>{pkg.status === 'siap_antar' || pkg.status === 'proses' ? `Sedang Diantar Kurir (${displayKurir})` : `Diserahkan ke Kurir (${displayKurir})`}</p>
                                                                                            <p className="text-gray-500 text-[6px] md:text-[9px] mt-0.5">{pkg.dateString ? String(pkg.dateString).split('T')[0] : '-'}</p>
                                                                                        </div>
                                                                                        {isSukses && (
                                                                                            <div className="relative">
                                                                                                <div className="absolute -left-[17px] md:-left-[21px] top-0.5 bg-emerald-500 w-2 h-2 md:w-2.5 md:h-2.5 rounded-full border border-[#151928]"></div>
                                                                                                <p className="font-bold text-emerald-400 leading-tight">Paket Sukses Diterima</p>
                                                                                                <p className="text-gray-500 text-[6px] md:text-[9px] mt-0.5">{pkg.dateString ? String(pkg.dateString).split('T')[0] : '-'}</p>
                                                                                            </div>
                                                                                        )}
                                                                                    </div>
                                                                                </div>
                                                                                <div className="flex-1 w-full relative"><TrackingMap packageId={pkg.packageId} address={pkg.address} status={pkg.status} koordinatGps={pkg.koordinatGps} /></div>
                                                                            </div>
                                                                        </td>
                                                                    </tr>
                                                                )}
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="animate-fade-in-down px-2 md:px-6 mb-10">
                        {/* Tombol Aksi Print/Download */}
                        <div className="bg-slate-800 p-3 md:p-4 rounded-2xl shadow-md flex justify-between items-center mb-6 no-print">
                            <div className="text-white text-xs md:text-sm font-bold flex items-center">
                                <i className="fas fa-file-invoice mr-2 text-orange-400"></i> Rekap Area
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => executeExport('jpg')} disabled={rawFilteredPkgs.length === 0} className="bg-slate-700 hover:bg-slate-600 text-blue-400 px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-[10px] md:text-xs font-bold transition flex items-center"><i className="fas fa-image mr-1.5"></i> JPG</button>
                                <button onClick={() => executeExport('pdf')} disabled={rawFilteredPkgs.length === 0} className="bg-slate-700 hover:bg-slate-600 text-red-400 px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-[10px] md:text-xs font-bold transition flex items-center"><i className="fas fa-file-pdf mr-1.5"></i> PDF</button>
                                <button onClick={() => window.print()} disabled={rawFilteredPkgs.length === 0} className="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 md:px-4 md:py-2 rounded-xl text-[10px] md:text-xs font-bold transition shadow-lg shadow-emerald-900/50 flex items-center"><i className="fas fa-print mr-1.5"></i> PRINT</button>
                            </div>
                        </div>

                        {/* WADAH CETAK (Auto-Scale di HP, Fix Width di Desktop) */}
                        <div className="w-full rounded-xl shadow-sm border border-gray-200 bg-white overflow-hidden">
                            <div ref={printAreaRef} className="cetak-area text-black">
                                
                                <div className="flex justify-between items-start mb-4 md:mb-6 cetak-header-gap">
                                    {/* Bagian Kiri (Logo + Title) */}
                                    <div className="flex items-center cetak-header-gap w-1/2">
                                        <div className="flex flex-col items-center">
                                            <div className="cetak-logo-container border border-slate-200 rounded p-0.5 md:p-1 bg-slate-50 flex items-center justify-center">
                                                <img src="https://drive.google.com/uc?id=1xBkWoexBfNOe8WKhDp8WBkh7hjvK4Yub" crossOrigin="anonymous" alt="Exceed Logo" className="w-full h-auto object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                                                <div style={{display: 'none'}} className="w-full h-[50px] bg-[#0f172a] flex-col justify-center items-center text-white italic rounded-sm"><span className="text-xl font-black text-orange-500">e<span className="text-blue-300">X</span></span></div>
                                            </div>
                                            <span className="text-[4px] md:text-[10px] font-bold italic text-slate-700 mt-1 whitespace-nowrap">"Antar tuntas harga pas"</span>
                                        </div>

                                        <div className="flex flex-col w-full cetak-title-box">
                                            <div className="border border-black font-bold uppercase bg-gray-50 flex items-center cetak-header-text">
                                                <span className="text-gray-500 mr-1 md:mr-2 border-r border-gray-400 pr-1 md:pr-2">OLSHOP</span> <span className="truncate">{userProfile.name}</span>
                                            </div>
                                            <div className="border border-black font-semibold cetak-header-text">
                                                {displayHeaderDate()}
                                            </div>
                                        </div>
                                    </div>

                                    {/* KOTAK RINGKASAN KEUANGAN */}
                                    <div className="flex cetak-header-gap w-1/2 justify-end">
                                        <table className="box-summary w-[60%]">
                                            <tbody>
                                                <tr><td className="bg-gray-100">Setoran (Cash)</td><td className="right">{formatShort(print_setoran)}</td></tr>
                                                <tr><td className="bg-gray-100">Beban / Potongan (TF)</td><td className="right text-red-600">{formatShort(print_tfVolume)}</td></tr>
                                                <tr><td className="bg-gray-100">Estimasi Setoran</td><td className="right text-blue-600">{formatShort(print_estimasiSetoran)}</td></tr>
                                                <tr><td className="bg-gray-100">SUDAH DICAIRKAN</td><td className="right text-emerald-600">{formatShort(print_sudahSetor)}</td></tr>
                                            </tbody>
                                        </table>
                                        <table className="box-summary w-[35%]">
                                            <tbody>
                                                <tr><td className="bg-green-400 text-green-900 center uppercase tracking-wider">SUKSES</td><td className="center font-black">{print_sukses}</td></tr>
                                                <tr><td className="bg-yellow-400 text-yellow-900 center uppercase tracking-wider">PENDING</td><td className="center font-black">{print_pending}</td></tr>
                                                <tr><td className="bg-red-500 text-white center uppercase tracking-wider">CANCEL</td><td className="center font-black">{print_cancel}</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* TABEL CETAK UTAMA (Fixed Width Proporsional) */}
                                <table className="print-table">
                                    <thead>
                                        <tr>
                                            <th style={{width: '3%'}}>NO</th>
                                            <th style={{width: '12%'}}>NO RESI</th>
                                            <th style={{width: '14%'}}>NAMA CUSTOMER</th>
                                            <th style={{width: '20%'}}>ALAMAT LENGKAP</th>
                                            <th style={{width: '7%'}}>STATUS</th>
                                            <th style={{width: '8%'}}>METODE</th>
                                            <th style={{width: '8%'}}>HRG BRG</th>
                                            <th style={{width: '8%'}}>ONGKIR</th>
                                            <th style={{width: '6%'}}>TMBH VOL</th>
                                            <th style={{width: '8%'}}>TAGIHAN</th>
                                            <th style={{width: '6%'}}>KURIR</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {rawFilteredPkgs.length === 0 ? (
                                            <tr><td colSpan="11" className="center py-8 text-gray-500 font-bold bg-gray-50">Tidak ada data paket di rentang tanggal ini.</td></tr>
                                        ) : (
                                            rawFilteredPkgs.map((pkg, idx) => {
                                                const stat = String(pkg.status).toUpperCase();
                                                const isPending = stat === 'PENDING' || stat === 'SIAP_ANTAR' || stat === 'PROSES';
                                                const isCancel = stat === 'CANCEL';
                                                const { hBarang, tagihan, oDasar, oTambahan } = getFinancials(pkg);
                                                const baseRowClass = isPending ? "bg-yellow-100" : (isCancel ? "bg-red-100" : "");

                                                return (
                                                    <tr key={idx} className={baseRowClass}>
                                                        <td className="center font-bold">{idx + 1}</td>
                                                        <td className="center font-bold text-gray-700">{pkg.packageId}</td>
                                                        <td className="font-semibold">{pkg.customerName}</td>
                                                        <td>{pkg.address}</td>
                                                        <td className={`center font-bold ${isPending ? 'text-yellow-700' : (isCancel ? 'text-red-600' : 'text-green-700')}`}>{stat === 'SIAP_ANTAR' || stat === 'PROSES' ? 'PENDING' : stat}</td>
                                                        <td className="center">{pkg.metodeBayar || '-'}</td>
                                                        <td className="right">{hBarang === 0 ? '-' : formatShort(hBarang)}</td>
                                                        <td className="right">{oDasar === 0 ? '-' : formatShort(oDasar)}</td>
                                                        <td className="right">{oTambahan === 0 ? '-' : formatShort(oTambahan)}</td>
                                                        <td className="right font-bold">{tagihan === 0 ? '-' : formatShort(tagihan)}</td>
                                                        <td className="uppercase font-bold center">{String(pkg.kurirId || '-').split('@')[0]}</td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                                
                                <div className="mt-4 md:mt-8 center font-bold text-slate-600 border-t-2 border-slate-800 pt-2 flex flex-col footer-print">
                                    <p className="text-slate-800 lg">Exceed Express Logistics</p>
                                    <p className="font-medium text-slate-500 mt-0.5">Alamat Kantor : Jalan Garuda, BTN Bawah Jayapura, Papua. No. HP 08215006669</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MODAL FOTO BESAR */}
                    {selectedImage && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 transition-opacity no-print" onClick={() => setSelectedImage(null)}>
                            <div className="relative w-full max-w-lg flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i className="fas fa-times"></i></button>
                                <img src={selectedImage} alt="Foto Paket" className="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border-4 border-white/10" />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
