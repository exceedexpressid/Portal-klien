<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exceed Express - Portal Klien</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e65c00">
    <link rel="apple-touch-icon" href="Logo.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS & JS untuk Tracking Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { touch-action: manipulation; background-color: #f3f4f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        /* Animasi Marquee / Tulisan Berjalan */
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-5px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.2s ease-out forwards; }

        @keyframes bounce-move {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(2deg); }
        }
        .moving-truck-marker {
            animation: bounce-move 1s ease-in-out infinite;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.5));
        }

        /* Tabel Fit To Screen Rules */
        .table-fit { table-layout: fixed; width: 100%; border-collapse: collapse; }
        .table-fit th, .table-fit td { word-wrap: break-word; overflow-wrap: break-word; }
    </style>
</head>
<body class="antialiased text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const loadLocal = (key, fallback) => {
            try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; }
        };

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
        };

        const formatShort = (amount) => {
            if (!amount && amount !== 0) return '-';
            if (amount === 0) return '0';
            return new Intl.NumberFormat('id-ID').format(amount);
        };

        function TrackingMap({ packageId, address, status, koordinatGps }) {
            const mapRef = useRef(null);
            const isProses = ['siap_antar', 'proses'].includes(String(status).toLowerCase().replace(' ', '_'));

            useEffect(() => {
                const timer = setTimeout(() => {
                    const mapId = `map-${packageId}`;
                    const container = document.getElementById(mapId);
                    if (!container || container._leaflet_id) return;

                    // Membaca Koordinat GPS Asli dari Google Sheets
                    let lat = -2.53371; // Default Jayapura
                    let lng = 140.71813;
                    let isRealGps = false;

                    if (koordinatGps && typeof koordinatGps === 'string' && koordinatGps.includes(',')) {
                        const parts = koordinatGps.split(',');
                        const parsedLat = parseFloat(parts[0].trim());
                        const parsedLng = parseFloat(parts[1].trim());
                        if (!isNaN(parsedLat) && !isNaN(parsedLng)) {
                            lat = parsedLat;
                            lng = parsedLng;
                            isRealGps = true;
                        }
                    }

                    // Jika tidak ada GPS, buat titik acak
                    if (!isRealGps) {
                        let hash = 0;
                        for (let i = 0; i < packageId.length; i++) {
                            hash = packageId.charCodeAt(i) + ((hash << 5) - hash);
                        }
                        lat = -2.53371 + ((hash % 100) / 4500);
                        lng = 140.71813 + (((hash >> 8) % 100) / 4500);
                    }

                    try {
                        const map = L.map(mapId, { center: [lat, lng], zoom: 16, zoomControl: true, attributionControl: false });
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

                        let marker;
                        if (isProses) {
                            const truckIcon = L.divIcon({
                                className: 'custom-leaflet-icon',
                                html: `<div class="text-[#e65c00] text-3xl moving-truck-marker"><i class="fas fa-truck-fast"></i></div>`,
                                iconSize: [40, 40],
                                iconAnchor: [20, 20],
                                popupAnchor: [0, -20]
                            });
                            marker = L.marker([lat, lng], { icon: truckIcon }).addTo(map);
                            marker.bindPopup(`<b>Kurir Dalam Perjalanan!</b><br/><span class="text-[10px] text-gray-500">${address || 'Alamat Penerima'}</span>`).openPopup();
                        } else {
                            marker = L.marker([lat, lng]).addTo(map);
                            marker.bindPopup(`<b>Lokasi Pengiriman:</b><br/>${isRealGps ? '📍 GPS Akurat' : '📍 Estimasi Area'}<br/><span class="text-[10px] text-gray-500">${address || 'Alamat Penerima'}</span>`).openPopup();
                        }
                        mapRef.current = map;
                    } catch (err) { console.error("Map Error:", err); }
                }, 300);
                return () => clearTimeout(timer);
            }, [packageId, address, status, koordinatGps]);

            return (
                <div className="bg-[#1e2336] p-2 md:p-3 rounded-xl shadow-inner border border-[#2a3147] mt-3 animate-fade-in-down w-full max-w-full overflow-hidden">
                    <div className="flex justify-between items-center mb-2 text-[9px] md:text-xs font-bold text-gray-400 uppercase tracking-widest">
                        <span><i className={`fas ${isProses ? 'fa-satellite-dish text-blue-400 animate-pulse' : 'fa-map-marked-alt text-[#34d399]'} mr-1.5`}></i> {isProses ? 'Live Tracking Kurir' : 'Geolokasi Pengantaran'}</span>
                    </div>
                    <div id={`map-${packageId}`} className="h-48 md:h-64 w-full rounded-lg z-0 border border-[#2a3147]"></div>
                </div>
            );
        }

        function App() {
            const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec"; 
            const APPSHEET_APP_ID = "APLIKASEXCEED-327461285";

            const [userProfile, setUserProfile] = useState(() => loadLocal('ex_olshopProfile', null));
            const [isLoadingSync, setIsLoadingSync] = useState(false);
            const [syncMessage, setSyncMessage] = useState({ text: '', type: '' });
            
            const [loginUname, setLoginUname] = useState('');
            const [loginPass, setLoginPass] = useState('');

            const [packages, setPackages] = useState(() => loadLocal('ex_olshopPackages', []));
            const [masterOlshops, setMasterOlshops] = useState(() => loadLocal('ex_masterOlshops', []));
            
            const [filterStatus, setFilterStatus] = useState('semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            
            const [showMapIds, setShowMapIds] = useState([]); 
            const [selectedImage, setSelectedImage] = useState(null);

            const toggleMap = (id) => setShowMapIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);

            const getFinancials = (pkg) => {
                const hBarang = Number(pkg.hargaPaket) || 0;
                const tagihan = Number(pkg.totalTagihan) || 0;
                const oTambahan = Number(pkg.tambahanOngkir) || Number(pkg.ongkirTambahan) || Number(pkg.ongkir_tambahan) || Number(pkg.ongkirVolume) || Number(pkg.tambahan) || 0;
                let oDasar = Number(pkg.ongkirDasar) || Number(pkg.ongkir) || 0;
                
                if (oDasar === 0) {
                    let oReal = pkg.ongkirReal !== undefined ? Number(pkg.ongkirReal) : (tagihan - hBarang > 0 ? tagihan - hBarang : 0);
                    oDasar = oReal >= oTambahan ? oReal - oTambahan : oReal;
                }
                return { hBarang, tagihan, oDasar, oTambahan, oTotal: oDasar + oTambahan };
            };

            const getFotoUrl = (pkg) => {
                const fileKey = pkg.fotoBukti || pkg.foto_bukti || pkg.foto || pkg.bukti || pkg.gambar;
                if (!fileKey || String(fileKey).trim() === '') return null;
                if (String(fileKey).startsWith('http://') || String(fileKey).startsWith('https://')) return fileKey;
                return `https://www.appsheet.com/template/gettablefileurl?appName=${APPSHEET_APP_ID}&tableName=InputPaket&fileName=${encodeURIComponent(fileKey)}`;
            };

            const syncData = async (isLoginAttempt = false) => {
                setIsLoadingSync(true);
                if(!isLoginAttempt) { setSyncMessage({ text: '', type: '' }); }
                
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=getInitData&t=${new Date().getTime()}`);
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        setMasterOlshops(result.data.olshop || []);
                        setPackages(result.data.packages || []);
                        if(!isLoginAttempt) {
                            setSyncMessage({ text: 'Data berhasil diperbarui!', type: 'success' });
                            setTimeout(() => setSyncMessage({ text: '', type: '' }), 3000);
                        }
                        return result.data.olshop;
                    } else {
                        setSyncMessage({ text: 'Gagal memuat data dari server.', type: 'error' });
                        return false;
                    }
                } catch (error) {
                    setSyncMessage({ text: 'Koneksi terputus. Cek internet Anda.', type: 'error' });
                    return false;
                } finally {
                    setIsLoadingSync(false);
                }
            };

            useEffect(() => { if (masterOlshops.length === 0 && !userProfile) { syncData(); } }, []);
            useEffect(() => { localStorage.setItem('ex_olshopProfile', JSON.stringify(userProfile)); }, [userProfile]);
            useEffect(() => { localStorage.setItem('ex_olshopPackages', JSON.stringify(packages)); }, [packages]);
            useEffect(() => { localStorage.setItem('ex_masterOlshops', JSON.stringify(masterOlshops)); }, [masterOlshops]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setSyncMessage({ text: 'Sinkronisasi data...', type: 'info' });
                const currentOlshops = await syncData(true) || [];
                const uname = loginUname.trim().toLowerCase();
                const pass = loginPass.trim();

                const validUser = currentOlshops.find(o => String(o.nama).trim().toLowerCase() === uname && String(o.phone).trim() === pass);

                if (validUser) {
                    setUserProfile({ id: validUser.id, name: validUser.nama });
                    setLoginUname(''); setLoginPass('');
                    syncData(); 
                } else { setSyncMessage({ text: 'Nama Toko atau Nomor WA Salah!', type: 'error' }); }
            };

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1/2 bg-[#e65c00] rounded-b-[50px] shadow-lg"></div>
                        <div className="glass-card p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center relative z-10 border border-white/50">
                            <div className="w-20 h-20 bg-orange-50 rounded-2xl flex items-center justify-center mx-auto mb-4 text-[#e65c00] shadow-inner">
                                <i className="fas fa-box text-4xl"></i>
                            </div>
                            <h1 className="text-3xl font-black text-gray-800 tracking-tight">Portal Klien</h1>
                            <p className="text-sm text-gray-500 mb-8 font-medium">Exceed Express Tracking</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                {syncMessage.text && (
                                    <div className={`text-xs py-3 px-3 rounded-xl font-bold flex items-start text-left ${syncMessage.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : syncMessage.type === 'info' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-green-50 text-green-700 border border-green-100'}`}>
                                        <i className={`fas ${syncMessage.type === 'error' ? 'fa-exclamation-triangle' : syncMessage.type === 'info' ? 'fa-spinner fa-spin' : 'fa-check-circle'} mr-2 mt-0.5`}></i>
                                        <span>{syncMessage.text}</span>
                                    </div>
                                )}
                                <div className="relative">
                                    <i className="fas fa-store absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="text" required value={loginUname} onChange={(e) => setLoginUname(e.target.value)} placeholder="Nama Toko Anda" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                <div className="relative">
                                    <i className="fas fa-phone absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                    <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} placeholder="Nomor WhatsApp" className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:border-[#e65c00] focus:ring-2 focus:ring-orange-100 transition-all font-medium" disabled={isLoadingSync} />
                                </div>
                                <button type="submit" disabled={isLoadingSync} className={`w-full text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 flex justify-center items-center ${isLoadingSync ? 'bg-gray-400 cursor-not-allowed shadow-none' : 'bg-[#e65c00] hover:bg-[#cc5200] shadow-[#e65c00]/30'}`}>
                                    {isLoadingSync ? <><i className="fas fa-sync-alt animate-spin mr-2"></i> Memproses...</> : 'Masuk ke Dashboard'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            let filteredPkgs = packages.filter(p => {
                const pOlshopName = String(p.olshopName).trim().toLowerCase();
                const uName = String(userProfile.name).trim().toLowerCase();
                const uId = String(userProfile.id).trim().toLowerCase();
                return pOlshopName === uName || pOlshopName === uId || pOlshopName.includes(uName) || uName.includes(pOlshopName);
            });

            if (startDate || endDate) {
               filteredPkgs = filteredPkgs.filter(p => {
                  let pDateStr = p.dateString || p.tanggal || '';
                  if (!pDateStr) return false;
                  let normalizedDateStr = "";
                  try {
                      let d = new Date(pDateStr);
                      if (isNaN(d.getTime()) && pDateStr.includes('/')) {
                          const parts = pDateStr.split('/');
                          if (parts.length === 3) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`); 
                      }
                      if (!isNaN(d.getTime())) {
                          const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0');
                          normalizedDateStr = `${year}-${month}-${day}`;
                      } else { normalizedDateStr = pDateStr.split('T')[0]; }
                  } catch(e) { normalizedDateStr = pDateStr.split('T')[0]; }
                  const sDate = startDate ? startDate : "2000-01-01";
                  const eDate = endDate ? endDate : "2100-01-01";
                  return normalizedDateStr >= sDate && normalizedDateStr <= eDate;
               });
            }

            if (filterStatus !== 'semua') {
                filteredPkgs = filteredPkgs.filter(p => {
                    let stat = String(p.status).toLowerCase().replace(' ', '_');
                    if (filterStatus === 'proses') return stat === 'siap_antar' || stat === 'proses';
                    return stat === filterStatus;
                });
            }

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filteredPkgs = filteredPkgs.filter(p => String(p.customerName).toLowerCase().includes(q) || String(p.packageId).toLowerCase().includes(q));
            }

            // KEUANGAN UTAMA
            let s_sukses = 0, s_proses = 0, s_pending = 0, s_cancel = 0;
            let saldoBelumCair = 0, danaSudahCairBersih = 0, potonganBelumCair = 0;
            let uangBarang = 0, totalBebanOngkirOlshop = 0, totalBersih = 0;

            filteredPkgs.forEach(p => {
                let stat = String(p.status).toLowerCase().replace(' ', '_');
                if(stat === 'sukses') s_sukses++;
                else if(stat === 'siap_antar' || stat === 'proses') s_proses++;
                else if(stat === 'pending') s_pending++;
                else if(stat === 'cancel' || stat === 'batal') s_cancel++;

                if (stat === 'sukses') {
                    const metode = String(p.metodeBayar).trim().toUpperCase();
                    const { hBarang, oTotal } = getFinancials(p);
                    const isCair = String(p.statusPencairan).toLowerCase() === 'cair';

                    if (metode === 'TF OLSHOP') {
                        totalBebanOngkirOlshop += oTotal;
                        if (isCair) danaSudahCairBersih -= oTotal; 
                        else potonganBelumCair += oTotal; 
                    } else if (metode === 'CASH' || metode === 'TF KANTOR' || metode === 'COD') {
                        uangBarang += hBarang;
                        if (isCair) danaSudahCairBersih += hBarang; 
                        else saldoBelumCair += hBarang; 
                    }
                }
            });
            const totalPencairanEstimasi = saldoBelumCair - potonganBelumCair;
            totalBersih = uangBarang - totalBebanOngkirOlshop;

            // STATUS BADGE KOMPONEN
            const StatusBadge = ({ status, isCair, isSukses, inTable }) => {
                const s = String(status).toLowerCase();
                if(s === 'sukses') {
                    return (
                        <div className={`flex flex-col items-center justify-center ${inTable ? 'w-full' : ''}`}>
                            <span className={`bg-[#153a2b] text-[#34d399] px-1 md:px-2 py-0.5 rounded text-[5.5px] md:text-[9px] font-bold border border-[#1d4f3b] flex items-center shadow-sm ${inTable ? 'w-full justify-center' : 'w-max'}`}><i className="fas fa-check-circle mr-1"></i>Sukses</span>
                            <span className={`mt-0.5 px-1 py-0.5 rounded text-[4.5px] md:text-[7px] font-bold border ${inTable ? 'w-full text-center' : 'w-max'} ${isCair ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800' : 'bg-[#e65c00]/20 text-[#fb923c] border-[#e65c00]/50'}`}>{isCair ? 'CAIR' : 'BLM CAIR'}</span>
                        </div>
                    );
                }
                if(s === 'cancel' || s === 'batal') return <span className={`bg-[#450a0a] text-[#f87171] px-1 md:px-2 py-0.5 rounded text-[5.5px] md:text-[9px] font-bold border border-[#7f1d1d] flex items-center justify-center shadow-sm ${inTable ? 'w-full' : 'w-max mx-auto'}`}><i className="fas fa-times-circle mr-1"></i>Cancel</span>;
                if(s === 'pending') return <span className={`bg-[#431407] text-[#fb923c] px-1 md:px-2 py-0.5 rounded text-[5.5px] md:text-[9px] font-bold border border-[#7c2d12] flex items-center justify-center shadow-sm ${inTable ? 'w-full' : 'w-max mx-auto'}`}><i className="fas fa-clock mr-1"></i>Pending</span>;
                return <span className={`bg-[#1e3a8a] text-[#60a5fa] px-1 md:px-2 py-0.5 rounded text-[5.5px] md:text-[9px] font-bold border border-[#1e40af] flex items-center justify-center shadow-sm ${inTable ? 'w-full' : 'w-max mx-auto'}`}><i className="fas fa-truck mr-1 animate-pulse"></i>Proses</span>;
            };

            return (
                <div className="min-h-screen bg-gray-100 font-sans w-full md:max-w-3xl lg:max-w-5xl xl:max-w-[1400px] mx-auto shadow-2xl relative flex flex-col pb-8">
                    
                    {/* Header Dark (Sesuai Portal Klien Asli) */}
                    <header className="bg-[#0f172a] px-4 py-3 md:py-4 shadow-md z-10 sticky top-0 flex justify-between items-center border-b border-slate-800">
                        <div>
                            <p className="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">DASHBOARD TOKO</p>
                            <h1 className="text-lg md:text-xl lg:text-2xl font-black text-white leading-none truncate max-w-[200px] md:max-w-[400px] uppercase">{userProfile.name}</h1>
                        </div>
                        <button onClick={() => {setUserProfile(null); setPackages([]);}} className="text-[10px] md:text-xs font-bold text-slate-200 hover:text-white bg-slate-800 hover:bg-red-500 border border-slate-700 px-3 py-1.5 md:px-4 md:py-1.5 rounded-lg transition-colors flex items-center shadow-sm">
                            <span className="hidden sm:inline">Keluar</span> <i className="fas fa-sign-out-alt sm:ml-1.5 md:ml-2"></i>
                        </button>
                    </header>

                    {/* Marquee / Tulisan Berjalan (TIDAK DIHILANGKAN) */}
                    <div className="bg-[#fff7ed] border-b border-[#fed7aa] w-full overflow-hidden shadow-sm">
                        <div className="marquee-content py-1.5 text-[10px] md:text-xs font-black tracking-wider text-[#ea580c] uppercase">
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                            <i className="fas fa-bolt mr-2"></i> Antar tuntas, harga pas 
                        </div>
                    </div>

                    <div className="px-2 md:px-4 lg:px-6 mt-4 md:mt-5 space-y-4">
                        
                        {/* Filter Bar Putih Full Width (Seperti di Screenshot) */}
                        <div className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between items-center gap-3">
                            <div className="flex gap-2 w-full md:w-auto overflow-x-auto scrollbar-hide">
                                {[{id:'semua', label:'Semua'}, {id:'proses', label:'Proses'}, {id:'sukses', label:'Sukses'}, {id:'pending', label:'Pending'}, {id:'cancel', label:'Batal'}].map(s => (
                                    <button key={s.id} onClick={() => setFilterStatus(s.id)} className={`px-4 py-1.5 md:py-2 rounded-full text-[10px] md:text-[11px] font-bold whitespace-nowrap transition-all border ${filterStatus === s.id ? 'bg-[#e65c00] text-white border-[#e65c00] shadow-md' : 'bg-white text-gray-500 border-gray-300 hover:bg-gray-100'}`}>{s.label}</button>
                                ))}
                            </div>
                            <div className="flex flex-col sm:flex-row items-center gap-2 w-full md:w-auto">
                                <div className="relative w-full sm:w-32"><i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="w-full pl-8 pr-2 py-1.5 md:py-2 bg-gray-50 border border-gray-200 rounded-lg text-[10px] md:text-[11px] outline-none focus:border-[#e65c00]" /></div>
                                <span className="hidden sm:block text-[9px] font-bold text-gray-400 uppercase">Hingga</span>
                                <div className="relative w-full sm:w-32"><i className="far fa-calendar-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i><input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="w-full pl-8 pr-2 py-1.5 md:py-2 bg-gray-50 border border-gray-200 rounded-lg text-[10px] md:text-[11px] outline-none focus:border-[#e65c00]" /></div>
                                <div className="relative w-full sm:w-48">
                                    <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-[10px] md:text-xs"></i>
                                    <input type="text" placeholder="Cari Resi/Nama..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-8 pr-3 py-1.5 md:py-2 bg-gray-50 border border-gray-200 rounded-lg text-[10px] md:text-[11px] outline-none focus:border-[#e65c00]" />
                                </div>
                            </div>
                        </div>

                        {/* WIDGET KEUANGAN ORANYE (FULL WIDTH) */}
                        <div className="bg-gradient-to-br from-[#e65c00] to-[#b34700] rounded-xl shadow-lg border border-[#cc5200] overflow-hidden text-white relative w-full">
                            <div className="absolute right-0 top-0 opacity-10 transform translate-x-4 -translate-y-4"><i className="fas fa-wallet text-[120px] md:text-[150px]"></i></div>
                            <div className="p-4 md:p-6 relative z-10">
                                <div className="flex justify-between items-center mb-1">
                                    <h3 className="text-[9px] md:text-[11px] font-bold uppercase tracking-widest text-orange-200"><i className="fas fa-wallet mr-1.5"></i> Estimasi Pencairan</h3>
                                    <button onClick={() => syncData()} disabled={isLoadingSync} className={`bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full border border-white/30 text-[8px] md:text-[10px] font-bold flex items-center transition-all ${isLoadingSync ? 'opacity-50' : ''}`}>
                                        <i className={`fas fa-sync-alt mr-1.5 ${isLoadingSync ? 'animate-spin' : ''}`}></i> Refresh
                                    </button>
                                </div>
                                <h1 className="text-3xl md:text-5xl font-black mb-3 md:mb-4 tracking-tight drop-shadow-md">{formatCurrency(totalPencairanEstimasi)}</h1>
                                
                                <div className="flex flex-col gap-1 text-[8.5px] md:text-xs font-semibold text-orange-100 bg-[#cc5200]/50 p-2.5 md:p-3 rounded-xl border border-white/10 w-full sm:w-max md:pr-12 shadow-inner">
                                    <div className="flex justify-between items-center gap-3"><span className="flex items-center"><i className="fas fa-arrow-circle-up text-green-400 text-[10px] md:text-sm w-4"></i>Harga Barang (Hak Olshop)</span><span className="font-bold ml-auto pl-4">+{formatCurrency(saldoBelumCair)}</span></div>
                                    <div className="flex justify-between items-center gap-3"><span className="flex items-center"><i className="fas fa-arrow-circle-down text-red-300 text-[10px] md:text-sm w-4"></i>Beban Ongkir TF Olshop</span><span className="font-bold text-red-200 ml-auto pl-4">-{formatCurrency(potonganBelumCair)}</span></div>
                                </div>
                            </div>
                            <div className="bg-[#15803d]/90 border-t border-[#166534] px-4 py-2.5 flex justify-between items-center text-green-50 shadow-inner">
                                <span className="text-[9px] md:text-[11px] font-bold flex items-center"><i className="fas fa-shield-alt text-green-300 mr-1.5"></i> Dana Telah Dicairkan</span>
                                <span className="text-sm md:text-base font-black tracking-wide">{formatCurrency(danaSudahCairBersih)}</span>
                            </div>
                        </div>

                        {/* WIDGET RINGKASAN STATUS & KEUANGAN GELAP (FULL WIDTH) */}
                        <div className="bg-[#1e2336] rounded-xl shadow-lg border border-[#2a3147] text-white font-sans w-full">
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-y-4 gap-x-2 p-3 md:p-4 items-center text-center lg:text-left divide-y lg:divide-y-0 lg:divide-x divide-[#2a3147]">
                                <div className="col-span-2 lg:col-span-1 flex flex-col justify-center items-center lg:items-start pb-2 lg:pb-0">
                                    <div className="text-[8px] md:text-[10px] text-gray-400 font-bold mb-2 uppercase tracking-widest">TOTAL STATUS PKT</div>
                                    <div className="flex gap-2">
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#153a2b] text-[#34d399] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#1d4f3b]"><i className="fas fa-check-circle md:mr-1"></i><span className="hidden md:inline">{s_sukses}</span></span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Sukses <span className="md:hidden">({s_sukses})</span></span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#1e3a8a] text-[#60a5fa] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#1e40af]"><i className="fas fa-truck md:mr-1"></i><span className="hidden md:inline">{s_proses}</span></span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Proses <span className="md:hidden">({s_proses})</span></span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#431407] text-[#fb923c] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#7c2d12]"><i className="fas fa-clock md:mr-1"></i><span className="hidden md:inline">{s_pending}</span></span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Pending <span className="md:hidden">({s_pending})</span></span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                            <span className="bg-[#450a0a] text-[#f87171] px-2 py-0.5 rounded text-[10px] md:text-xs font-bold border border-[#7f1d1d]"><i className="fas fa-times-circle md:mr-1"></i><span className="hidden md:inline">{s_cancel}</span></span>
                                            <span className="text-[7px] text-gray-400 mt-1 uppercase font-semibold tracking-wide">Cancel <span className="md:hidden">({s_cancel})</span></span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col items-center lg:items-end lg:pr-4 pt-2 lg:pt-0">
                                    <div className="text-[8px] md:text-[10px] text-[#34d399] font-bold mb-1 uppercase tracking-widest text-center lg:text-right">BARANG (CASH/TF KTR)</div>
                                    <div className="text-sm md:text-base font-black text-[#34d399]">+{formatCurrency(uangBarang)}</div>
                                </div>
                                <div className="flex flex-col items-center lg:items-end lg:pr-4 pt-2 lg:pt-0">
                                    <div className="text-[8px] md:text-[10px] text-[#f87171] font-bold mb-1 uppercase tracking-widest text-center lg:text-right">BEBAN ONGKIR (TF OLSHOP)</div>
                                    <div className="text-sm md:text-base font-black text-[#f87171]">{totalBebanOngkirOlshop > 0 ? '-' : ''}{formatCurrency(totalBebanOngkirOlshop)}</div>
                                </div>
                                <div className="flex flex-col items-center lg:items-end lg:pr-2 pt-3 lg:pt-0 bg-[#252b41] lg:bg-transparent -mx-3 lg:mx-0 px-3 lg:px-0 pb-1 rounded border-t border-[#2a3147] lg:border-t-0 mt-2 lg:mt-0">
                                    <div className="text-[8px] md:text-[10px] text-white font-bold mb-1 uppercase tracking-widest">TOTAL BERSIH</div>
                                    <div className="text-lg md:text-xl font-black text-[#fb923c]">{formatCurrency(totalBersih)}</div>
                                </div>
                            </div>
                        </div>

                        {/* TABEL DATA FIT TO SCREEN (Sesuai Screenshot "WhatsApp Image 2026-06-15 at 19.29.04.jpeg") */}
                        <div className="flex flex-col mt-4">
                            <div className="flex justify-between items-end mb-2 px-1">
                                <h3 className="font-bold text-gray-700 text-sm md:text-lg flex items-center"><i className="fas fa-list-alt text-[#e65c00] mr-2"></i> Rincian Paket Pelanggan</h3>
                                <span className="text-[9px] md:text-[11px] font-bold bg-gray-200 text-gray-600 px-3 py-0.5 rounded-full">{filteredPkgs.length} Paket</span>
                            </div>

                            {filteredPkgs.length === 0 ? (
                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-10 text-center text-gray-400">
                                    <i className="fas fa-box-open text-4xl mb-3"></i><p className="text-sm font-medium">Tidak ada resi untuk filter ini.</p>
                                </div>
                            ) : (
                                <div className="w-full bg-[#1e2336] rounded-xl overflow-hidden shadow-lg border border-[#2a3147]">
                                    {/* MENGGUNAKAN TABLE-FIXED AGAR TIDAK HORIZONTAL SCROLL PADA HP */}
                                    <table className="table-fit">
                                        <thead className="bg-[#1d78d4] text-white text-[4.5px] md:text-[10px] leading-tight font-bold tracking-tighter md:tracking-normal uppercase">
                                            <tr>
                                                <th className="w-[4%] p-1 md:p-2 border-b border-blue-600">NO</th>
                                                <th className="w-[12%] p-1 md:p-2 border-b border-blue-600">NO RESI</th>
                                                <th className="w-[14%] p-1 md:p-2 border-b border-blue-600 text-left">NAMA CUSTOMER</th>
                                                <th className="w-[7%] p-1 md:p-2 border-b border-blue-600">FOTO</th>
                                                <th className="w-[8%] p-1 md:p-2 border-b border-blue-600">LACAK</th>
                                                <th className="w-[12%] p-1 md:p-2 border-b border-blue-600">STATUS</th>
                                                <th className="w-[10%] p-1 md:p-2 border-b border-blue-600" title="CASH / COD">CASH / COD</th>
                                                <th className="w-[8%] p-1 md:p-2 border-b border-blue-600" title="TRANSFER OLSHOP">TF OLSHOP</th>
                                                <th className="w-[8%] p-1 md:p-2 border-b border-blue-600" title="TRANSFER KANTOR">TF KANTOR</th>
                                                <th className="w-[8%] p-1 md:p-2 border-b border-blue-600 text-[#fca5a5]">BEBAN (MINUS)</th>
                                                <th className="w-[9%] p-1 md:p-2 border-b border-blue-600">TOTAL BERSIH</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-[6px] md:text-[11px] text-gray-300">
                                            {filteredPkgs.map((pkg, idx) => {
                                                const { hBarang, tagihan, oDasar, oTambahan, oTotal } = getFinancials(pkg);
                                                const metode = String(pkg.metodeBayar).trim().toUpperCase();
                                                const isSukses = String(pkg.status).toLowerCase() === 'sukses';
                                                const isCair = String(pkg.statusPencairan).toLowerCase() === 'cair';
                                                const isMapShown = showMapIds.includes(pkg.packageId);
                                                const resolvedUrlFoto = getFotoUrl(pkg);

                                                let uCash = 0, uTfOl = 0, uTfKtr = 0, bBeban = 0, tBersih = 0;

                                                if (isSukses) {
                                                    if (metode === 'CASH' || metode === 'COD') { uCash = hBarang; tBersih = hBarang; }
                                                    else if (metode === 'TF KANTOR') { uTfKtr = hBarang; tBersih = hBarang; }
                                                    else if (metode === 'TF OLSHOP') { uTfOl = hBarang; bBeban = oTotal; tBersih = hBarang - oTotal; }
                                                }

                                                let displayKurir = String(pkg.kurirId || '-');
                                                if (displayKurir.includes('@')) displayKurir = displayKurir.split('@')[0];

                                                return (
                                                    <React.Fragment key={idx}>
                                                        <tr className="border-b border-[#2a3147] hover:bg-[#252b41] transition-colors">
                                                            <td className="p-1 md:p-2 text-center font-semibold text-gray-500">{idx + 1}</td>
                                                            <td className="p-1 md:p-2 text-center font-mono text-[#60a5fa] font-bold tracking-tighter">{pkg.packageId}</td>
                                                            <td className="p-1 md:p-2 text-left">
                                                                <div className="font-bold text-white truncate max-w-[50px] md:max-w-[150px]">{pkg.customerName}</div>
                                                                <div className="text-[4.5px] md:text-[9px] text-gray-500 mt-0.5 truncate max-w-[50px] md:max-w-[150px]"><i className="fas fa-motorcycle mr-0.5 text-gray-600"></i>{displayKurir}</div>
                                                            </td>
                                                            <td className="p-1 md:p-2 text-center align-middle">
                                                                {resolvedUrlFoto ? (
                                                                    <img 
                                                                        src={resolvedUrlFoto} 
                                                                        alt="F" 
                                                                        className="w-4 h-4 md:w-8 md:h-8 rounded object-cover border border-[#374151] mx-auto cursor-pointer hover:opacity-80" 
                                                                        onClick={() => setSelectedImage(resolvedUrlFoto)}
                                                                    />
                                                                ) : (
                                                                    <div className="w-4 h-4 md:w-8 md:h-8 rounded bg-[#151928] border border-dashed border-[#374151] mx-auto flex items-center justify-center text-gray-600"><i className="fas fa-image text-[5px] md:text-sm"></i></div>
                                                                )}
                                                            </td>
                                                            <td className="p-1 md:p-2 text-center align-middle">
                                                                {(['sukses', 'siap_antar', 'proses'].includes(String(pkg.status).toLowerCase().replace(' ', '_'))) && (
                                                                    <button 
                                                                        onClick={() => toggleMap(pkg.packageId)} 
                                                                        className={`w-full py-0.5 md:py-1 rounded text-[4.5px] md:text-[9px] font-bold transition-colors border shadow-sm flex items-center justify-center ${isMapShown ? 'bg-red-500/20 text-red-400 border-red-500/50' : 'bg-[#1d78d4]/30 text-[#60a5fa] border-[#1d78d4]/50'}`}
                                                                    >
                                                                        <i className={`fas ${isMapShown ? 'fa-times' : 'fa-location-arrow'} md:mr-1`}></i><span className="hidden md:inline">{isMapShown ? 'Tutup' : 'Lacak'}</span>
                                                                    </button>
                                                                )}
                                                            </td>
                                                            <td className="p-1 md:p-2 text-center align-middle">
                                                                <StatusBadge status={pkg.status} isCair={isCair} isSukses={isSukses} inTable={true} />
                                                            </td>
                                                            <td className="p-1 md:p-2 text-center font-bold text-[#34d399] tracking-tighter">{formatShort(uCash)}</td>
                                                            <td className="p-1 md:p-2 text-center font-bold text-[#60a5fa] tracking-tighter">{formatShort(uTfOl)}</td>
                                                            <td className="p-1 md:p-2 text-center font-bold text-[#c084fc] tracking-tighter">{formatShort(uTfKtr)}</td>
                                                            <td className="p-1 md:p-2 text-center font-bold text-[#f87171] tracking-tighter">{bBeban > 0 ? `-${formatShort(bBeban)}` : '-'}</td>
                                                            <td className="p-1 md:p-2 text-center font-black text-white tracking-tighter">{tBersih > 0 ? `+${formatShort(tBersih)}` : (tBersih < 0 ? formatShort(tBersih) : '-')}</td>
                                                        </tr>
                                                        
                                                        {/* BARIS MAP (MUNCUL JIKA DILACAK) */}
                                                        {isMapShown && (
                                                            <tr className="bg-[#151928]">
                                                                <td colSpan="11" className="p-2 md:p-4 border-b border-[#2a3147]">
                                                                    <div className="flex flex-col md:flex-row gap-4 items-start w-full">
                                                                        <div className="flex-1 w-full bg-[#1e2336] p-3 md:p-4 rounded-xl shadow-inner border border-[#2a3147] text-[8px] md:text-[11px]">
                                                                            <h5 className="font-bold text-[#e65c00] uppercase mb-2 md:mb-3 tracking-wider"><i className="fas fa-history mr-1.5"></i> Histori Paket</h5>
                                                                            <div className="space-y-3 relative border-l border-[#374151] ml-2 pl-3 md:pl-4">
                                                                                <div className="relative">
                                                                                    <div className="absolute -left-[17px] md:-left-[21px] top-0.5 bg-green-500 w-2 h-2 md:w-2.5 md:h-2.5 rounded-full border border-[#151928]"></div>
                                                                                    <p className="font-bold text-gray-200 leading-tight">Diterima di Gudang Exceed</p>
                                                                                    <p className="text-gray-500 text-[6px] md:text-[9px] mt-0.5">{pkg.tanggalInput || pkg.tanggal ? String(pkg.tanggalInput || pkg.tanggal).split('T')[0] : '-'} (Sistem Terdaftar)</p>
                                                                                </div>
                                                                                <div className="relative">
                                                                                    <div className={`absolute -left-[17px] md:-left-[21px] top-0.5 w-2 h-2 md:w-2.5 md:h-2.5 rounded-full border border-[#151928] ${pkg.status !== 'siap_antar' && pkg.status !== 'proses' ? 'bg-green-500' : 'bg-blue-500 animate-ping'}`}></div>
                                                                                    <p className={`font-bold leading-tight ${pkg.status === 'siap_antar' || pkg.status === 'proses' ? 'text-blue-400' : 'text-gray-300'}`}>{pkg.status === 'siap_antar' || pkg.status === 'proses' ? `Sedang Diantar Kurir (${displayKurir})` : `Diserahkan ke Kurir (${displayKurir})`}</p>
                                                                                    <p className="text-gray-500 text-[6px] md:text-[9px] mt-0.5">{pkg.dateString ? String(pkg.dateString).split('T')[0] : '-'}</p>
                                                                                </div>
                                                                                {isSukses && (
                                                                                    <div className="relative">
                                                                                        <div className="absolute -left-[17px] md:-left-[21px] top-0.5 bg-emerald-500 w-2 h-2 md:w-2.5 md:h-2.5 rounded-full border border-[#151928]"></div>
                                                                                        <p className="font-bold text-emerald-400 leading-tight">Paket Sukses Diterima</p>
                                                                                        <p className="text-gray-500 text-[6px] md:text-[9px] mt-0.5">{pkg.dateString ? String(pkg.dateString).split('T')[0] : '-'}</p>
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex-1 w-full relative">
                                                                            <TrackingMap packageId={pkg.packageId} address={pkg.address} status={pkg.status} koordinatGps={pkg.koordinatGps} />
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        )}
                                                    </React.Fragment>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                        <div className="text-center pt-2 pb-2"><p className="text-[9px] md:text-[10px] text-gray-400 font-medium">Exceed Express Logistics &copy; 2026</p></div>
                    </div>
                    
                    {/* MODAL FOTO BESAR */}
                    {selectedImage && (
                        <div className="fixed inset-0 z-[999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 transition-opacity" onClick={() => setSelectedImage(null)}>
                            <div className="relative w-full max-w-lg flex flex-col items-center" onClick={(e) => e.stopPropagation()}>
                                <button onClick={() => setSelectedImage(null)} className="absolute -top-12 right-0 text-white bg-red-500/80 hover:bg-red-500 w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i className="fas fa-times"></i></button>
                                <img src={selectedImage} alt="Foto Paket" className="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl border-4 border-white/10" />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
